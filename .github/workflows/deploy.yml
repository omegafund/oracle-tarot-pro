name: Deploy with Secrets

on:
  push:
    branches:
      - main  # 파트너님의 브랜치가 main이므로 맞습니다.

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Replace API Key
        run: |
          # index.html 파일에서 API_KEY 변수 뒤의 따옴표 안의 내용을 Secret 키로 강제 교체합니다.
          sed -i 's/REPLACE_ME_WITH_API_KEY/${{ secrets.GEMINI_API_KEY }}/g' index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
