<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZEUS ORACLE TAROT</title>
    <style>
        :root {
            --gold: #D4AF37;
            --bright-gold: #FFF5C3;
            --dark-gold: #8C6212;
            --bg: #000;
            --text: #fff;
            --font: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            overflow-x: hidden;
        }
        #app-container {
            max-width: 500px;
            width: 100%;
            padding: 50px 25px 40px 25px;
            text-align: center;
            position: relative;
            margin: 0 auto;
            border-left: 1px solid rgba(212,175,55,0.15);
            border-right: 1px solid rgba(212,175,55,0.15);
            min-height: 100vh;
        }

        /* ════════════════════════════════════
           ✦ 아치형 별 타이틀 영역
        ════════════════════════════════════ */
        .arch-title-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 4px;
            padding-top: 10px;
        }
        .arch-svg-wrapper {
            position: relative;
            width: 320px;
            height: 90px;
            margin: 0 auto;
        }
        .arch-svg-wrapper svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: visible;
        }
        .gold-title {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            text-align: center;
            z-index: 2;
            color: var(--gold);
            font-size: 2.05rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 0.3em;
            text-shadow: 0 0 15px rgba(212,175,55,0.6), 0 0 30px rgba(212,175,55,0.3);
            line-height: 1;
        }
        .sub-title {
            color: var(--gold);
            font-size: 0.95rem;
            letter-spacing: 0.5em;
            margin-top: 6px;
            margin-bottom: 20px;
            display: block;
            font-weight: 800;
        }

        /* ════════════════════════════════════
           ✦ 아치 별 깜빡임 애니메이션
        ════════════════════════════════════ */
        @keyframes archStarTwinkle1 {
            0%,100%{opacity:0.2;}
            50%{opacity:1;filter:drop-shadow(0 0 8px #FFF5C3) drop-shadow(0 0 16px #D4AF37);}
        }
        @keyframes archStarTwinkle2 {
            0%,100%{opacity:0.5;}
            40%{opacity:1;filter:drop-shadow(0 0 10px #FFF5C3);}
        }
        @keyframes archStarTwinkle3 {
            0%,100%{opacity:0.15;}
            60%{opacity:0.9;filter:drop-shadow(0 0 6px #D4AF37);}
        }
        @keyframes archStarTwinkle4 {
            0%,100%{opacity:0.7;}
            30%{opacity:0.2;}
            70%{opacity:1;filter:drop-shadow(0 0 12px #FFF5C3);}
        }
        @keyframes archStarTwinkle5 {
            0%,100%{opacity:0.3;}
            55%{opacity:1;filter:drop-shadow(0 0 10px #D4AF37);}
        }

        .star-icon {
            color: var(--gold);
            font-size: 1.5rem;
            text-shadow: 0 0 10px var(--gold);
            animation: starPulse 2s infinite ease-in-out;
        }
        @keyframes starPulse {
            0%, 100% { opacity: 0.5; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .input-system-wrapper {
            position: relative;
            width: 100%;
            height: 115px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .beveled-border {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(145deg, var(--bright-gold), var(--gold), var(--dark-gold));
            clip-path: polygon(15px 0%, calc(100% - 15px) 0%, 100% 15px, 100% calc(100% - 14px), calc(100% - 15px) 100%, 15px 100%, 0% calc(100% - 14px), 0% 15px);
        }
        .beveled-inner {
            position: absolute;
            width: calc(100% - 6px);
            height: calc(100% - 6px);
            background: linear-gradient(135deg, #2D0054, #120022);
            clip-path: polygon(14px 0%, calc(100% - 14px) 0%, 100% 14px, 100% calc(100% - 14px), calc(100% - 14px) 100%, 14px 100%, 0% calc(100% - 14px), 0% 14px);
        }
        .gold-input {
            position: relative;
            z-index: 10;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1rem;
            width: 88%;
            text-align: center;
            resize: none;
            height: 70px;
            font-weight: bold;
            font-family: var(--font);
        }
        .gold-input::placeholder { color: rgba(212,175,55,0.6); }
        .cards-stage {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin: 30px 0;
            perspective: 1000px;
        }
        .card-slot {
            flex: 1;
            position: relative;
            aspect-ratio: 2/3;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(212,175,55,0.3);
            background: #111;
        }
        .card-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.4s ease;
        }
        .slot-hourglass {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.6rem;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold), 0 0 20px rgba(212,175,55,0.5);
            animation: hgSpin 1.4s infinite ease-in-out;
            line-height: 1;
            font-style: normal;
        }
        @keyframes hgSpin {
            0%   { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
            45%  { transform: translate(-50%, -50%) rotate(180deg); opacity: 0.6; }
            50%  { transform: translate(-50%, -50%) rotate(180deg); opacity: 1; }
            95%  { transform: translate(-50%, -50%) rotate(360deg); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) rotate(360deg); opacity: 1; }
        }
        .card-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.75);
            color: var(--gold);
            font-size: 0.6rem;
            font-weight: bold;
            padding: 4px 2px;
            text-align: center;
            letter-spacing: 0.05em;
        }
        @keyframes cardFlip {
            0%   { transform: rotateY(0deg) scale(1); }
            50%  { transform: rotateY(90deg) scale(1.05); }
            100% { transform: rotateY(0deg) scale(1); }
        }
        .flipping { animation: cardFlip 0.6s ease forwards; }
        @keyframes flyOutSoft {
            0%   { transform: scale(1) rotate(0); opacity: 1; }
            100% { transform: scale(0.5) rotate(15deg) translateY(-500px); opacity: 0; }
        }
        .card-fly { animation: flyOutSoft 0.8s forwards; }
        .button-container {
            position: relative;
            width: 100%;
            margin-top: 15px;
        }
        .gold-button {
            background: linear-gradient(180deg, #FFF5C3 0%, #D4AF37 100%);
            color: #000;
            border: none;
            padding: 18px 0;
            width: 100%;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            font-size: 1.1rem;
            font-family: var(--font);
            transition: transform 0.1s;
        }
        .gold-button:active { transform: scale(0.97); }
        .gold-button:disabled { opacity: 0.7; cursor: not-allowed; }
        .gold-button .orb-spin {
            display: inline-block;
            animation: orbPulse 0.8s ease-in-out infinite;
        }
        @keyframes orbPulse {
            0%, 100% { transform: scale(1) rotate(-10deg); }
            50%       { transform: scale(1.3) rotate(10deg); }
        }
        .spiritual-pointer {
            position: absolute;
            bottom: -20px; right: -10px;
            font-size: 2.5rem;
            z-index: 10;
            transform: rotate(150deg);
            animation: handMove 1.1s infinite ease-in-out;
            filter: drop-shadow(0 0 10px var(--gold));
        }
        @keyframes handMove {
            0%, 100% { transform: translateY(0) rotate(150deg); }
            50%       { transform: translateY(-15px) rotate(150deg); }
        }
        .disclaimer-text {
            margin-top: 28px;
            font-size: 0.72rem;
            color: rgba(212,175,55,0.80);
            line-height: 1.6;
            letter-spacing: 0.03em;
            border-top: 1px solid rgba(212,175,55,0.15);
            padding-top: 12px;
        }
        #result-view {
            display: none;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .result-cards {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            width: 100%;
        }
        .result-card-item {
            flex: 1;
            max-width: 100px;
            aspect-ratio: 2/3;
            border: 2.5px solid var(--gold);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }
        .result-card-item img { width:100%; height:100%; object-fit:cover; display:block; }
        .result-card-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8);
            color: var(--gold);
            font-size: 0.55rem;
            font-weight: bold;
            padding: 3px 2px;
            text-align: center;
        }
        .result-position-label {
            color: rgba(212,175,55,0.7);
            font-size: 0.65rem;
            text-align: center;
            margin-top: 4px;
            letter-spacing: 0.1em;
        }
        .zenith-oracle-container {
            border: 4px double var(--gold);
            border-radius: 15px;
            padding: 25px;
            background: rgba(0,0,0,0.85);
            text-align: left;
            line-height: 1.9;
            box-shadow: inset 0 0 25px rgba(212,175,55,0.2);
            width: 100%;
            position: relative;
        }
        .oracle-seal {
            width: 70px; height: 70px;
            margin: 15px auto 0;
            background: url('https://omegafund.github.io/oracle-tarot-pro/images/seal_pattern.png') no-repeat center/contain;
            opacity: 0;
            transition: all 1.5s ease;
            filter: sepia(1) saturate(5) hue-rotate(-10deg);
        }
        .oracle-seal.stamped { opacity: 0.6; transform: scale(1.1); filter: drop-shadow(0 0 8px var(--gold)); }

        /* 로딩 & 진행바 */
        #ai-loading-text {
            color: var(--gold);
            text-align: center;
            padding: 15px 0 8px;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            min-height: 2em;
        }
        #oracle-progress-wrap {
            width: 100%;
            background: rgba(212,175,55,0.15);
            border-radius: 50px;
            height: 6px;
            margin: 0 0 15px;
            overflow: hidden;
            display: none;
        }
        #oracle-progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 50px;
            background: linear-gradient(90deg, #8C6212, #D4AF37, #FFF5C3);
            box-shadow: 0 0 8px rgba(212,175,55,0.7);
            transition: width 0.5s ease;
        }
        #oracle-content { color: #eee; font-size: 0.95rem; }
        #oracle-content b, #oracle-content strong { color: var(--gold); }
        #oracle-content h2, #oracle-content h3 {
            color: var(--gold);
            border-bottom: 1px solid rgba(212,175,55,0.3);
            padding-bottom: 5px;
            margin-top: 20px;
        }

        /* ③ 스트리밍 커서 깜빡임 */
        .streaming-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--gold);
            margin-left: 2px;
            vertical-align: middle;
            animation: cursorBlink 0.7s infinite;
        }
        @keyframes cursorBlink {
            0%,100%{ opacity: 1; }
            50%{ opacity: 0; }
        }
        /* ── 유료 잠금 블러 */
        .locked-section {
            position: relative;
            margin-top: 10px;
        }
        .locked-blur {
            filter: blur(5px);
            pointer-events: none;
            user-select: none;
            opacity: 0.7;
        }
        .unlock-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            width: 90%;
        }
        .unlock-btn {
            background: linear-gradient(180deg, #FFF5C3 0%, #D4AF37 100%);
            color: #000;
            border: none;
            padding: 14px 24px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1rem;
            font-family: var(--font);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(212,175,55,0.5);
            transition: transform 0.1s;
        }
        .unlock-btn:active { transform: scale(0.97); }
        .unlock-desc {
            color: rgba(212,175,55,0.8);
            font-size: 0.78rem;
            margin-top: 8px;
            letter-spacing: 0.05em;
        }

        .reset-btn {
            margin-top: 35px;
            background: none;
            border: 1.5px solid var(--gold);
            color: var(--gold);
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 1rem;
            transition: all 0.2s;
        }
        .reset-btn:hover { background: var(--gold); color: #000; }
        .particle, .gold-dust {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            border-radius: 50%;
        }
        .gold-divider {
            border: none;
            height: 4px;
            border-top: 2px solid #D4AF37;
            border-bottom: 2px solid #C5A028;
            margin: 25px 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .card-block {
            margin-bottom: 6px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(212,175,55,0.15);
            overflow: hidden;
        }
        .card-block:last-of-type { border-bottom: none; }
        .card-block h2 {
            font-size: 1rem;
            letter-spacing: 0.15em;
            color: var(--gold);
            margin: 0 0 4px 0;
            font-weight: 900;
        }
        /* 카드 이미지 — 텍스트 왼쪽에 float */
        .mini-card-float {
            float: left;
            width: 40px;
            height: 60px;
            object-fit: cover;
            border-radius: 5px;
            border: 1.5px solid rgba(212,175,55,0.6);
            margin: 2px 10px 6px 0;
            box-shadow: 0 0 8px rgba(212,175,55,0.2);
            flex-shrink: 0;
            cursor: pointer;
        }
        .card-text-wrap {
            /* float된 이미지 옆에서 텍스트 시작 */
            overflow: hidden;
        }
        .card-name-inline {
            font-size: 0.78rem;
            color: rgba(212,175,55,0.85);
            font-style: italic;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            display: block;
        }
        .card-text {
            font-size: 0.93rem;
            line-height: 1.85;
            color: rgba(255,255,255,0.88);
        }
        .synergy-reading {
            margin: 20px 0;
            padding: 16px;
            background: rgba(212,175,55,0.06);
            border: 1px solid rgba(212,175,55,0.25);
            border-radius: 10px;
            font-size: 0.93rem;
            line-height: 1.85;
            color: rgba(255,255,255,0.88);
        }
        .synergy-reading strong { color: var(--gold); }
        .final-reading {
            margin-top: 20px;
            padding: 0;
            background: transparent;
            border: none;
            font-size: 0.93rem;
            line-height: 1.85;
            color: rgba(255,255,255,0.9);
        }
        .final-reading strong { color: var(--gold); }
        .final-reading-inner {
            padding-bottom: 0;
        }
        /* 신탁 타이틀 — 녹색, 과거/현재/미래와 동일 스타일 */
        .zenith-title-block {
            margin-bottom: 6px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(46,204,113,0.4);
        }
        .zenith-title-main {
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 0.15em;
            color: #2ecc71;
            margin: 0 0 2px 0;
            display: block;
        }
        .zenith-title-sub {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: rgba(46,204,113,0.75);
            display: block;
        }
        .zenith-oracle-text {
            font-size: 0.93rem;
            line-height: 1.85;
            color: rgba(255,255,255,0.88);
        }
        .oracle-eye { font-size: 1.3rem; margin-right: 6px; }
        .guardian-energy {
            margin-top: 12px;
            padding: 12px 0 16px 0;
            border-top: 1px solid rgba(46,204,113,0.4);
            font-size: 0.93rem;
            line-height: 1.6;
            color: rgba(255,255,255,0.88);
        }
        .guardian-energy strong { color: var(--gold); }
        .oracle-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        /* ── 유료 잠금 블러 */
        .locked-section {
            position: relative;
            margin-top: 10px;
        }
        .locked-blur {
            filter: blur(5px);
            pointer-events: none;
            user-select: none;
            opacity: 0.7;
        }
        .unlock-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            width: 90%;
        }
        .unlock-btn {
            background: linear-gradient(180deg, #FFF5C3 0%, #D4AF37 100%);
            color: #000;
            border: none;
            padding: 14px 24px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1rem;
            font-family: var(--font);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(212,175,55,0.5);
            transition: transform 0.1s;
        }
        .unlock-btn:active { transform: scale(0.97); }
        .unlock-desc {
            color: rgba(212,175,55,0.8);
            font-size: 0.78rem;
            margin-top: 8px;
            letter-spacing: 0.05em;
        }
        /* 결제 모달 */
        .pay-modal-overlay {
            position: fixed;
            top:0;left:0;width:100%;height:100%;
            background: rgba(0,0,0,0.85);
            z-index: 99998;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pay-modal {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 30px 24px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            position: relative;
        }
        .pay-modal h3 {
            color: var(--gold);
            font-size: 1.2rem;
            margin: 0 0 12px;
            letter-spacing: 0.1em;
        }
        .pay-modal p {
            color: rgba(255,255,255,0.8);
            font-size: 0.88rem;
            line-height: 1.7;
            margin: 0 0 20px;
        }
        .pay-account {
            background: rgba(212,175,55,0.1);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 20px;
            text-align: left;
        }
        .pay-account div {
            color: rgba(255,255,255,0.85);
            font-size: 0.88rem;
            line-height: 1.9;
        }
        .pay-account strong { color: var(--gold); }
        .pay-confirm-btn {
            background: linear-gradient(180deg, #FFF5C3 0%, #D4AF37 100%);
            color: #000;
            border: none;
            padding: 13px 0;
            width: 100%;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1rem;
            font-family: var(--font);
            cursor: pointer;
            margin-bottom: 10px;
        }
        .pay-close-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.5);
            padding: 10px 0;
            width: 100%;
            border-radius: 50px;
            font-family: var(--font);
            cursor: pointer;
            font-size: 0.88rem;
        }

        /* ── ZEUS 타이틀 금가루 반짝임 */
        .title-sparkle {
            position: absolute;
            pointer-events: none;
            z-index: 20;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff9e0, #FFD700, #D4AF37);
            box-shadow: 0 0 6px 2px rgba(255,215,0,0.9),
                        0 0 12px 4px rgba(255,245,195,0.6);
            animation: sparkleFly var(--dur) ease-out forwards;
        }
        @keyframes sparkleFly {
            0%   { transform: translate(0,0) scale(1); opacity: 1; }
            60%  { opacity: 0.8; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0.1); opacity: 0; }
        }
        /* 별 모양 금가루 */
        .title-sparkle.star {
            width: 5px;
            height: 5px;
            border-radius: 0;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            background: #FFD700;
            box-shadow: 0 0 8px 3px rgba(255,215,0,0.8);
        }
    </style>
</head>
<body>
<div id="app-container">

    <div id="home-view">

        <!-- ✦ 아치형 별 타이틀 -->
        <div class="arch-title-wrapper">
            <div class="arch-svg-wrapper" id="titleWrapper">
                <svg viewBox="0 0 320 90" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>

<script>
// ════════════════════════════════════
//  카드 데이터 m00 ~ m77 (78장)
// ════════════════════════════════════
const CARD_NAMES = [
    'The Fool (바보)','The Magician (마법사)','The High Priestess (여교황)',

    'Nine of Pentacles','Ten of Pentacles','Page of Pentacles','Knight of Pentacles',
    'Queen of Pentacles','King of Pentacles'
];

const CARDS = Array.from({length: 78}, (_, i) => ({
    id: i,
    name: CARD_NAMES[i] || `Card ${i}`,
    file: `m${String(i).padStart(2,'0')}.jpg`

const BASE_URL = 'https://omegafund.github.io/oracle-tarot-pro/images/cards/';
let selectedCards = [];

// ════════════════════════════════════
//  홈 카드 0.5초마다 랜덤 교체
// ════════════════════════════════════
function updateSlot(idx) {
    const img  = document.getElementById(`card-img-${idx}`);
    const slot = document.getElementById(`slot-${idx}`);
    if (!img) return;
    img.style.opacity = '0';
    setTimeout(() => {
        const card = CARDS[Math.floor(Math.random() * CARDS.length)];
        img.src = `${BASE_URL}${card.file}`;
        img.onerror = () => {
            img.style.display = 'none';
            const old = slot.querySelector('.slot-hourglass');
            if (old) old.remove();
            const hg = document.createElement('div');
            hg.className = 'slot-hourglass';
            hg.textContent = '⧗';
            slot.appendChild(hg);
        };
        img.onload = () => {
            const old = slot.querySelector('.slot-hourglass');
            if (old) old.remove();
            img.style.display = 'block';
            img.style.opacity = '1';
        };
    }, 300);
}

updateSlot(0); updateSlot(1); updateSlot(2);

let homeSlotIdx = 0;
const homeInterval = setInterval(() => {
    if (document.getElementById('home-view').style.display === 'none') return;
    updateSlot(homeSlotIdx % 3);
    homeSlotIdx++;
}, 500);

// ════════════════════════════════════
//  금가루 효과
// ════════════════════════════════════
function createGoldDust(x, y) {
    for (let k = 0; k < 5; k++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size  = Math.random() * 3 + 2;
        const angle = Math.random() * 360;
        const r     = Math.random() * 25;
        p.style.cssText = `left:${x+Math.cos(angle)*r}px;top:${y+Math.sin(angle)*r}px;
            width:${size}px;height:${size}px;
            background:radial-gradient(circle,#fffbe6,#D4AF37);
            box-shadow:0 0 ${size+2}px 1px rgba(255,245,195,0.95);
            transition:all ${0.9+Math.random()*0.6}s ease-out;opacity:1;`;
        document.body.appendChild(p);
        requestAnimationFrame(() => {
            p.style.transform = `translate(${(Math.random()-.5)*30}px,${30+Math.random()*30}px)`;
            p.style.opacity = '0';
        });
        setTimeout(() => p.remove(), 1600);
    }
}
setInterval(() => {
    const ptr = document.querySelector('.spiritual-pointer');
    if (ptr && document.getElementById('home-view').style.display !== 'none') {
        const r = ptr.getBoundingClientRect();
        createGoldDust(r.left + r.width/2, r.top + r.height/2);
    }
}, 150);

function spawnGoldExplosion(slotEl) {
    const r  = slotEl.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    for (let i = 0; i < 60; i++) {
        const p     = document.createElement('div');
        p.className = 'gold-dust';
        const size  = Math.random()*4+2;
        const angle = Math.random()*360;
        const dist  = 40+Math.random()*120;
        const dx    = Math.cos(angle*Math.PI/180)*dist;
        const dy    = Math.sin(angle*Math.PI/180)*dist;
        const dur   = 600+Math.random()*600;
        const del   = Math.random()*200;
        p.style.cssText = `left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;
            background:radial-gradient(circle,#fff9e6,#FFD700);
            box-shadow:0 0 ${size+3}px 2px rgba(255,240,120,1);
            transition:transform ${dur}ms ease-out ${del}ms,opacity ${dur}ms ease-out ${del}ms;opacity:1;`;
        document.body.appendChild(p);
        requestAnimationFrame(() => requestAnimationFrame(() => {
            p.style.transform = `translate(${dx}px,${dy}px) scale(0.2)`;
            p.style.opacity   = '0';
        }));
        setTimeout(() => p.remove(), dur+del+100);
    }
}


// ════════════════════════════════════
//  ✦ ZEUS 타이틀 금가루 효과
// ════════════════════════════════════
function launchTitleSparkles() {
    const wrapper = document.getElementById('titleWrapper');
    if (!wrapper) return;
    const rect = wrapper.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    for (let i = 0; i < count; i++) {
        setTimeout(() => {
            const el = document.createElement('div');
            const isStar = Math.random() > 0.5;
            el.className = 'title-sparkle' + (isStar ? ' star' : '');

            // 타이틀 너비에 걸쳐 랜덤 시작 위치
            const startX = rect.left + Math.random() * rect.width;
            const startY = rect.top + Math.random() * rect.height * 0.8;

            // 우산형 퍼짐 (위쪽 반원)
            const angle  = Math.PI + Math.random() * Math.PI; // 180~360도 (위쪽)
            const dist   = 30 + Math.random() * 60;
            const tx     = Math.cos(angle) * dist;
            const ty     = Math.sin(angle) * dist - 20;
            const dur    = 0.8 + Math.random() * 0.7;

            el.style.cssText = `
                left: ${startX}px;
                top:  ${startY}px;
                position: fixed;
                --tx: ${tx}px;
                --ty: ${ty}px;
                --dur: ${dur}s;
            `;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), dur * 1000 + 100);
        }, i * 60);
    }
}

// 3초마다 금가루 발사
setInterval(() => {
    if (document.getElementById('home-view').style.display !== 'none') {
        launchTitleSparkles();
    }
}, 3000);
// 첫 로딩 시 즉시 발사
setTimeout(launchTitleSparkles, 500);

// ════════════════════════════════════
//  영성적 싱크로니시티 카드 선택
// ════════════════════════════════════
function pickThreeCards(question) {
    const now = Date.now();
    let hash = now;
    for (let i = 0; i < question.length; i++) {
        hash = ((hash << 5) - hash) + question.charCodeAt(i);
        hash |= 0;
    }
    let s = Math.abs(hash);
    const rand = () => {
        s = (s * 1664525 + 1013904223) & 0xffffffff;
        return (s >>> 0) / 0xffffffff;
    };
    return [...CARDS].sort(() => rand() - 0.5).slice(0, 3);
}

// ════════════════════════════════════
//  ① 병렬실행: 메인 리추얼
//  카드 애니메이션 시작과 동시에 API 호출
// ════════════════════════════════════
async function startRitual() {
    const question = document.getElementById('seed-input').value.trim();
    if (!question) { alert('질문을 입력해주세요.'); return; }

    const btn = document.getElementById('ritual-btn');
    btn.disabled = true;
    btn.innerHTML = '신탁을 소환하는 중 <span class="orb-spin">🔮</span>';

    clearInterval(homeInterval);
    selectedCards = pickThreeCards(question);

    // ① 핵심: API 호출을 애니메이션과 동시에 시작
    const streamPromise = startStreamFetch(question, selectedCards);

    // 카드 플립 애니메이션 (API와 병렬 진행)
    for (let i = 0; i < 3; i++) {
        await flipCard(i, selectedCards[i]);
        await delay(300);
    }
    await delay(800);

    for (let i = 0; i < 3; i++) {
        const slot = document.getElementById(`slot-${i}`);
        const img  = document.getElementById(`card-img-${i}`);
        if (slot) spawnGoldExplosion(slot);
        if (img)  img.classList.add('card-fly');
        await delay(200);
    }
    await delay(700);

    // 결과창 열기 → 이미 진행 중인 스트림 결과를 꽂음
    showResultView(question, streamPromise);
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function flipCard(index, card) {
    return new Promise(resolve => {
        const img  = document.getElementById(`card-img-${index}`);
        const slot = document.getElementById(`slot-${index}`);
        img.classList.add('flipping');
        setTimeout(() => {
            img.src = `${BASE_URL}${card.file}`;
            img.onerror = () => {
                img.style.display = 'none';
                const old = slot.querySelector('.slot-hourglass');
                if (old) old.remove();
                const hg = document.createElement('div');
                hg.className = 'slot-hourglass';
                hg.textContent = '⧗';
                slot.appendChild(hg);
            };
            img.classList.remove('flipping');
            resolve();
        }, 300);
    });
}

// ════════════════════════════════════
//  결과창 렌더링
// ════════════════════════════════════
function showResultView(question, streamPromise) {
    document.getElementById('home-view').style.display = 'none';
    const positions = ['과 거','현 재','미 래'];
    document.getElementById('result-cards-container').innerHTML =
        selectedCards.map((card, i) => `
        <div style="flex:1;max-width:100px;display:flex;flex-direction:column;align-items:center;">
            <div class="result-card-item">
                <img src="${BASE_URL}${card.file}" alt="${card.name}"
                     onerror="this.src='${BASE_URL}back.jpg'">
                <div class="result-card-label">${card.name}</div>
            </div>
            <div class="result-position-label">${positions[i]}</div>
        </div>`).join('');

    const rv = document.getElementById('result-view');
    rv.style.display = 'flex';
    requestAnimationFrame(() => requestAnimationFrame(() => { rv.style.opacity = '1'; }));

    // 이미 진행 중인 스트림을 화면에 연결
    renderStream(streamPromise, selectedCards);
}

// ════════════════════════════════════
//  ① 병렬 API 호출 시작 (응답 객체만 반환)
// ════════════════════════════════════
async function startStreamFetch(userQuestion, cards) {
    const cardNames     = cards.map(c => c.name).join(', ');
    const cardPositions = cards.map((c, i) => `${['과거','현재','미래'][i]}: ${c.name}`).join(', ');
    const sessionToken  = localStorage.getItem('oracleSessionToken') || '';

    const controller = new AbortController();
    setTimeout(() => controller.abort(), 30000);

    return fetch('https://tarot-api.omegafund01.workers.dev', {
        method: 'POST',
        headers: {
            'Content-Type':    'application/json',
            'x-session-token': sessionToken
        },
        body: JSON.stringify({
            prompt:        userQuestion,
            cardNames:     cardNames,
            cardPositions: cardPositions,
            isReversed:    '없음',
            userName:      (window._oracleUserName || '유저님')
        }),
        signal: controller.signal
    });
}

// ════════════════════════════════════
//  ③ 응답 수신 + 유료/무료 분기 렌더링
// ════════════════════════════════════
async function renderStream(fetchPromise, cards) {
    const loadingEl    = document.getElementById('ai-loading-text');
    const contentEl    = document.getElementById('oracle-content');
    const progressWrap = document.getElementById('oracle-progress-wrap');
    const progressBar  = document.getElementById('oracle-progress-bar');

    loadingEl.style.display    = 'block';
    progressWrap.style.display = 'block';
    contentEl.innerHTML        = '';

    const loadingMessages = [
        '✨ 천상의 기운을 감지 중...',
        '🔮 운명의 카드를 해독 중...',
        '⚡ 2026년 데이터와 교신 중...',
        '🌌 신탁의 언어로 번역 중...',
        '📜 오라클이 응답을 준비 중...',
        '✦ 거의 완성되었습니다...'
    ];

    let msgIdx = 0, progressVal = 5;
    loadingEl.textContent = loadingMessages[0];
    progressBar.style.width = '5%';

    const loadingTimer = setInterval(() => {
        msgIdx = Math.min(msgIdx + 1, loadingMessages.length - 1);
        loadingEl.textContent = loadingMessages[msgIdx];
        progressVal = Math.min(progressVal + 14, 90);
        progressBar.style.width = progressVal + '%';
    }, 2800);

    try {
        const response = await fetchPromise;
        clearInterval(loadingTimer);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const reader  = response.body.getReader();
        const decoder = new TextDecoder();

        loadingEl.style.display    = 'none';
        progressWrap.style.display = 'none';
        progressBar.style.width    = '100%';

        const cursor = document.createElement('span');
        cursor.className = 'streaming-cursor';
        contentEl.appendChild(cursor);

        let buffer   = '';
        let fullText = '';

        // ── SSE 스트리밍 수신 — 전체 텍스트 누적
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const jsonStr = line.slice(6).trim();
                if (jsonStr === '[DONE]') continue;
                try {
                    const parsed = JSON.parse(jsonStr);
                    const chunk  = parsed?.candidates?.[0]?.content?.parts?.[0]?.text || '';
                    if (!chunk) continue;
                    fullText += chunk;

                    // 스트리밍 중: 전체 텍스트 실시간 렌더 (미래/신탁 포함)
                    // → 완료 후 유료 분기에서 블러 처리
                    cursor.remove();
                    contentEl.innerHTML = renderText(fullText, cards);
                    contentEl.appendChild(cursor);
                } catch(_) {}
            }
        }

        // ── 스트리밍 완료
        cursor.remove();

        // ── 유료 판별 (다중 조건)
        const isTestMode = window.location.hostname === 'localhost'
            || window.location.search.includes('admin=true');
        const testPass   = localStorage.getItem('oracleTestPass') === 'true';
        const xPaid      = response.headers.get('X-Paid') === 'true';
        const token      = localStorage.getItem('oracleSessionToken') || '';
        const isPaid     = isTestMode || testPass || (xPaid && token.length > 10);

        if (isPaid) {
            // ── 유료/테스트: 전체 그대로
            contentEl.innerHTML = renderText(fullText, cards);
        } else {
            // ── 무료: renderText로 전체 렌더 후
            //    미래 카드 div + 신탁 div만 블러 처리
            contentEl.innerHTML = renderText(fullText, cards);

            // 미래 card-block (3번째) 과 final-reading 에 블러 적용
            const cardBlocks = contentEl.querySelectorAll('.card-block');
            const finalReading = contentEl.querySelector('.final-reading');

            // 미래 카드 (index 2) 이후를 잠금
            if (cardBlocks.length >= 3) {
                // 미래 카드부터 끝까지 묶어서 블러 처리
                const lockWrapper = document.createElement('div');
                lockWrapper.className = 'locked-section';

                const blurDiv = document.createElement('div');
                blurDiv.className = 'locked-blur';

                // 미래 카드 블록 이동
                const futureBlock = cardBlocks[2];
                blurDiv.appendChild(futureBlock.cloneNode(true));

                // 신탁 블록 이동
                if (finalReading) {
                    blurDiv.appendChild(finalReading.cloneNode(true));
                    finalReading.remove();
                }
                futureBlock.replaceWith(lockWrapper);

                lockWrapper.appendChild(blurDiv);
                lockWrapper.innerHTML += `
                    <div class="unlock-overlay">
                        <button class="unlock-btn" onclick="showPayModal()">
                            🔓 미래 신탁 전체 보기
                        </button>
                        <div class="unlock-desc">프리미엄 전체 점사를 확인하세요</div>
                    </div>`;
            }
        }

        setTimeout(() => {
            const seal = document.getElementById('oracle-seal');
            if (seal) seal.classList.add('stamped');
        }, 800);

    } catch (error) {
        clearInterval(loadingTimer);
        loadingEl.style.display    = 'none';
        progressWrap.style.display = 'none';
        contentEl.innerHTML = `
            <div style="color:#ff6b6b;padding:20px;border:1px solid #ff6b6b;border-radius:10px;">
                <strong>⚠️ 연결 실패</strong><br><br>
                <pre style="white-space:pre-wrap;font-size:0.8rem;color:#eee;">${error.message}</pre>
            </div>`;
    }
}

// ════════════════════════════════════
//  텍스트 → HTML 변환
//  [과거]/[현재]/[미래]/[제우스의 신탁] 섹션 분리 렌더
//  또는 워커 HTML 태그 직접 렌더 (두 방식 모두 지원)
// ════════════════════════════════════
function renderText(text, cards) {

    // ══════════════════════════════════════════
    // 전처리: 신탁 시작점을 [[ZEUS]]로 정규화
    // Gemini가 어떤 형태로 보내도 전부 잡음
    // ══════════════════════════════════════════
    let t0 = text
        .replace(/👁/g, '')
        .replace(/\[합산 과정:[^\]]*\]/g, '')
        .replace(/✦\s*카드\s*흐름\s*종합\s*독해\s*✦[^]*?(?=👁|제우스|ZENITH|\[\[|$)/g, '');

    // 신탁 헤더 정규화 — 가장 넓은 패턴부터 좁은 순서로
    // 패턴1: 제우스 운명의 신탁ZEUS DESTINY ORACLE (붙어있음)
    t0 = t0.replace(/제우스\s*운명의?\s*신탁\s*ZEUS\s*DESTINY\s*ORACLE/g, '[[ZENITH]]');
    // 패턴2: 👁\n제우스 운명의 신탁\nZEUS (여러줄)
    t0 = t0.replace(/👁\s*[\n\r]*\s*제우스\s*운명의?\s*[\n\r]*\s*신탁\s*[\n\r]*\s*(?:ZEUS\s*DESTINY\s*ORACLE)?/g, '[[ZENITH]]');
    // 패턴3: 제우스 운명의 신탁 (단독, 줄바꿈 포함)
    t0 = t0.replace(/제우스\s*운명의?\s*신탁/g, '[[ZENITH]]');
    // 패턴4: 남은 👁 단독 (신탁 마커로 처리)
    t0 = t0.replace(/👁\s*[\n\r]*/g, '[[ZENITH]]');
    // 패턴5: ZEUS DESTINY ORACLE 단독 잔재 제거
    t0 = t0.replace(/ZEUS\s*DESTINY\s*ORACLE/g, '');
    // [[ZEUS]] 중복 제거
    t0 = t0.replace(/\[\[ZENITH\]\]\s*\[\[ZENITH\]\]/g, '[[ZENITH]]');
    t0 = t0.replace(/(\[\[ZENITH\]\][^]*?)\[\[ZENITH\]\]/g, '$1');
    // 수호에너지 이후 제거
    t0 = t0.replace(/🌙[^]*/g, '');
    // 빈줄 압축
    t0 = t0.replace(/\n{3,}/g, '\n\n');

    const formatChunk = t => (t || '').trim()
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/^#{1,3}\s(.+)/gm, '<h3>$1</h3>')
        .replace(/\n{2,}/g, '\n')
        .replace(/\n/g, '<br>');

    const labels = ['과거','현재','미래'];

    // ── 신탁 분리
    const zIdx = t0.indexOf('[[ZENITH]]');
    let mainText   = zIdx > -1 ? t0.substring(0, zIdx).trim() : t0.trim();
    let oracleText = zIdx > -1 ? t0.substring(zIdx + 10).trim() : '';

    // ── 카드 섹션 분리
    let introPart = '';
    let cardTexts = ['','',''];

    const secRe = /(?:^|\n)[ \t]*(과거|현재|미래)[ \t]*(?:\n|$)/g;
    const allM  = [...mainText.matchAll(secRe)];
    const mP = allM.find(m => m[1]==='과거');
    const mC = allM.find(m => m[1]==='현재');
    const mF = allM.find(m => m[1]==='미래');

    if (mP && mC && mF) {
        const getAfter = m => {
            const nl = mainText.indexOf('\n', m.index + m[0].length - 1);
            return nl > -1 ? nl + 1 : m.index + m[0].length;
        };
        introPart    = mainText.substring(0, mP.index).trim();
        cardTexts[0] = mainText.substring(getAfter(mP), mC.index).trim();
        cardTexts[1] = mainText.substring(getAfter(mC), mF.index).trim();
        cardTexts[2] = mainText.substring(getAfter(mF)).trim();
    } else if (cards && cards.length === 3) {
        const pos2 = cards.map(c => mainText.indexOf(c.name.split(' (')[0]));
        if (pos2[0]>-1 && pos2[1]>-1 && pos2[2]>-1) {
            introPart    = mainText.substring(0, pos2[0]).trim();
            cardTexts[0] = mainText.substring(pos2[0], pos2[1]).replace(/^[^\n]*\n/,'').trim();
            cardTexts[1] = mainText.substring(pos2[1], pos2[2]).replace(/^[^\n]*\n/,'').trim();
            cardTexts[2] = mainText.substring(pos2[2]).replace(/^[^\n]*\n/,'').trim();
        } else {
            introPart = mainText.trim();
        }
    } else {
        introPart = mainText.trim();
    }

    // 카드명 + 중복 레이블 제거
    cardTexts = cardTexts.map((t, i) => {
        let r = t.replace(/^[ \t]*(과거|현재|미래)[ \t]*\n?/,'').trim();
        if (cards && cards[i]) {
            const n = cards[i].name.split(' (')[0];
            r = r.replace(new RegExp('^'+n.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'[^\n]*\n?','i'),'').trim();
        }
        return r;
    });

    // ── 카드 렌더
    const cardSections = (cards || []).map((card, i) => `
        <div class="card-block">
            <h2>${labels[i]}</h2>
            <img src="${BASE_URL}${card.file}" class="mini-card-float"
                 onclick="expandCard(this)"
                 onerror="this.style.display='none'">
            <div class="card-text-wrap">
                <span class="card-name-inline">${card.name}</span>
                <div class="card-text">${formatChunk(cardTexts[i])}</div>
            </div>
        </div>`).join('');

    const introHtml = introPart
        ? `<div style="margin-bottom:8px;color:rgba(255,255,255,0.85);line-height:1.75;font-size:0.9rem;">${formatChunk(introPart)}</div>`
        : '';

    // ── 신탁 렌더 — 항상 동일한 2줄 타이틀
    const oracleHtml = oracleText ? `
        <div class="final-reading">
            <div class="final-reading-inner">
                <div class="zenith-title-block">
                    <span class="zenith-title-main">제우스의 신탁</span>
                    <span class="zenith-title-sub">ZEUS DESTINY ORACLE</span>
                </div>
                <div class="zenith-oracle-text">${formatChunk(oracleText)}</div>
            </div>
        </div>` : '';

    return introHtml + cardSections + oracleHtml;
}

// ════════════════════════════════════
function showPayModal() {
    const overlay = document.createElement('div');
    overlay.className = 'pay-modal-overlay';
    overlay.id = 'payModalOverlay';
    overlay.innerHTML = `
        <div class="pay-modal">
            <h3>✦ 프리미엄 신탁 ✦</h3>
            <p>미래 카드 해석과 제우스의 신탁 전체를<br>확인하실 수 있습니다.</p>
            <div class="pay-account">
                <div><strong>입금 금액</strong>: ₩2,900</div>
                <div><strong>입금 은행</strong>: [은행명]</div>
                <div><strong>계좌번호</strong>: [계좌번호]</div>
                <div><strong>예금주</strong>: [예금주명]</div>
            </div>
            <p style="font-size:0.78rem;color:rgba(212,175,55,0.6);margin-bottom:16px;">
                입금 확인 후 아래 버튼을 눌러주세요.<br>
                (테스트 모드: 바로 확인 가능)
            </p>
            <button class="pay-confirm-btn" onclick="confirmPayment()">
                ✅ 입금 완료 — 전체 보기
            </button>
            <button class="pay-close-btn" onclick="closePayModal()">
                닫기
            </button>
        </div>`;
    document.body.appendChild(overlay);
}

function closePayModal() {
    const el = document.getElementById('payModalOverlay');
    if (el) el.remove();
}

async function confirmPayment() {
    const btn = document.querySelector('.pay-confirm-btn');
    if (btn) { btn.disabled = true; btn.textContent = '확인 중...'; }

    try {
        const res = await fetch('https://tarot-api.omegafund01.workers.dev/verify-payment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentKey: 'TEST-PAY-2900' })
        });
        const data = await res.json();
        if (data.ok && data.token) {
            localStorage.setItem('oracleSessionToken', data.token);
        }
    } catch(e) {
        console.warn('verify-payment 오류 (무시):', e.message);
    }

    // ✅ 테스트 플래그 — 워커 성공/실패 무관하게 즉시 전체 공개
    localStorage.setItem('oracleTestPass', 'true');
    closePayModal();

    // 전체 공개 버전으로 재조회
    if (selectedCards && selectedCards.length > 0) {
        const contentEl = document.getElementById('oracle-content');
        if (contentEl) contentEl.innerHTML = '';
        const q = (document.getElementById('seed-input') || {}).value || '재조회';
        const streamPromise = startStreamFetch(q, selectedCards);
        renderStream(streamPromise, selectedCards);
    } else {
        location.reload();
    }
}
