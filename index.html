<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ORACLE TAROT PRO</title>
    <style>
        :root {
            --gold: #D4AF37;
            --bright-gold: #FFF5C3;
            --dark-gold: #8C6212;
            --bg: #000;
            --text: #fff;
            --font: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            overflow-x: hidden;
        }
        #app-container {
            max-width: 500px;
            width: 100%;
            padding: 50px 25px 40px 25px;
            text-align: center;
            position: relative;
            margin: 0 auto;
            border-left: 1px solid rgba(212,175,55,0.15);
            border-right: 1px solid rgba(212,175,55,0.15);
            min-height: 100vh;
        }

        /* ════════════════════════════════════
           ✦ 아치형 별 타이틀 영역
        ════════════════════════════════════ */
        .arch-title-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 4px;
            padding-top: 10px;
        }
        .arch-svg-wrapper {
            position: relative;
            width: 320px;
            height: 90px;
            margin: 0 auto;
        }
        .arch-svg-wrapper svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: visible;
        }
        .gold-title {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            text-align: center;
            z-index: 2;
            color: var(--gold);
            font-size: 2.3rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 0.3em;
            text-shadow: 0 0 15px rgba(212,175,55,0.6), 0 0 30px rgba(212,175,55,0.3);
            line-height: 1;
        }
        .sub-title {
            color: var(--gold);
            font-size: 0.95rem;
            letter-spacing: 0.5em;
            margin-top: 6px;
            margin-bottom: 20px;
            display: block;
            font-weight: 800;
        }

        /* ════════════════════════════════════
           ✦ 아치 별 깜빡임 애니메이션
        ════════════════════════════════════ */
        @keyframes archStarTwinkle1 {
            0%,100%{opacity:0.2;}
            50%{opacity:1;filter:drop-shadow(0 0 8px #FFF5C3) drop-shadow(0 0 16px #D4AF37);}
        }
        @keyframes archStarTwinkle2 {
            0%,100%{opacity:0.5;}
            40%{opacity:1;filter:drop-shadow(0 0 10px #FFF5C3);}
        }
        @keyframes archStarTwinkle3 {
            0%,100%{opacity:0.15;}
            60%{opacity:0.9;filter:drop-shadow(0 0 6px #D4AF37);}
        }
        @keyframes archStarTwinkle4 {
            0%,100%{opacity:0.7;}
            30%{opacity:0.2;}
            70%{opacity:1;filter:drop-shadow(0 0 12px #FFF5C3);}
        }
        @keyframes archStarTwinkle5 {
            0%,100%{opacity:0.3;}
            55%{opacity:1;filter:drop-shadow(0 0 10px #D4AF37);}
        }

        .star-icon {
            color: var(--gold);
            font-size: 1.5rem;
            text-shadow: 0 0 10px var(--gold);
            animation: starPulse 2s infinite ease-in-out;
        }
        @keyframes starPulse {
            0%, 100% { opacity: 0.5; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .input-system-wrapper {
            position: relative;
            width: 100%;
            height: 115px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .beveled-border {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(145deg, var(--bright-gold), var(--gold), var(--dark-gold));
            clip-path: polygon(15px 0%, calc(100% - 15px) 0%, 100% 15px, 100% calc(100% - 14px), calc(100% - 15px) 100%, 15px 100%, 0% calc(100% - 14px), 0% 15px);
        }
        .beveled-inner {
            position: absolute;
            width: calc(100% - 6px);
            height: calc(100% - 6px);
            background: linear-gradient(135deg, #2D0054, #120022);
            clip-path: polygon(14px 0%, calc(100% - 14px) 0%, 100% 14px, 100% calc(100% - 14px), calc(100% - 14px) 100%, 14px 100%, 0% calc(100% - 14px), 0% 14px);
        }
        .gold-input {
            position: relative;
            z-index: 10;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1rem;
            width: 88%;
            text-align: center;
            resize: none;
            height: 70px;
            font-weight: bold;
            font-family: var(--font);
        }
        .gold-input::placeholder { color: rgba(212,175,55,0.6); }
        .cards-stage {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin: 30px 0;
            perspective: 1000px;
        }
        .card-slot {
            flex: 1;
            position: relative;
            aspect-ratio: 2/3;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(212,175,55,0.3);
            background: #111;
        }
        .card-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.4s ease;
        }
        .slot-hourglass {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.6rem;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold), 0 0 20px rgba(212,175,55,0.5);
            animation: hgSpin 1.4s infinite ease-in-out;
            line-height: 1;
            font-style: normal;
        }
        @keyframes hgSpin {
            0%   { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
            45%  { transform: translate(-50%, -50%) rotate(180deg); opacity: 0.6; }
            50%  { transform: translate(-50%, -50%) rotate(180deg); opacity: 1; }
            95%  { transform: translate(-50%, -50%) rotate(360deg); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) rotate(360deg); opacity: 1; }
        }
        .card-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.75);
            color: var(--gold);
            font-size: 0.6rem;
            font-weight: bold;
            padding: 4px 2px;
            text-align: center;
            letter-spacing: 0.05em;
        }
        @keyframes cardFlip {
            0%   { transform: rotateY(0deg) scale(1); }
            50%  { transform: rotateY(90deg) scale(1.05); }
            100% { transform: rotateY(0deg) scale(1); }
        }
        .flipping { animation: cardFlip 0.6s ease forwards; }
        @keyframes flyOutSoft {
            0%   { transform: scale(1) rotate(0); opacity: 1; }
            100% { transform: scale(0.5) rotate(15deg) translateY(-500px); opacity: 0; }
        }
        .card-fly { animation: flyOutSoft 0.8s forwards; }
        .button-container {
            position: relative;
            width: 100%;
            margin-top: 15px;
        }
        .gold-button {
            background: linear-gradient(180deg, #FFF5C3 0%, #D4AF37 100%);
            color: #000;
            border: none;
            padding: 18px 0;
            width: 100%;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            font-size: 1.1rem;
            font-family: var(--font);
            transition: transform 0.1s;
        }
        .gold-button:active { transform: scale(0.97); }
        .gold-button:disabled { opacity: 0.7; cursor: not-allowed; }
        .gold-button .orb-spin {
            display: inline-block;
            animation: orbPulse 0.8s ease-in-out infinite;
        }
        @keyframes orbPulse {
            0%, 100% { transform: scale(1) rotate(-10deg); }
            50%       { transform: scale(1.3) rotate(10deg); }
        }
        .spiritual-pointer {
            position: absolute;
            bottom: -20px; right: -10px;
            font-size: 2.5rem;
            z-index: 10;
            transform: rotate(150deg);
            animation: handMove 1.1s infinite ease-in-out;
            filter: drop-shadow(0 0 10px var(--gold));
        }
        @keyframes handMove {
            0%, 100% { transform: translateY(0) rotate(150deg); }
            50%       { transform: translateY(-15px) rotate(150deg); }
        }
        .disclaimer-text {
            margin-top: 28px;
            font-size: 0.72rem;
            color: rgba(212,175,55,0.55);
            line-height: 1.6;
            letter-spacing: 0.03em;
            border-top: 1px solid rgba(212,175,55,0.15);
            padding-top: 12px;
        }
        #result-view {
            display: none;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .result-cards {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            width: 100%;
        }
        .result-card-item {
            flex: 1;
            max-width: 100px;
            aspect-ratio: 2/3;
            border: 2.5px solid var(--gold);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }
        .result-card-item img { width:100%; height:100%; object-fit:cover; display:block; }
        .result-card-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8);
            color: var(--gold);
            font-size: 0.55rem;
            font-weight: bold;
            padding: 3px 2px;
            text-align: center;
        }
        .result-position-label {
            color: rgba(212,175,55,0.7);
            font-size: 0.65rem;
            text-align: center;
            margin-top: 4px;
            letter-spacing: 0.1em;
        }
        .zenith-oracle-container {
            border: 4px double var(--gold);
            border-radius: 15px;
            padding: 25px;
            background: rgba(0,0,0,0.85);
            text-align: left;
            line-height: 1.9;
            box-shadow: inset 0 0 25px rgba(212,175,55,0.2);
            width: 100%;
            position: relative;
        }
        .oracle-seal {
            width: 70px; height: 70px;
            margin: 15px auto 0;
            background: url('https://omegafund.github.io/oracle-tarot-pro/images/seal_pattern.png') no-repeat center/contain;
            opacity: 0;
            transition: all 1.5s ease;
            filter: sepia(1) saturate(5) hue-rotate(-10deg);
        }
        .oracle-seal.stamped { opacity: 0.6; transform: scale(1.1); filter: drop-shadow(0 0 8px var(--gold)); }

        /* 로딩 & 진행바 */
        #ai-loading-text {
            color: var(--gold);
            text-align: center;
            padding: 15px 0 8px;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            min-height: 2em;
        }
        #oracle-progress-wrap {
            width: 100%;
            background: rgba(212,175,55,0.15);
            border-radius: 50px;
            height: 6px;
            margin: 0 0 15px;
            overflow: hidden;
            display: none;
        }
        #oracle-progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 50px;
            background: linear-gradient(90deg, #8C6212, #D4AF37, #FFF5C3);
            box-shadow: 0 0 8px rgba(212,175,55,0.7);
            transition: width 0.5s ease;
        }
        #oracle-content { color: #eee; font-size: 0.95rem; }
        #oracle-content b, #oracle-content strong { color: var(--gold); }
        #oracle-content h2, #oracle-content h3 {
            color: var(--gold);
            border-bottom: 1px solid rgba(212,175,55,0.3);
            padding-bottom: 5px;
            margin-top: 20px;
        }

        /* ③ 스트리밍 커서 깜빡임 */
        .streaming-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--gold);
            margin-left: 2px;
            vertical-align: middle;
            animation: cursorBlink 0.7s infinite;
        }
        @keyframes cursorBlink {
            0%,100%{ opacity: 1; }
            50%{ opacity: 0; }
        }

        .reset-btn {
            margin-top: 35px;
            background: none;
            border: 1.5px solid var(--gold);
            color: var(--gold);
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 1rem;
            transition: all 0.2s;
        }
        .reset-btn:hover { background: var(--gold); color: #000; }
        .particle, .gold-dust {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            border-radius: 50%;
        }
        .gold-divider {
            border: none;
            height: 4px;
            border-top: 2px solid #D4AF37;
            border-bottom: 2px solid #C5A028;
            margin: 25px 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .card-block {
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(212,175,55,0.15);
            overflow: hidden;
        }
        .card-block:last-of-type { border-bottom: none; }
        .card-block h2 {
            font-size: 1rem;
            letter-spacing: 0.15em;
            color: var(--gold);
            margin: 0 0 10px 0;
            font-weight: 900;
        }
        /* 카드 이미지 — 텍스트 왼쪽에 float */
        .mini-card-float {
            float: left;
            width: 40px;
            height: 60px;
            object-fit: cover;
            border-radius: 5px;
            border: 1.5px solid rgba(212,175,55,0.6);
            margin: 2px 10px 6px 0;
            box-shadow: 0 0 8px rgba(212,175,55,0.2);
            flex-shrink: 0;
        }
        .card-text-wrap {
            /* float된 이미지 옆에서 텍스트 시작 */
            overflow: hidden;
        }
        .card-name-inline {
            font-size: 0.78rem;
            color: rgba(212,175,55,0.85);
            font-style: italic;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            display: block;
        }
        .card-text {
            font-size: 0.93rem;
            line-height: 1.85;
            color: rgba(255,255,255,0.88);
        }
        .synergy-reading {
            margin: 20px 0;
            padding: 16px;
            background: rgba(212,175,55,0.06);
            border: 1px solid rgba(212,175,55,0.25);
            border-radius: 10px;
            font-size: 0.93rem;
            line-height: 1.85;
            color: rgba(255,255,255,0.88);
        }
        .synergy-reading strong { color: var(--gold); }
        .final-reading {
            margin-top: 24px;
            padding: 20px;
            background: rgba(212,175,55,0.08);
            border: 2px solid rgba(212,175,55,0.4);
            border-radius: 12px;
            font-size: 0.93rem;
            line-height: 1.85;
            color: rgba(255,255,255,0.9);
        }
        .final-reading strong { color: var(--gold); }
        .oracle-eye { font-size: 1.3rem; margin-right: 6px; }
        .guardian-energy {
            margin-top: 20px;
            padding: 16px;
            background: rgba(100,80,180,0.08);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 10px;
            font-size: 0.93rem;
            line-height: 1.85;
            color: rgba(255,255,255,0.88);
        }
        .guardian-energy strong { color: var(--gold); }
        .oracle-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
<div id="app-container">

    <div id="home-view">

        <!-- ✦ 아치형 별 타이틀 -->
        <div class="arch-title-wrapper">
            <div class="arch-svg-wrapper">
                <svg viewBox="0 0 320 90" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    <circle cx="18"  cy="72" r="3"   fill="#D4AF37" filter="url(#glow)" style="animation:archStarTwinkle3 2.1s infinite ease-in-out;"/>
                    <circle cx="38"  cy="52" r="2.5" fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle1 1.7s 0.3s infinite ease-in-out;"/>
                    <circle cx="58"  cy="34" r="4"   fill="#D4AF37" filter="url(#glow)" style="animation:archStarTwinkle5 2.4s 0.6s infinite ease-in-out;"/>
                    <circle cx="82"  cy="18" r="3"   fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle2 1.9s 0.1s infinite ease-in-out;"/>
                    <circle cx="110" cy="7"  r="3.5" fill="#D4AF37" filter="url(#glow)" style="animation:archStarTwinkle4 2.2s 0.8s infinite ease-in-out;"/>
                    <circle cx="140" cy="2"  r="4.5" fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle1 1.5s 0.4s infinite ease-in-out;"/>
                    <circle cx="160" cy="1"  r="5.5" fill="#FFD700" filter="url(#glow)" style="animation:archStarTwinkle5 1.3s 0s   infinite ease-in-out;"/>
                    <circle cx="180" cy="2"  r="4.5" fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle1 1.5s 0.5s infinite ease-in-out;"/>
                    <circle cx="210" cy="7"  r="3.5" fill="#D4AF37" filter="url(#glow)" style="animation:archStarTwinkle4 2.2s 0.2s infinite ease-in-out;"/>
                    <circle cx="238" cy="18" r="3"   fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle2 1.9s 0.7s infinite ease-in-out;"/>
                    <circle cx="262" cy="34" r="4"   fill="#D4AF37" filter="url(#glow)" style="animation:archStarTwinkle5 2.4s 0.3s infinite ease-in-out;"/>
                    <circle cx="282" cy="52" r="2.5" fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle1 1.7s 0.9s infinite ease-in-out;"/>
                    <circle cx="302" cy="72" r="3"   fill="#D4AF37" filter="url(#glow)" style="animation:archStarTwinkle3 2.1s 0.5s infinite ease-in-out;"/>
                    <circle cx="48"  cy="44" r="1.5" fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle2 1.1s 0.2s infinite ease-in-out;"/>
                    <circle cx="96"  cy="11" r="2"   fill="#FFD700" filter="url(#glow)" style="animation:archStarTwinkle4 1.8s 0.6s infinite ease-in-out;"/>
                    <circle cx="224" cy="11" r="2"   fill="#FFD700" filter="url(#glow)" style="animation:archStarTwinkle4 1.8s 0.3s infinite ease-in-out;"/>
                    <circle cx="272" cy="44" r="1.5" fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle2 1.1s 0.7s infinite ease-in-out;"/>
                </svg>
                <h1 class="gold-title">ORACLE TAROT</h1>
            </div>
            <span class="sub-title">PRO · MASTERPIECE</span>
        </div>

        <div class="input-system-wrapper">
            <div class="beveled-border"></div>
            <div class="beveled-inner"></div>
            <textarea id="seed-input" class="gold-input" placeholder="마음의 질문을 깊게 새기소서
(입력후 아래 신탁확인창을 누르세요)"></textarea>
        </div>

        <div class="cards-stage">
            <div class="card-slot" id="slot-0">
                <img id="card-img-0" src="" alt="카드">
                <div class="card-label">과 거</div>
            </div>
            <div class="card-slot" id="slot-1">
                <img id="card-img-1" src="" alt="카드">
                <div class="card-label">현 재</div>
            </div>
            <div class="card-slot" id="slot-2">
                <img id="card-img-2" src="" alt="카드">
                <div class="card-label">미 래</div>
            </div>
        </div>

        <div class="button-container">
            <button class="gold-button" id="ritual-btn" onclick="startRitual()">운명의 3대 신탁 확인</button>
            <div class="spiritual-pointer">👇</div>
        </div>

        <div class="disclaimer-text">
            ✦ 본 서비스는 영성적 매칭 알고리즘과 AI 기반의 타로 해석을 제공합니다 ✦<br>
            참고용 콘텐츠이며, 실제 투자·법률·의료 판단의 근거로 사용하지 마십시오.
        </div>
    </div>

    <div id="result-view">
        <div style="display:flex;align-items:center;justify-content:center;gap:15px;margin-bottom:5px;">
            <span class="star-icon">✧</span>
            <h1 class="gold-title" style="position:static;font-size:1.8rem;margin:0;">제니스 운명의 신탁</h1>
            <span class="star-icon">✧</span>
        </div>
        <span class="sub-title" style="font-size:0.8rem;">ZENITH DESTINY ORACLE</span>

        <div class="result-cards" id="result-cards-container"></div>

        <div class="zenith-oracle-container">
            <div id="ai-loading-text"></div>
            <div id="oracle-progress-wrap">
                <div id="oracle-progress-bar"></div>
            </div>
            <div id="oracle-content"></div>
            <!-- seal_pattern.png 404 방지: seal 제거 -->
        </div>

        <button class="reset-btn" onclick="location.reload()">✦ 처음으로 돌아가기 ✦</button>
    </div>

</div>
<script>
// ════════════════════════════════════
//  카드 데이터 m00 ~ m77 (78장)
// ════════════════════════════════════
const CARD_NAMES = [
    'The Fool (바보)','The Magician (마법사)','The High Priestess (여교황)',
    'The Empress (여황제)','The Emperor (황제)','The Hierophant (교황)',
    'The Lovers (연인)','The Chariot (전차)','Strength (힘)',
    'The Hermit (은둔자)','Wheel of Fortune (운명의 수레바퀴)','Justice (정의)',
    'The Hanged Man (매달린 사람)','Death (죽음)','Temperance (절제)',
    'The Devil (악마)','The Tower (탑)','The Star (별)',
    'The Moon (달)','The Sun (태양)','Judgement (심판)','The World (세계)',
    'Ace of Wands','Two of Wands','Three of Wands','Four of Wands',
    'Five of Wands','Six of Wands','Seven of Wands','Eight of Wands',
    'Nine of Wands','Ten of Wands','Page of Wands','Knight of Wands',
    'Queen of Wands','King of Wands',
    'Ace of Cups','Two of Cups','Three of Cups','Four of Cups',
    'Five of Cups','Six of Cups','Seven of Cups','Eight of Cups',
    'Nine of Cups','Ten of Cups','Page of Cups','Knight of Cups',
    'Queen of Cups','King of Cups',
    'Ace of Swords','Two of Swords','Three of Swords','Four of Swords',
    'Five of Swords','Six of Swords','Seven of Swords','Eight of Swords',
    'Nine of Swords','Ten of Swords','Page of Swords','Knight of Swords',
    'Queen of Swords','King of Swords',
    'Ace of Pentacles','Two of Pentacles','Three of Pentacles','Four of Pentacles',
    'Five of Pentacles','Six of Pentacles','Seven of Pentacles','Eight of Pentacles',
    'Nine of Pentacles','Ten of Pentacles','Page of Pentacles','Knight of Pentacles',
    'Queen of Pentacles','King of Pentacles'
];

const CARDS = Array.from({length: 78}, (_, i) => ({
    id: i,
    name: CARD_NAMES[i] || `Card ${i}`,
    file: `m${String(i).padStart(2,'0')}.jpg`
}));

const BASE_URL = 'https://omegafund.github.io/oracle-tarot-pro/images/cards/';
let selectedCards = [];

// ════════════════════════════════════
//  홈 카드 0.5초마다 랜덤 교체
// ════════════════════════════════════
function updateSlot(idx) {
    const img  = document.getElementById(`card-img-${idx}`);
    const slot = document.getElementById(`slot-${idx}`);
    if (!img) return;
    img.style.opacity = '0';
    setTimeout(() => {
        const card = CARDS[Math.floor(Math.random() * CARDS.length)];
        img.src = `${BASE_URL}${card.file}`;
        img.onerror = () => {
            img.style.display = 'none';
            const old = slot.querySelector('.slot-hourglass');
            if (old) old.remove();
            const hg = document.createElement('div');
            hg.className = 'slot-hourglass';
            hg.textContent = '⧗';
            slot.appendChild(hg);
        };
        img.onload = () => {
            const old = slot.querySelector('.slot-hourglass');
            if (old) old.remove();
            img.style.display = 'block';
            img.style.opacity = '1';
        };
    }, 300);
}

updateSlot(0); updateSlot(1); updateSlot(2);

let homeSlotIdx = 0;
const homeInterval = setInterval(() => {
    if (document.getElementById('home-view').style.display === 'none') return;
    updateSlot(homeSlotIdx % 3);
    homeSlotIdx++;
}, 500);

// ════════════════════════════════════
//  금가루 효과
// ════════════════════════════════════
function createGoldDust(x, y) {
    for (let k = 0; k < 5; k++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size  = Math.random() * 3 + 2;
        const angle = Math.random() * 360;
        const r     = Math.random() * 25;
        p.style.cssText = `left:${x+Math.cos(angle)*r}px;top:${y+Math.sin(angle)*r}px;
            width:${size}px;height:${size}px;
            background:radial-gradient(circle,#fffbe6,#D4AF37);
            box-shadow:0 0 ${size+2}px 1px rgba(255,245,195,0.95);
            transition:all ${0.9+Math.random()*0.6}s ease-out;opacity:1;`;
        document.body.appendChild(p);
        requestAnimationFrame(() => {
            p.style.transform = `translate(${(Math.random()-.5)*30}px,${30+Math.random()*30}px)`;
            p.style.opacity = '0';
        });
        setTimeout(() => p.remove(), 1600);
    }
}
setInterval(() => {
    const ptr = document.querySelector('.spiritual-pointer');
    if (ptr && document.getElementById('home-view').style.display !== 'none') {
        const r = ptr.getBoundingClientRect();
        createGoldDust(r.left + r.width/2, r.top + r.height/2);
    }
}, 150);

function spawnGoldExplosion(slotEl) {
    const r  = slotEl.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    for (let i = 0; i < 60; i++) {
        const p     = document.createElement('div');
        p.className = 'gold-dust';
        const size  = Math.random()*4+2;
        const angle = Math.random()*360;
        const dist  = 40+Math.random()*120;
        const dx    = Math.cos(angle*Math.PI/180)*dist;
        const dy    = Math.sin(angle*Math.PI/180)*dist;
        const dur   = 600+Math.random()*600;
        const del   = Math.random()*200;
        p.style.cssText = `left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;
            background:radial-gradient(circle,#fff9e6,#FFD700);
            box-shadow:0 0 ${size+3}px 2px rgba(255,240,120,1);
            transition:transform ${dur}ms ease-out ${del}ms,opacity ${dur}ms ease-out ${del}ms;opacity:1;`;
        document.body.appendChild(p);
        requestAnimationFrame(() => requestAnimationFrame(() => {
            p.style.transform = `translate(${dx}px,${dy}px) scale(0.2)`;
            p.style.opacity   = '0';
        }));
        setTimeout(() => p.remove(), dur+del+100);
    }
}

// ════════════════════════════════════
//  영성적 싱크로니시티 카드 선택
// ════════════════════════════════════
function pickThreeCards(question) {
    const now = Date.now();
    let hash = now;
    for (let i = 0; i < question.length; i++) {
        hash = ((hash << 5) - hash) + question.charCodeAt(i);
        hash |= 0;
    }
    let s = Math.abs(hash);
    const rand = () => {
        s = (s * 1664525 + 1013904223) & 0xffffffff;
        return (s >>> 0) / 0xffffffff;
    };
    return [...CARDS].sort(() => rand() - 0.5).slice(0, 3);
}

// ════════════════════════════════════
//  ① 병렬실행: 메인 리추얼
//  카드 애니메이션 시작과 동시에 API 호출
// ════════════════════════════════════
async function startRitual() {
    const question = document.getElementById('seed-input').value.trim();
    if (!question) { alert('질문을 입력해주세요.'); return; }

    const btn = document.getElementById('ritual-btn');
    btn.disabled = true;
    btn.innerHTML = '신탁을 소환하는 중 <span class="orb-spin">🔮</span>';

    clearInterval(homeInterval);
    selectedCards = pickThreeCards(question);

    // ① 핵심: API 호출을 애니메이션과 동시에 시작
    const streamPromise = startStreamFetch(question, selectedCards);

    // 카드 플립 애니메이션 (API와 병렬 진행)
    for (let i = 0; i < 3; i++) {
        await flipCard(i, selectedCards[i]);
        await delay(300);
    }
    await delay(800);

    for (let i = 0; i < 3; i++) {
        const slot = document.getElementById(`slot-${i}`);
        const img  = document.getElementById(`card-img-${i}`);
        if (slot) spawnGoldExplosion(slot);
        if (img)  img.classList.add('card-fly');
        await delay(200);
    }
    await delay(700);

    // 결과창 열기 → 이미 진행 중인 스트림 결과를 꽂음
    showResultView(question, streamPromise);
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function flipCard(index, card) {
    return new Promise(resolve => {
        const img  = document.getElementById(`card-img-${index}`);
        const slot = document.getElementById(`slot-${index}`);
        img.classList.add('flipping');
        setTimeout(() => {
            img.src = `${BASE_URL}${card.file}`;
            img.onerror = () => {
                img.style.display = 'none';
                const old = slot.querySelector('.slot-hourglass');
                if (old) old.remove();
                const hg = document.createElement('div');
                hg.className = 'slot-hourglass';
                hg.textContent = '⧗';
                slot.appendChild(hg);
            };
            img.classList.remove('flipping');
            resolve();
        }, 300);
    });
}

// ════════════════════════════════════
//  결과창 렌더링
// ════════════════════════════════════
function showResultView(question, streamPromise) {
    document.getElementById('home-view').style.display = 'none';
    const positions = ['과 거','현 재','미 래'];
    document.getElementById('result-cards-container').innerHTML =
        selectedCards.map((card, i) => `
        <div style="flex:1;max-width:100px;display:flex;flex-direction:column;align-items:center;">
            <div class="result-card-item">
                <img src="${BASE_URL}${card.file}" alt="${card.name}"
                     onerror="this.src='${BASE_URL}back.jpg'">
                <div class="result-card-label">${card.name}</div>
            </div>
            <div class="result-position-label">${positions[i]}</div>
        </div>`).join('');

    const rv = document.getElementById('result-view');
    rv.style.display = 'flex';
    requestAnimationFrame(() => requestAnimationFrame(() => { rv.style.opacity = '1'; }));

    // 이미 진행 중인 스트림을 화면에 연결
    renderStream(streamPromise, selectedCards);
}

// ════════════════════════════════════
//  ① 병렬 API 호출 시작 (응답 객체만 반환)
// ════════════════════════════════════
async function startStreamFetch(userQuestion, cards) {
    const cardNames     = cards.map(c => c.name).join(', ');
    const cardPositions = cards.map((c, i) => `${['과거','현재','미래'][i]}: ${c.name}`).join(', ');

    const controller = new AbortController();
    setTimeout(() => controller.abort(), 30000);

    // 워커로 전송 — 5개 파라미터 완전 매칭
    return fetch('https://tarot-api.omegafund01.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            prompt:        userQuestion,
            cardNames:     cardNames,
            cardPositions: cardPositions,
            isReversed:    '없음',
            userName:      (window._oracleUserName || '유저님')
        }),
        signal: controller.signal
    });
}

// ════════════════════════════════════
//  ③ 스트리밍 렌더링
//  SSE 청크를 받을 때마다 실시간으로 화면에 출력
// ════════════════════════════════════
async function renderStream(fetchPromise, cards) {
    const loadingEl    = document.getElementById('ai-loading-text');
    const contentEl    = document.getElementById('oracle-content');
    const progressWrap = document.getElementById('oracle-progress-wrap');
    const progressBar  = document.getElementById('oracle-progress-bar');

    loadingEl.style.display    = 'block';
    progressWrap.style.display = 'block';
    contentEl.innerHTML        = '';

    const loadingMessages = [
        '✨ 천상의 기운을 감지 중...',
        '🔮 운명의 카드를 해독 중...',
        '⚡ 2026년 데이터와 교신 중...',
        '🌌 신탁의 언어로 번역 중...',
        '📜 오라클이 응답을 준비 중...',
        '✦ 거의 완성되었습니다...'
    ];

    let msgIdx = 0;
    let progressVal = 5;
    loadingEl.textContent = loadingMessages[0];
    progressBar.style.width = '5%';

    const loadingTimer = setInterval(() => {
        msgIdx = Math.min(msgIdx + 1, loadingMessages.length - 1);
        loadingEl.textContent = loadingMessages[msgIdx];
        progressVal = Math.min(progressVal + 14, 90);
        progressBar.style.width = progressVal + '%';
    }, 2800);

    try {
        const response = await fetchPromise;
        clearInterval(loadingTimer);

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const reader  = response.body.getReader();
        const decoder = new TextDecoder();

        // 로딩 UI 제거 후 스트리밍 출력 시작
        loadingEl.style.display    = 'none';
        progressWrap.style.display = 'none';
        progressBar.style.width    = '100%';

        // 커서 추가
        const cursor = document.createElement('span');
        cursor.className = 'streaming-cursor';
        contentEl.appendChild(cursor);

        let buffer    = '';  // SSE 라인 버퍼
        let fullText  = '';  // 누적 전체 텍스트

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop(); // 마지막 미완성 라인은 버퍼에 보관

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const jsonStr = line.slice(6).trim();
                if (jsonStr === '[DONE]') continue;

                try {
                    const parsed = JSON.parse(jsonStr);
                    const chunk  = parsed?.candidates?.[0]?.content?.parts?.[0]?.text || '';
                    if (!chunk) continue;

                    fullText += chunk;

                    // 실시간 렌더링: 누적 텍스트를 HTML로 변환 후 출력
                    cursor.remove();
                    contentEl.innerHTML = renderText(fullText, cards);
                    contentEl.appendChild(cursor);

                    // 스크롤 제거 (매 청크 smooth scroll → 떨림 발생)

                } catch (_) { /* JSON 파싱 실패 무시 */ }
            }
        }

        // 스트리밍 완료: 커서 제거, 최종 렌더
        cursor.remove();
        contentEl.innerHTML = renderText(fullText, cards);

        // seal 제거됨

    } catch (error) {
        clearInterval(loadingTimer);
        console.error('Stream 에러:', error);
        loadingEl.style.display    = 'none';
        progressWrap.style.display = 'none';
        contentEl.innerHTML = `
            <div style="color:#ff6b6b;padding:20px;border:1px solid #ff6b6b;border-radius:10px;">
                <strong>⚠️ 연결 실패</strong><br><br>
                <pre style="white-space:pre-wrap;font-size:0.8rem;color:#eee;">${error.message}</pre>
            </div>`;
    }
}

// ════════════════════════════════════
//  텍스트 → HTML 변환
//  [과거]/[현재]/[미래]/[제니스 운명 신탁] 섹션 분리 렌더
//  또는 워커 HTML 태그 직접 렌더 (두 방식 모두 지원)
// ════════════════════════════════════
function renderText(text, cards) {
    const formatChunk = t => (t || '').trim()
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/^#{1,3}\s(.+)/gm, '<h3>$1</h3>')
        .replace(/\n/g, '<br>');

    const labels = ['과거','현재','미래'];

    // ── 실제 Gemini 응답 패턴 분석 후 정밀 분리 ──
    // 확인된 패턴: 줄바꿈 후 "과거", "현재", "미래" 단독 헤더로 시작
    // 또는 "✦ 과거의 흐름:", "## 과거" 등 다양한 형태
    const splitRe = /\n\s*(?:✦\s*)?(?:\*{1,2})?\s*(과거|현재|미래)\s*(?:\*{1,2})?\s*\n/g;
    const oracleRe = /\n\s*(?:✦\s*카드 흐름 종합|👁|🌙\s*오늘의 수호|제니스 운명 신탁)/;

    // 신탁/수호에너지 분리
    const oracleMatch = text.search(oracleRe);
    let mainText  = oracleMatch > -1 ? text.substring(0, oracleMatch) : text;
    let oracleText = oracleMatch > -1 ? text.substring(oracleMatch) : '';

    // 카드 섹션 분리
    let cardTexts = ['', '', ''];
    let introPart = mainText;

    const matches = [...mainText.matchAll(splitRe)];

    if (matches.length >= 3) {
        introPart    = mainText.substring(0, matches[0].index);
        cardTexts[0] = mainText.substring(matches[0].index + matches[0][0].length, matches[1].index);
        cardTexts[1] = mainText.substring(matches[1].index + matches[1][0].length, matches[2].index);
        cardTexts[2] = mainText.substring(matches[2].index + matches[2][0].length);
    } else if (matches.length === 2) {
        introPart    = mainText.substring(0, matches[0].index);
        cardTexts[0] = mainText.substring(matches[0].index + matches[0][0].length, matches[1].index);
        cardTexts[1] = mainText.substring(matches[1].index + matches[1][0].length);
    } else if (matches.length === 1) {
        introPart    = mainText.substring(0, matches[0].index);
        cardTexts[0] = mainText.substring(matches[0].index + matches[0][0].length);
    } else {
        // 패턴 못 찾으면 카드명으로 분리 시도
        if (cards && cards.length === 3) {
            let lastIdx = 0;
            cards.forEach((card, i) => {
                const cardIdx = mainText.indexOf(card.name, lastIdx);
                if (cardIdx > -1) {
                    if (i === 0) introPart = mainText.substring(0, cardIdx);
                    const nextCard = cards[i + 1];
                    const nextIdx = nextCard ? mainText.indexOf(nextCard.name, cardIdx + 1) : mainText.length;
                    cardTexts[i] = mainText.substring(cardIdx, nextIdx > -1 ? nextIdx : mainText.length);
                    lastIdx = cardIdx + 1;
                }
            });
        } else {
            introPart = mainText;
        }
    }

    // 카드 3장 항상 강제 렌더
    const cardSections = (cards || []).map((card, i) => `
        <div class="card-block">
            <h2>${labels[i]}</h2>
            <img src="${BASE_URL}${card.file}" class="mini-card-float"
                 onerror="this.style.display='none'">
            <div class="card-text-wrap">
                <span class="card-name-inline">${card.name}</span>
                <div class="card-text">${formatChunk(cardTexts[i])}</div>
            </div>
        </div>`).join('');

    const introHtml = introPart.trim()
        ? `<div style="margin-bottom:12px;color:rgba(255,255,255,0.85);line-height:1.8;font-size:0.9rem;">${formatChunk(introPart)}</div>`
        : '';

    const oracleHtml = oracleText.trim()
        ? `<div class="final-reading"><div class="oracle-header"><span class="oracle-eye">👁</span><h2 style="display:inline;color:#D4AF37;margin:0;">제니스 운명 신탁</h2></div><div class="oracle-text" style="margin-top:12px;">${formatChunk(oracleText)}</div></div>`
        : '';

    return introHtml + cardSections + oracleHtml;
}
