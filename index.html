<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ORACLE TAROT PRO - MASTERPIECE</title>
<style>
    :root {
        --gold: #D4AF37; --bright-gold: #FFF5C3; --dark-gold: #8C6212;
        --font: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 0;
        background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        color: #fff; font-family: var(--font);
        min-height: 100vh; overflow-x: hidden;
    }
    #app-container {
        max-width: 500px; width: 100%; margin: 0 auto;
        padding: 60px 20px 80px; /* 패딩 조정 */
        border-left: 1px solid rgba(212,175,55,0.15);
        border-right: 1px solid rgba(212,175,55,0.15);
        min-height: 100vh;
        display: flex; flex-direction: column; align-items: center;
    }

    /* 타이틀 정렬 수정 */
    .title-wrapper { 
        display: flex; align-items: center; justify-content: center; 
        gap: 15px; width: 100%; margin-bottom: 5px;
    }
    .gold-title { 
        color: var(--gold); font-size: 2.1rem; font-weight: 900; 
        margin: 0; letter-spacing: 0.1em; /* 자간 조정으로 중앙 정렬 최적화 */
        text-shadow: 0 0 15px rgba(212,175,55,0.6);
        text-align: center;
    }
    .title-sparkle { font-size: 1.4rem; animation: sparklePop 1.8s infinite ease-in-out; }
    
    .sub-title { color: var(--gold); font-size: 0.9rem; letter-spacing: 0.4em; margin-bottom: 15px; font-weight: 800; text-align: center; }
    .trust-motto { color: var(--gold); font-size: 0.75rem; letter-spacing: 0.15em; margin-bottom: 40px; font-style: italic; opacity: 0.7; text-align: center; }

    /* 입력창 및 카드 스테이지 (기존 스타일 유지하되 너비 최적화) */
    .input-system-wrapper { position: relative; width: 100%; height: 110px; margin-bottom: 20px; }
    .beveled-border { position: absolute; inset: 0; background: linear-gradient(145deg, var(--bright-gold), var(--gold), var(--dark-gold)); clip-path: polygon(15px 0%,calc(100% - 15px) 0%,100% 15px,100% calc(100% - 15px),calc(100% - 15px) 100%,15px 100%,0% calc(100% - 15px),0% 15px); }
    .beveled-inner { position: absolute; width: calc(100% - 6px); height: calc(100% - 6px); top: 3px; left: 3px; background: linear-gradient(135deg,#1a0033,#0a001a); clip-path: polygon(14px 0%,calc(100% - 14px) 0%,100% 14px,100% calc(100% - 14px),calc(100% - 14px) 100%,14px 100%,0% calc(100% - 14px),0% 14px); z-index: 2; }
    .gold-input { position: relative; z-index: 10; background: transparent; border: none; outline: none; color: #fff; font-size: 1rem; width: 100%; padding: 20px; font-weight: bold; text-align: center; resize: none; }
    
    .cards-stage { display: flex; justify-content: space-between; gap: 10px; width: 100%; margin: 30px 0; }
    .card-slot { flex: 1; aspect-ratio: 2/3; background: #111; border-radius: 8px; border: 1px solid rgba(212,175,55,0.3); }
    .card-img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }

    /* 결과 뷰 */
    #result-view { display: none; flex-direction: column; width: 100%; }
    .result-cards-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .result-card-thumb { flex: 1; aspect-ratio: 2/3; border: 2px solid var(--gold); border-radius: 6px; object-fit: cover; }
    
    #ai-result-box {
        background: rgba(10, 5, 20, 0.95); border: 1px solid var(--gold);
        border-radius: 12px; padding: 20px; font-size: 0.95rem; line-height: 1.8;
    }
    .section-header { color: var(--gold); font-weight: 900; margin-top: 15px; border-left: 3px solid var(--gold); padding-left: 10px; }
    .ai-cursor { display: inline-block; width: 2px; height: 1em; background: var(--gold); animation: blink 0.7s infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
    
    .gold-button { background: linear-gradient(180deg,#FFF5C3 0%,#D4AF37 100%); color: #000; border: none; padding: 15px; width: 100%; border-radius: 50px; font-weight: 900; font-size: 1.1rem; cursor: pointer; }
    .reset-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 12px; border-radius: 25px; margin-top: 20px; cursor: pointer; width: 100%; }
</style>
</head>
<body>
<div id="app-container">
    <div id="home-view" style="width:100%;">
        <div class="title-wrapper">
            <span class="title-sparkle">✨</span>
            <h1 class="gold-title">ORACLE TAROT</h1>
            <span class="title-sparkle">✨</span>
        </div>
        <div class="sub-title">PRO - MASTERPIECE</div>
        <div class="trust-motto">TRUST YOUR SPIRITUAL ENERGY</div>

        <div class="input-system-wrapper">
            <div class="beveled-border"></div>
            <div class="beveled-inner"></div>
            <textarea id="seed-input" class="gold-input" placeholder="질문을 입력하고 신탁을 받으세요..."></textarea>
        </div>

        <div class="cards-stage">
            <div class="card-slot"><img id="home-c1" class="card-img" src=""></div>
            <div class="card-slot"><img id="home-c2" class="card-img" src=""></div>
            <div class="card-slot"><img id="home-c3" class="card-img" src=""></div>
        </div>

        <button class="gold-button" onclick="revealTheTrinity()">운명의 3대 신탁 확인</button>
    </div>

    <div id="result-view">
        <div id="result-cards-row" class="result-cards-row"></div>
        <div id="ai-result-box">
            <div id="loading-text">제니스가 실시간 우주 에너지를 검색 중입니다...</div>
        </div>
        <button class="reset-btn" onclick="location.reload()">✦ 새로운 운명 확인</button>
    </div>
</div>

<script>
const API_KEY = "AIzaSyA1l1pt2Cr6vl-c6dkdaAfp_SblSyfCVC0";
const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;

const CARD_NAMES = ["The Fool","The Magician","The High Priestess","The Empress","The Emperor","The Hierophant","The Lovers","The Chariot","Strength","The Hermit","Wheel of Fortune","Justice","The Hanged Man","Death","Temperance","The Devil","The Tower","The Star","The Moon","The Sun","Judgement","The World","Ace of Wands","Two of Wands","Three of Wands","Four of Wands","Five of Wands","Six of Wands","Seven of Wands","Eight of Wands","Nine of Wands","Ten of Wands","Page of Wands","Knight of Wands","Queen of Wands","King of Wands","Ace of Cups","Two of Cups","Three of Cups","Four of Cups","Five of Cups","Six of Cups","Seven of Cups","Eight of Cups","Nine of Cups","Ten of Cups","Page of Cups","Knight of Cups","Queen of Cups","King of Cups","Ace of Swords","Two of Swords","Three of Swords","Four of Swords","Five of Swords","Six of Swords","Seven of Swords","Eight of Swords","Nine of Swords","Ten of Swords","Page of Swords","Knight of Swords","Queen of Swords","King of Swords","Ace of Pentacles","Two of Pentacles","Three of Pentacles","Four of Pentacles","Five of Pentacles","Six of Pentacles","Seven of Pentacles","Eight of Pentacles","Nine of Pentacles","Ten of Pentacles","Page of Pentacles","Knight of Pentacles","Queen of Pentacles","King of Pentacles"];

function getCardImage(idx) {
    return `https://raw.githubusercontent.com/fabiopalm/tarot-cards-api/master/static/img/m${String(idx % 22).padStart(2, '0')}.jpg`;
}

window.onload = () => {
    for(let i=1; i<=3; i++) document.getElementById(`home-c${i}`).src = getCardImage(Math.floor(Math.random()*22));
};

async function revealTheTrinity() {
    const seed = document.getElementById('seed-input').value.trim();
    if (!seed) { alert("질문을 입력해주세요."); return; }
    
    document.getElementById('home-view').style.display = 'none';
    document.getElementById('result-view').style.display = 'flex';
    
    const deck = Array.from({length:3}, () => Math.floor(Math.random()*78));
    const row = document.getElementById('result-cards-row');
    row.innerHTML = deck.map(idx => `<img class="result-card-thumb" src="${getCardImage(idx)}">`).join('');
    
    await callGemini(deck, seed);
}

async function callGemini(deck, question) {
    const box = document.getElementById('ai-result-box');
    const cardList = deck.map(i => CARD_NAMES[i]).join(', ');

    const prompt = `당신은 실시간 시장 정보와 영적 통찰을 결합한 'AI 리얼타임 오라클 제니스'입니다.
질문: ${question}
선택된 카드: ${cardList}

반드시 구글 검색 기능을 사용하여 2026년 4월 현재의 실제 주가, 경제 상황, 혹은 뉴스 데이터를 반영하여 답변하세요.
형식: [과거의 기운], [현재의 국면], [미래의 향방], [제니스 신탁(매매 전략 및 실전 조언 포함)]`;

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                contents: [{parts: [{text: prompt}]}],
                // 🔥 실시간 검색 기능 활성화
                tools: [{ google_search: {} }],
                generationConfig: {temperature: 0.7, maxOutputTokens: 1000}
            })
        });

        const resData = await response.json();
        const aiText = resData.candidates[0].content.parts[0].text;
        
        box.innerHTML = '';
        typewriter(box, aiText);
    } catch (e) {
        box.innerHTML = "운명의 연결에 실패했습니다. API 키와 네트워크를 확인하세요.";
    }
}

function typewriter(el, text) {
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'ai-cursor';
    el.appendChild(cursor);
    
    function tick() {
        if (i < text.length) {
            cursor.before(text.charAt(i++));
            setTimeout(tick, 20);
            if(i % 5 === 0) window.scrollTo(0, document.body.scrollHeight);
        } else {
            cursor.remove();
        }
    }
    tick();
}
</script>
</body>
</html>
