<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ORACLE TAROT PRO - MASTERPIECE</title>
<style>
    :root { 
        --gold: #D4AF37; --bright-gold: #FFF5C3; --dark-gold: #8C6212; --bg: #000; --text: #fff;
        --font: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    }
    body {
        margin: 0; padding: 0; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        color: var(--text); font-family: var(--font);
        min-height: 100vh; overflow-x: hidden;
    }
    #app-container { 
        max-width: 500px; width: 100%; padding: 60px 25px 40px 25px; text-align: center; 
        box-sizing: border-box; position: relative;
        margin: 0 auto;
        border-left: 1px solid rgba(212, 175, 55, 0.15); border-right: 1px solid rgba(212, 175, 55, 0.15);
    }

    /* 타이틀 섹션 */
    .gold-title { color: var(--gold); font-size: 2.3rem; font-weight: 900; margin: 0; letter-spacing: 0.3em; text-shadow: 0 0 15px rgba(212, 175, 55, 0.6); }
    .title-wrapper { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .title-sparkle { 
        font-size: 1.6rem; 
        animation: sparklePop 1.8s infinite ease-in-out;
        filter: drop-shadow(0 0 8px #FFD700) drop-shadow(0 0 16px #FFF5C3);
    }
    .title-sparkle.delayed { animation-delay: 0.9s; }
    @keyframes sparklePop {
        0%   { opacity: 0.2; transform: scale(0.7) rotate(-15deg); filter: drop-shadow(0 0 2px #D4AF37); }
        30%  { opacity: 1;   transform: scale(1.3) rotate(10deg);  filter: drop-shadow(0 0 14px #FFD700) drop-shadow(0 0 28px #FFF5A5); }
        60%  { opacity: 0.8; transform: scale(1.0) rotate(-5deg);  filter: drop-shadow(0 0 8px #FFD700); }
        100% { opacity: 0.2; transform: scale(0.7) rotate(-15deg); filter: drop-shadow(0 0 2px #D4AF37); }
    }
    .sub-title { color: var(--gold); font-size: 0.95rem; letter-spacing: 0.5em; margin-bottom: 20px; display: block; font-weight: 800; }
    .trust-motto { color: var(--gold); font-size: 0.8rem; letter-spacing: 0.2em; margin-bottom: 40px; font-style: italic; opacity: 0.8; }

    /* 입력창 시스템 */
    .input-system-wrapper { position: relative; width: 100%; height: 115px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
    .beveled-border { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(145deg, var(--bright-gold), var(--gold), var(--dark-gold)); clip-path: polygon(15px 0%, calc(100% - 15px) 0%, 100% 15px, 100% calc(100% - 15px), calc(100% - 15px) 100%, 15px 100%, 0% calc(100% - 15px), 0% 15px); z-index: 1; animation: borderPulse 3s infinite ease-in-out; }
    .beveled-inner { position: absolute; width: calc(100% - 6px); height: calc(100% - 6px); top: 3px; left: 3px; background: linear-gradient(135deg, #2D0054, #120022); clip-path: polygon(14px 0%, calc(100% - 14px) 0%, 100% 14px, 100% calc(100% - 14px), calc(100% - 14px) 100%, 14px 100%, 0% calc(100% - 14px), 0% 14px); z-index: 2; }
    .gold-input { position: relative; z-index: 10; background: transparent; border: none; outline: none; color: #fff; font-size: 1rem; width: 88%; font-weight: bold; text-align: center; resize: none; line-height: 1.7; height: 70px; }
    #fake-placeholder { position: absolute; z-index: 5; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; pointer-events: none; transition: 0.3s; color: rgba(255,255,255,0.4); }
    @keyframes borderPulse { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.01); } }

    /* 카드 스테이지 */
    .cards-stage { display: flex; justify-content: space-between; gap: 10px; margin: 40px 0; perspective: 1000px; padding: 15px 0; min-height: 200px; }
    .card-slot { 
        flex: 1; position: relative; aspect-ratio: 2 / 3; 
        background: #111; border-radius: 8px; 
        border: 1px solid rgba(212, 175, 55, 0.3);
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }
    .card-img { width: 100%; height: 100%; object-fit: cover; border: 1.5px solid var(--gold); border-radius: 8px; transition: all 0.5s ease; backface-visibility: hidden; }
    
    .tilt-left { transform: rotate(-8deg) translateY(10px); }
    .tilt-center { transform: translateY(-5px); }
    .tilt-right { transform: rotate(8deg) translateY(10px); }

    /* 버튼 & 포인터 */
    .reveal-section { margin-top: 20px; text-align: center; position: relative; padding: 20px 0; }
    .gold-button { 
        background: linear-gradient(180deg, #FFF5C3 0%, #D4AF37 100%); color: #000; 
        border: none; padding: 18px 0; width: 100%; border-radius: 50px; 
        font-weight: 900; cursor: pointer; box-shadow: 0 10px 40px rgba(212, 175, 55, 0.4);
        font-size: 1.1rem;
    }
    .button-container { position: relative; width: 100%; max-width: 400px; margin: 0 auto; }
    .spiritual-pointer { 
        position: absolute; 
        bottom: -30px;
        right: -20px; 
        font-size: 1.8rem; 
        z-index: 10; 
        transform: rotate(150deg); 
        animation: handMove 1.1s infinite ease-in-out; 
        filter: drop-shadow(0 0 10px var(--gold)); 
        pointer-events: none;
    }
    @keyframes handMove { 
        0%, 100% { transform: translateY(0) rotate(150deg); } 
        50% { transform: translateY(-12px) rotate(150deg); } 
    }

    /* 결과 뷰 */
    #result-view { display: none; width: 100%; flex-direction: column; opacity: 0; padding-bottom: 50px;
        transform: translateY(60px); transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.22, 1, 0.36, 1); }
    #result-view.slide-in { opacity: 1; transform: translateY(0); }

    /* 결과 각 블록 순차 페이드업 */
    .reveal-item {
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .reveal-item.visible { opacity: 1; transform: translateY(0); }
    .result-cards-container { display: flex; flex-direction: column; gap: 30px; background-color: rgba(26, 15, 36, 0.8); padding: 20px; border-radius: 12px; border: 1px solid rgba(220, 179, 101, 0.3); margin-top: 20px; }

    /* ◈ 운명의 여정 확인 ◈ — 신비로운 창 테두리 */
    #category-display {
        position: relative;
        display: inline-block;
        width: 100%;
        padding: 14px 20px !important;
        box-sizing: border-box;
        background: linear-gradient(135deg, rgba(10,5,20,0.95) 0%, rgba(28,10,50,0.95) 50%, rgba(10,5,20,0.95) 100%);
        border: none !important;
        border-radius: 4px;
        overflow: visible;
        font-size: 1.15rem !important;
        letter-spacing: 3px !important;
        text-shadow: 0 0 12px rgba(212,175,55,0.8), 0 0 30px rgba(212,175,55,0.3);
    }
    #category-display::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 4px;
        padding: 2px;
        background: linear-gradient(135deg, #FFF5C3, #D4AF37 30%, #8C6212 50%, #D4AF37 70%, #FFF5C3);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        animation: mysticalBorder 4s linear infinite;
    }
    #category-display::after {
        content: '✦';
        position: absolute;
        top: -10px; left: 50%; transform: translateX(-50%);
        color: #FFF5C3;
        font-size: 1rem;
        text-shadow: 0 0 10px #FFD700, 0 0 20px #D4AF37;
        animation: cornerGlow 2s ease-in-out infinite;
    }
    .cat-corner {
        position: absolute;
        width: 14px; height: 14px;
        border-color: #D4AF37;
        border-style: solid;
    }
    .cat-corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-radius: 2px 0 0 0; }
    .cat-corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; border-radius: 0 2px 0 0; }
    .cat-corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; border-radius: 0 0 0 2px; }
    .cat-corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-radius: 0 0 2px 0; }
    @keyframes mysticalBorder {
        0%   { background-position: 0% 50%; filter: brightness(1); }
        50%  { background-position: 100% 50%; filter: brightness(1.4); }
        100% { background-position: 0% 50%; filter: brightness(1); }
    }
    @keyframes cornerGlow {
        0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(0.9); }
        50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
    }

    /* 타로·수비학 설명 박스 */
    .info-scroll-box {
        display: flex;
        gap: 10px;
        margin: 16px 0 4px 0;
        width: 100%;
    }
    .info-panel {
        flex: 1;
        position: relative;
        padding: 12px 13px;
        background: linear-gradient(135deg, rgba(5,2,15,0.97) 0%, rgba(20,8,40,0.97) 100%);
        border-radius: 3px;
        overflow: hidden;
    }
    .info-panel::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 3px;
        padding: 1.5px;
        background: linear-gradient(135deg, rgba(255,245,195,0.6), rgba(212,175,55,0.8), rgba(140,98,18,0.5), rgba(212,175,55,0.7));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
    }
    .info-panel-title {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #D4AF37;
        font-size: 0.7rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        margin-bottom: 6px;
        opacity: 0.95;
    }
    .info-panel-icon {
        font-size: 0.85rem;
        filter: drop-shadow(0 0 4px #FFD700);
    }
    .info-panel-text {
        color: rgba(255,255,255,0.78);
        font-size: 0.68rem;
        line-height: 1.65;
        letter-spacing: 0.01em;
    }
    .info-panel-text b {
        color: #FFD700;
        font-weight: 900;
    }
    .result-card-col { display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 25px; }
    .result-card-col:last-child { border-bottom: none; }
    .result-img { width: 160px; aspect-ratio: 2 / 3; border: 2px solid var(--gold); border-radius: 8px; object-fit: cover; box-shadow: 0 0 20px rgba(212,175,55,0.3); }
    .sage-box { border: 1px solid #dcb365; padding: 18px; border-radius: 10px; background: rgba(220, 179, 101, 0.05); color: #fff; font-size: 0.9rem; margin-top: 20px; line-height: 1.8; text-align: left; }
    .legal-notice { margin-top: 50px; font-size: 0.7rem; color: var(--gold); line-height: 1.5; opacity: 0.6; text-align: center; }

    /* 금가루 파티클 */
    .particle { 
        position: fixed; 
        width: 4px; height: 4px; 
        background: var(--gold); 
        border-radius: 50%; 
        pointer-events: none; 
        z-index: 9999; 
        box-shadow: 0 0 10px var(--gold); 
    }

    .fly-out {
        animation: githubFlyOut 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        pointer-events: none; z-index: 100;
    }

    @keyframes githubFlyOut {
        0% { transform: translate(0, 0) rotate(0deg) scale(1); filter: brightness(1); opacity: 1; }
        100% { transform: translate(-600px, -900px) rotate(-720deg) scale(0); filter: brightness(3); opacity: 0; }
    }
</style>
</head>

<script>
let homePreviewInterval;

// 1. 이미지 경로
function getCardImage(idx) {
    return './images/cards/m' + String(idx).padStart(2, '0') + '.jpg';
}

// 2. 입력창 플레이스홀더
function togglePlaceholder(el) {
    var ph = document.getElementById('fake-placeholder');
    if (ph) ph.style.opacity = (el.value && el.value.length > 0) ? '0' : '1';
}

// 3. 수비학 & 해시
function numerology(n) {
    var res = Math.abs(n);
    while (res > 9) { res = res.toString().split('').reduce(function(a,b){ return a + Number(b); }, 0); }
    return res || 1;
}
function hashSeed(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) { h = (h << 5) - h + str.charCodeAt(i); h |= 0; }
    return Math.abs(h);
}

// 4. 카테고리 판별 — 다단계 스코어링 시스템
function detectCategory(seed) {
    var s = seed.trim();
    var scores = {
        STOCK: 0, COIN: 0, REDEV: 0, SEX: 0,
        MARRIAGE: 0, REUNION: 0, JOB: 0, BIZ: 0,
        EXAM: 0, LAWSUIT: 0, HEALTH: 0, GENERAL: 0
    };

    var redevDev  = /(재개발|재건축|리모델링|도시정비|정비구역|정비사업|뉴타운|조합원|입주권|관리처분|사업시행인가|조합설립인가|추진위|조합장|시공사|시행사|용적률|건폐율|비례율|감정평가|권리가액|분담금|추가분담금|이주비|이주촉진|철거|멸실|착공|준공|근린생활시설|근생|용도지역|용도변경|건축허가|신축|증축|개축)/;
    var redevType = /(아파트|빌라|다세대|다가구|단독주택|연립|오피스텔|도시형생활주택|원룸|투룸|쓰리룸|주상복합|복층|전용면적|공용면적|공급면적|대지지분|상가|꼬마빌딩|임대수익|임대료|공실|임차인|임대인|분양상가|집합건물|지식산업센터|지산|물류창고|물류센터|공장|토지|대지|임야|나대지|기획부동산|분양권|전매|NPL|경공매|경매|법원경매)/;
    var redevTax  = /(취득세|재산세|종부세|종합부동산세|양도세|양도소득세|증여세|상속세|다주택|1주택|2주택|3주택|보유세|임대사업자|임대등록|LTV|DSR|DTI|담보대출|주담대|전세대출|규제지역|조정지역|투기과열지구|비규제|공시가|실거래가|시세|호가|매매가|전세가|월세가|전세가율|갭투자|역전세|깡통전세|전세사기|보증금|HUG|임장|부동산중개|중개수수료|복비|급매|급처|실거주|부동산)/;
    var redevChung= /(청약|청약통장|청약점수|가점|추첨|특공|특별공급|신혼부부|생애최초|노부모부양|다자녀|청약홈|1순위|무주택|분양가|분양가상한제|후분양|모델하우스|견본주택|계약금|중도금|잔금|발코니확장)/;
    if (redevDev.test(s))   scores.REDEV += 3;
    if (redevType.test(s))  scores.REDEV += 2;
    if (redevTax.test(s))   scores.REDEV += 2;
    if (redevChung.test(s)) scores.REDEV += 2;

// 6. 인덱스 → tarotDB 키 변환
function getCardKey(idx) {
    idx = Math.abs(parseInt(idx)) % 78;
    if (idx < 22) return 'M' + String(idx).padStart(2, '0');
    if (idx < 36) return 'W' + String(idx - 21).padStart(2, '0');
    if (idx < 50) return 'C' + String(idx - 35).padStart(2, '0');
    if (idx < 64) return 'S' + String(idx - 49).padStart(2, '0');
    return 'P' + String(idx - 63).padStart(2, '0');
}

// ★ 부드러운 커스텀 스크롤 함수 (easeInOutQuad)
function scrollToResult() {
    var rv = document.getElementById('result-view');
    if (rv) {
        rv.style.display = 'flex';
        
        // 📱 햅틱 진동 (결과창 열릴 때 한 번)
        if (navigator.vibrate) navigator.vibrate(50);

        requestAnimationFrame(function() {
            requestAnimationFrame(function() {
                rv.classList.add('slide-in');

                // ✅ 스크롤 함수 정의 (내부에서 선언)
                function scrollToResult() {
                    window.scrollTo({
                        top: document.body.scrollHeight,
                        behavior: 'smooth'
                    });
                }

                // 처음에 한 번 상단으로 부드럽게 이동
                rv.scrollIntoView({ behavior: 'smooth', block: 'start' });

                var items = rv.querySelectorAll('.reveal-item');
                items.forEach(function(el, idx) {
                    setTimeout(function() { 
                        // 글자를 보이게 함
                        el.classList.add('visible'); 
                        
                        // 💡 휙 올라가지 않게 3개 항목마다 천천히 스크롤
                        if (idx % 3 === 0 || idx === items.length - 1) { 
                            scrollToResult(); 
                        }
                    }, 800 + (idx * 800)); // 💡 0.9초 간격으로 독서 시간 확보
                });
            }); // inner requestAnimationFrame 끝
        }); // outer requestAnimationFrame 끝
    } // if (rv) 끝

    var targetY = rv.getBoundingClientRect().top + scrollEl.scrollTop;
    var startY = scrollEl.scrollTop;
    var distance = targetY - startY;
    var duration = 1200;
    var startTime = null;

    function easeInOutQuad(t, b, c, d) {
        t /= d / 2;
        if (t < 1) return c / 2 * t * t + b;
        t--;
        return -c / 2 * (t * (t - 2) - 1) + b;
    }
    function step(timestamp) {
        if (!startTime) startTime = timestamp;
        var progress = timestamp - startTime;
        scrollEl.scrollTop = easeInOutQuad(progress, startY, distance, duration);
        if (progress < duration) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
}

        var adv2 = (cardData2.advice[targetKey] || cardData2.advice['운세_총평'] || '').split('. ');

        function pickSentence(arr) {
            var valid = arr.filter(function(s){ return s.trim().length > 10; });
            return valid[Math.floor(Math.random() * valid.length)] || arr[0] || '';
        }
        var sent0 = pickSentence(adv0);
        var sent1 = pickSentence(adv1);
        var sent2 = pickSentence(adv2);

        var bridgeA = ['과거의 기운이 말합니다. ', '지나온 흐름을 보면, ', '이미 형성된 에너지는 이렇습니다. ', '지금까지의 기류를 보면, '];
        var bridgeB = ['현재의 국면에서는 ', '지금 이 순간의 핵심은 ', '현재의 기운이 가리키는 것은 ', '오늘의 흐름에서 중요한 것은 '];
        var bridgeC = ['앞으로의 향방은 이러합니다. ', '미래의 기운은 이 방향입니다. ', '다가올 흐름을 대비하십시오. ', '운명이 향하는 곳은 분명합니다. '];
        var bridgeEnd = [
            '세 기운의 흐름을 종합하면, <strong>' + config.t.replace(/◈/g,'').trim() + '</strong>에서 결단의 순간이 다가오고 있습니다.',
            '<strong>' + config.t.replace(/◈/g,'').trim() + '</strong>의 흐름은 지금 전환점에 서 있습니다. 흔들리지 마십시오.',
            '이 세 카드가 하나의 목소리로 말합니다. 지금이 바로 행동해야 할 변곡점입니다.',
            '우주는 당신의 질문에 명확히 응답하고 있습니다. 직관을 믿고 나아가십시오.'
        ];
        function pickRand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        var finalOracleMsg =
            pickRand(bridgeA) + sent0 + ' '
            + pickRand(bridgeB) + sent1 + ' '
            + pickRand(bridgeC) + sent2 + ' '
            + pickRand(bridgeEnd);

        adviceArea.innerHTML =
            '<div style="margin-top:25px; border:2px solid #D4AF37; padding:18px; background:rgba(10,10,10,0.95); border-radius:15px; box-shadow:0 0 20px rgba(212,175,55,0.2);">'
            + '<div style="color:#D4AF37; font-weight:900; font-size:1.15rem; margin-bottom:15px; text-align:center; letter-spacing:2px;">◈ 제니스 운명 신탁 ◈</div>'
            + '<div style="font-size:0.95rem; color:#fff; line-height:1.7; text-align:center;">'
            + '<div style="margin-bottom:15px; font-style:italic; color:#ccc; background:rgba(255,255,255,0.05); padding:8px; border-radius:5px;">"' + (selectedMento || '황금은 불 속에서 단련된다') + '"</div>'
            + '<div style="background:rgba(212,175,55,0.05); padding:15px; border-radius:10px; border:1px solid rgba(212,175,55,0.2); margin-bottom:15px; text-align:left;">'
            + '<span style="color:#00FFCC; font-weight:bold; font-size:1rem;">⚡ ' + (config.unit || '운명 발복') + '을 위한 실전 비책</span><br>'
            + '<ul style="list-style:none; padding-left:0; margin-top:10px; color:#eee; font-size:0.9rem;">'
            + '<li style="margin-bottom:8px;">• <b style="color:#D4AF37;">추천 날짜:</b> 이번 달 ' + ((cIdx1 % 20) + 1) + '일 또는 ' + (((cIdx1 % 20) + 11) > 31 ? (cIdx1 % 20) : ((cIdx1 % 20) + 11)) + '일</li>'
            + '<li>• <b style="color:#D4AF37;">추천 시간:</b> 오전 ' + ((cIdx0 % 5) + 7) + '시 혹은 오후 ' + ((cIdx2 % 5) + 14) + '시</li>'
            + '</ul></div>'
            + '<div style="color:#fff; line-height:1.7; text-align:justify; font-size:0.95rem; padding:0 2px;">'
            + '<p style="border-left:3px solid #00FFCC; padding-left:12px; word-break:keep-all; margin:0; line-height:1.9;">' + finalOracleMsg + '</p>'
            + '</div>'
            + '</div></div>';
    }
} // renderVerticalResult 닫기

// ★ 홈 카드 초기화
window.onload = function() {
    var update = function() {
        [1, 2, 3].forEach(function(i) {
            var img = document.getElementById('home-c' + i);
            if (img) img.src = getCardImage(Math.floor(Math.random() * 78));
        });
    };
    update();
    homePreviewInterval = setInterval(update, 2000);
    var sIn = document.getElementById('seed-input');
    if (sIn) sIn.addEventListener('input', function() { togglePlaceholder(this); });
};

function revealTheTrinity() {
    var seedInput = document.getElementById('seed-input');
    var seed = seedInput ? seedInput.value.trim() : '';
    if (!seed) return;

    if (homePreviewInterval) clearInterval(homePreviewInterval);

    var deck = Array.from({ length: 78 }, function(_, i) { return i; })
        .sort(function() { return Math.random() - 0.5; })
        .slice(0, 3);

    var slots = [
        document.getElementById('home-c1'),
        document.getElementById('home-c2'),
        document.getElementById('home-c3')
    ];

    slots.forEach(function(slot, i) {
        if (slot) {
            setTimeout(function() {
                var rect = slot.getBoundingClientRect();
                createGoldDust(rect);
                slot.classList.add('fly-out');
            }, i * 300);
        }
    });

    setTimeout(function() {
        document.getElementById('home-view').style.display = 'none';
        renderVerticalResult(deck, seed);
    }, 1800);
}
