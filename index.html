<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ORACLE TAROT PRO</title>
    <style>
        :root {
            --gold: #D4AF37;
            --bright-gold: #FFF5C3;
            --dark-gold: #8C6212;
            --bg: #000;
            --text: #fff;
            --font: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            overflow-x: hidden;
        }

        #app-container {
            max-width: 500px;
            width: 100%;
            padding: 50px 25px 40px 25px;
            text-align: center;
            position: relative;
            margin: 0 auto;
            border-left: 1px solid rgba(212,175,55,0.15);
            border-right: 1px solid rgba(212,175,55,0.15);
            min-height: 100vh;
        }

        /* ─── 타이틀 ─── */
        .gold-title {
            color: var(--gold);
            font-size: 2.3rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 0.3em;
            text-shadow: 0 0 15px rgba(212,175,55,0.6);
        }
        .sub-title {
            color: var(--gold);
            font-size: 0.95rem;
            letter-spacing: 0.5em;
            margin-bottom: 20px;
            display: block;
            font-weight: 800;
        }

        /* ─── 입력창 ─── */
        .input-system-wrapper {
            position: relative;
            width: 100%;
            height: 115px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .beveled-border {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(145deg, var(--bright-gold), var(--gold), var(--dark-gold));
            clip-path: polygon(15px 0%, calc(100% - 15px) 0%, 100% 15px, 100% calc(100% - 14px), calc(100% - 15px) 100%, 15px 100%, 0% calc(100% - 15px), 0% 15px);
        }
        .beveled-inner {
            position: absolute;
            width: calc(100% - 6px);
            height: calc(100% - 6px);
            background: linear-gradient(135deg, #2D0054, #120022);
            clip-path: polygon(14px 0%, calc(100% - 14px) 0%, 100% 14px, 100% calc(100% - 14px), calc(100% - 14px) 100%, 14px 100%, 0% calc(100% - 14px), 0% 14px);
        }
        .gold-input {
            position: relative;
            z-index: 10;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1rem;
            width: 88%;
            text-align: center;
            resize: none;
            height: 70px;
            font-weight: bold;
            font-family: var(--font);
        }
        .gold-input::placeholder { color: rgba(212,175,55,0.6); }

        /* ─── 카드 스테이지 ─── */
        .cards-stage {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin: 30px 0;
            perspective: 1000px;
        }
        .card-slot {
            flex: 1;
            position: relative;
            aspect-ratio: 2/3;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(212,175,55,0.3);
            background: #111;
        }
        .card-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.5s ease;
        }
        .card-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.75);
            color: var(--gold);
            font-size: 0.6rem;
            font-weight: bold;
            padding: 4px 2px;
            text-align: center;
            letter-spacing: 0.05em;
        }

        /* ─── 카드 플립 애니메이션 ─── */
        @keyframes cardFlip {
            0%   { transform: rotateY(0deg) scale(1); }
            50%  { transform: rotateY(90deg) scale(1.05); }
            100% { transform: rotateY(0deg) scale(1); }
        }
        .flipping { animation: cardFlip 0.6s ease forwards; }

        @keyframes flyOutSoft {
            0%   { transform: scale(1) rotate(0); opacity: 1; }
            100% { transform: scale(0.5) rotate(15deg) translateY(-500px); opacity: 0; }
        }
        .card-fly { animation: flyOutSoft 0.8s forwards; }

        /* ─── 버튼 ─── */
        .button-container {
            position: relative;
            width: 100%;
            margin-top: 15px;
        }
        .gold-button {
            background: linear-gradient(180deg, #FFF5C3 0%, #D4AF37 100%);
            color: #000;
            border: none;
            padding: 18px 0;
            width: 100%;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            font-size: 1.1rem;
            font-family: var(--font);
            transition: transform 0.1s;
        }
        .gold-button:active { transform: scale(0.97); }
        .gold-button:disabled { opacity: 0.5; cursor: not-allowed; }

        .spiritual-pointer {
            position: absolute;
            bottom: -20px; right: -10px;
            font-size: 2.5rem;
            z-index: 10;
            transform: rotate(150deg);
            animation: handMove 1.1s infinite ease-in-out;
            filter: drop-shadow(0 0 10px var(--gold));
        }
        @keyframes handMove {
            0%, 100% { transform: translateY(0) rotate(150deg); }
            50%       { transform: translateY(-15px) rotate(150deg); }
        }

        /* ─── 결과창 ─── */
        #result-view {
            display: none;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
        }
        #result-view.visible {
            display: flex;
            opacity: 1;
        }

        .result-cards {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            width: 100%;
        }
        .result-card-item {
            flex: 1;
            max-width: 100px;
            aspect-ratio: 2/3;
            border: 2.5px solid var(--gold);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }
        .result-card-item img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        .result-card-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8);
            color: var(--gold);
            font-size: 0.55rem;
            font-weight: bold;
            padding: 3px 2px;
            text-align: center;
        }
        .result-position-label {
            color: rgba(212,175,55,0.7);
            font-size: 0.65rem;
            text-align: center;
            margin-top: 4px;
            letter-spacing: 0.1em;
        }

        /* ─── 오라클 박스 ─── */
        .zenith-oracle-container {
            border: 4px double var(--gold);
            border-radius: 15px;
            padding: 25px;
            background: rgba(0,0,0,0.85);
            text-align: left;
            line-height: 1.9;
            box-shadow: inset 0 0 25px rgba(212,175,55,0.2);
            width: 100%;
        }

        #ai-loading-text {
            color: var(--gold);
            text-align: center;
            padding: 20px 0;
        }
        .loading-dots::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%   { content: ''; }
            33%  { content: '.'; }
            66%  { content: '..'; }
            100% { content: '...'; }
        }

        #oracle-content {
            color: #eee;
            font-size: 0.95rem;
        }
        #oracle-content b, #oracle-content strong {
            color: var(--gold);
        }
        #oracle-content h2, #oracle-content h3 {
            color: var(--gold);
            border-bottom: 1px solid rgba(212,175,55,0.3);
            padding-bottom: 5px;
        }

        .reset-btn {
            margin-top: 35px;
            background: none;
            border: 1.5px solid var(--gold);
            color: var(--gold);
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 1rem;
            transition: all 0.2s;
        }
        .reset-btn:hover { background: var(--gold); color: #000; }

        /* ─── 파티클 ─── */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            border-radius: 50%;
        }
    </style>
</head>
<body>
<div id="app-container">

    <!-- 홈 뷰 -->
    <div id="home-view">
        <h1 class="gold-title">ORACLE TAROT</h1>
        <span class="sub-title">PRO - MASTERPIECE</span>

        <div class="input-system-wrapper">
            <div class="beveled-border"></div>
            <div class="beveled-inner"></div>
            <textarea id="seed-input" class="gold-input" placeholder="마음의 질문을 깊게 새기소서"></textarea>
        </div>

        <div class="cards-stage">
            <div class="card-slot" id="slot-0">
                <img id="card-img-0" src="https://omegafund.github.io/oracle-tarot-pro/images/cards/back.jpg" alt="카드">
                <div class="card-label">과 거</div>
            </div>
            <div class="card-slot" id="slot-1">
                <img id="card-img-1" src="https://omegafund.github.io/oracle-tarot-pro/images/cards/back.jpg" alt="카드">
                <div class="card-label">현 재</div>
            </div>
            <div class="card-slot" id="slot-2">
                <img id="card-img-2" src="https://omegafund.github.io/oracle-tarot-pro/images/cards/back.jpg" alt="카드">
                <div class="card-label">미 래</div>
            </div>
        </div>

        <div class="button-container">
            <button class="gold-button" id="ritual-btn" onclick="startRitual()">운명의 3대 신탁 확인</button>
            <div class="spiritual-pointer">👇</div>
        </div>
    </div>

    <!-- 결과 뷰 -->
    <div id="result-view">
        <h1 class="gold-title" style="margin-bottom:5px;">ORACLE TAROT</h1>
        <span class="sub-title">신탁의 결과</span>

        <div class="result-cards" id="result-cards-container">
            <!-- JS로 동적 생성 -->
        </div>

        <div class="zenith-oracle-container">
            <div id="ai-loading-text">✨ 천상의 지혜를 연결 중<span class="loading-dots"></span></div>
            <div id="oracle-content"></div>
        </div>

        <button class="reset-btn" onclick="location.reload()">✦ 처음으로 돌아가기 ✦</button>
    </div>

</div>

<script>
// ════════════════════════════════════════════════════
//  카드 데이터 (tarotData.js 대체 - 인라인)
// ════════════════════════════════════════════════════
const CARDS = [
    { id: 'm00', name: 'The Fool (바보)', file: 'm00.jpg' },
    { id: 'm01', name: 'The Magician (마법사)', file: 'm01.jpg' },
    { id: 'm02', name: 'The High Priestess (여교황)', file: 'm02.jpg' },
    { id: 'm03', name: 'The Empress (여황제)', file: 'm03.jpg' },
    { id: 'm04', name: 'The Emperor (황제)', file: 'm04.jpg' },
];

const BASE_URL = 'https://omegafund.github.io/oracle-tarot-pro/images/cards/';
const API_KEY  = 'AIzaSyCK9lxmmQxg55NuRTk10ktGU-f8D1di1AY';

let selectedCards = [];

// ════════════════════════════════════════════════════
//  골드 파티클
// ════════════════════════════════════════════════════
function createGoldDust(x, y) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
        left: ${x + (Math.random() * 16 - 8)}px;
        top: ${y}px;
        width: 3px; height: 3px;
        background: var(--bright-gold);
        transition: all 1.2s ease-out;
    `;
    document.body.appendChild(p);
    requestAnimationFrame(() => {
        p.style.transform = 'translateY(40px)';
        p.style.opacity = '0';
    });
    setTimeout(() => p.remove(), 1300);
}

setInterval(() => {
    const pointer = document.querySelector('.spiritual-pointer');
    if (pointer && document.getElementById('home-view').style.display !== 'none') {
        const rect = pointer.getBoundingClientRect();
        createGoldDust(rect.left + rect.width / 2, rect.top + 10);
    }
}, 250);

// ════════════════════════════════════════════════════
//  카드 3장 랜덤 선택
// ════════════════════════════════════════════════════
function pickThreeCards() {
    const shuffled = [...CARDS].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, 3);
}

// ════════════════════════════════════════════════════
//  메인 리추얼 시작
// ════════════════════════════════════════════════════
async function startRitual() {
    const question = document.getElementById('seed-input').value.trim();
    if (!question) {
        alert('질문을 입력해주세요.');
        return;
    }

    const btn = document.getElementById('ritual-btn');
    btn.disabled = true;

    // 1) 카드 3장 선택
    selectedCards = pickThreeCards();

    // 2) 카드 플립 애니메이션 → 앞면 이미지로 교체
    const positions = ['과거', '현재', '미래'];
    for (let i = 0; i < 3; i++) {
        await flipCard(i, selectedCards[i]);
        await delay(300);
    }

    // 3) 잠깐 보여주다가 결과창으로 전환
    await delay(800);

    // 카드가 날아가는 애니메이션
    for (let i = 0; i < 3; i++) {
        const img = document.getElementById(`card-img-${i}`);
        if (img) img.classList.add('card-fly');
        await delay(200);
    }

    await delay(700);

    // 4) 결과창 표시
    showResultView(question);
}

function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

function flipCard(index, card) {
    return new Promise(resolve => {
        const img = document.getElementById(`card-img-${index}`);
        img.classList.add('flipping');
        setTimeout(() => {
            img.src = `${BASE_URL}${card.file}`;
            img.onerror = () => { img.src = `${BASE_URL}back.jpg`; };
            img.classList.remove('flipping');
            resolve();
        }, 300);
    });
}

// ════════════════════════════════════════════════════
//  결과창 표시 + AI 호출
// ════════════════════════════════════════════════════
function showResultView(question) {
    // 홈 숨기기
    document.getElementById('home-view').style.display = 'none';

    // 결과 카드 이미지 렌더링
    const container = document.getElementById('result-cards-container');
    const positions = ['과 거', '현 재', '미 래'];
    container.innerHTML = selectedCards.map((card, i) => `
        <div style="flex:1; max-width:100px; display:flex; flex-direction:column; align-items:center;">
            <div class="result-card-item">
                <img src="${BASE_URL}${card.file}" alt="${card.name}"
                     onerror="this.src='${BASE_URL}back.jpg'">
                <div class="result-card-label">${card.name}</div>
            </div>
            <div class="result-position-label">${positions[i]}</div>
        </div>
    `).join('');

    // 결과창 표시 (fade-in)
    const resultView = document.getElementById('result-view');
    resultView.style.display = 'flex';
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            resultView.style.opacity = '1';
        });
    });

    // AI 해석 호출
    fetchOracleInterpretation(question, selectedCards);
}

// ════════════════════════════════════════════════════
//  Gemini AI 신탁 해석
// ════════════════════════════════════════════════════
async function fetchOracleInterpretation(question, cards) {
    const loadingEl  = document.getElementById('ai-loading-text');
    const contentEl  = document.getElementById('oracle-content');

    const cardDesc = cards.map((c, i) => {
        const pos = ['과거', '현재', '미래'][i];
        return `${pos}: ${c.name}`;
    }).join('\n');

    const prompt = `너는 주식·부동산 투자, 명리학, 타로, 심리학에 정통한 'AI 리얼타임 오라클 제니스'다.
반드시 아래 규칙을 지켜서 답변하라:

1. 사용자의 질문 카테고리(주식/부동산/연애/건강/일반 운세 등)를 판단하여 해당 분야 전문가 말투를 사용하라.
2. 주식/부동산 질문이라면: 2026년 현재 시장 상황(HBM, AI반도체, 부동산 정책 등)을 카드 상징과 결합하라.
3. 단순 운세 풀이가 아니라 구체적인 키워드를 포함한 실질적 통찰을 제시하라.
4. 답변 형식: **[과거 카드 해석]**, **[현재 카드 해석]**, **[미래 카드 해석]**, **[제니스 종합 신탁]** 순서로 작성하라.
5. [제니스 종합 신탁]에서는 세 카드를 종합하여 질문에 대한 소름 돋는 통찰과 구체적 행동 지침을 제공하라.
6. 총 600~900자 내외로 작성하라.

질문: ${question}

선택된 카드:
${cardDesc}

위 정보를 바탕으로 소름 돋는 통찰을 제공하라.`;

    try {
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;

        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: {
                    temperature: 0.75,
                    maxOutputTokens: 2048
                }
            })
        });

        if (!response.ok) {
            const err = await response.json();
            const reason = err?.error?.message || JSON.stringify(err);
            throw new Error(`API ${response.status}: ${reason}`);
        }

        const data = await response.json();

        const parts = data?.candidates?.[0]?.content?.parts || [];
        const aiText = parts
            .filter(p => p.text)
            .map(p => p.text)
            .join('');

        if (!aiText) throw new Error('빈 응답');

        const formatted = aiText
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/^#{1,3}\s(.+)/gm, '<h3>$1</h3>')
            .replace(/\n/g, '<br>');

        loadingEl.style.display = 'none';
        contentEl.innerHTML = formatted;

    } catch (error) {
        console.error('신탁 오류:', error);
        loadingEl.style.display = 'none';
        contentEl.innerHTML = `
            <div style="color:#ff6b6b; text-align:center; padding:20px;">
                ⚠️ 천상의 연결이 원활하지 않습니다.<br>
                <small style="color:#888;">${error.message}</small>
            </div>
        `;
    }
}
</script>
</body>
</html>
