<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ORACLE TAROT PRO - MASTERPIECE</title>
    <style>
        :root { --gold: #D4AF37; --bright-gold: #FFF5C3; --dark-gold: #8C6212; --bg: #000; --text: #fff; --font: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
        body { margin: 0; padding: 0; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); color: var(--text); font-family: var(--font); min-height: 100vh; overflow-x: hidden; }
        
        /* 화면 전체 흔들림 방지를 위해 포지션 고정 */
        #app-container { max-width: 500px; width: 100%; padding: 60px 25px 40px 25px; text-align: center; box-sizing: border-box; position: relative; margin: 0 auto; border-left: 1px solid rgba(212, 175, 55, 0.15); border-right: 1px solid rgba(212, 175, 55, 0.15); z-index: 1; }

        /* 제목 및 반짝임 */
        .gold-title { color: var(--gold); font-size: 2.3rem; font-weight: 900; margin: 0; letter-spacing: 0.3em; text-shadow: 0 0 15px rgba(212, 175, 55, 0.6); }
        .sub-title { color: var(--gold); font-size: 0.95rem; letter-spacing: 0.5em; margin-bottom: 20px; display: block; font-weight: 800; }

        /* 입력창 베벨 디자인 */
        .input-system-wrapper { position: relative; width: 100%; height: 115px; margin: 0 auto; display: flex; align-items: center; justify-content: center; z-index: 2; }
        .beveled-border { position: absolute; width: 100%; height: 100%; background: linear-gradient(145deg, var(--bright-gold), var(--gold), var(--dark-gold)); clip-path: polygon(15px 0%, calc(100% - 15px) 0%, 100% 15px, 100% calc(100% - 14px), calc(100% - 15px) 100%, 15px 100%, 0% calc(100% - 15px), 0% 15px); }
        .beveled-inner { position: absolute; width: calc(100% - 6px); height: calc(100% - 6px); background: linear-gradient(135deg, #2D0054, #120022); clip-path: polygon(14px 0%, calc(100% - 14px) 0%, 100% 14px, 100% calc(100% - 14px), calc(100% - 14px) 100%, 14px 100%, 0% calc(100% - 14px), 0% 14px); }
        .gold-input { position: relative; z-index: 10; background: transparent; border: none; outline: none; color: #fff; font-size: 1rem; width: 88%; text-align: center; resize: none; height: 70px; font-weight: bold; }

        /* 카드 스테이지 및 부드러운 날아가는 애니메이션 */
        .cards-stage { display: flex; justify-content: space-between; gap: 10px; margin: 40px 0; perspective: 1000px; min-height: 200px; position: relative; z-index: 3; }
        .card-slot { flex: 1; position: relative; aspect-ratio: 2 / 3; background: #111; border-radius: 8px; border: 1px solid rgba(212, 175, 55, 0.3); }
        .card-img { width: 100%; height: 100%; object-fit: cover; border: 1.5px solid var(--gold); border-radius: 8px; transition: transform 0.5s ease; }
        
        /* [수정] 카드 날아가는 효과 - 회전 강도 대폭 감소, 부드러운 곡선 이동 */
        .card-fly { animation: flyOutSoft 1s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; position: relative; z-index: 100; }
        @keyframes flyOutSoft { 
            0% { transform: scale(1) rotate(0deg) translateY(0); opacity: 1; }
            50% { transform: scale(1.1) rotate(15deg) translateY(-100px); opacity: 0.8; } /* 부드러운 15도 회전 */
            100% { transform: scale(0.5) rotate(0deg) translateY(-600px); opacity: 0; } /* 제자리로 돌아오며 사라짐 */
        }

        /* 손 모양 및 금가루 */
        .button-container { position: relative; width: 100%; margin-top: 20px; z-index: 4; }
        .spiritual-pointer { position: absolute; bottom: -20px; right: -10px; font-size: 2.5rem; z-index: 10; transform: rotate(150deg); animation: handMove 1.1s infinite ease-in-out; filter: drop-shadow(0 0 10px var(--gold)); pointer-events: none; }
        @keyframes handMove { 0%, 100% { transform: translateY(0) rotate(150deg); } 50% { transform: translateY(-15px) rotate(150deg); } }

        .gold-button { background: linear-gradient(180deg, #FFF5C3 0%, #D4AF37 100%); color: #000; border: none; padding: 18px 0; width: 100%; border-radius: 50px; font-weight: 900; cursor: pointer; font-size: 1.1rem; z-index: 5; position: relative; }

        /* 결과창 (금색 테두리 및 은은한 등장) */
        #result-view { display: none; width: 100%; flex-direction: column; opacity: 0; transition: opacity 1s ease, transform 1s ease; transform: translateY(30px); z-index: 5; position: relative; }
        #result-view.fade-in { display: flex; opacity: 1; transform: translateY(0); }
        .result-cards { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .result-card-item { width: 85px; aspect-ratio: 2/3; border: 2.5px solid var(--gold); border-radius: 6px; overflow: hidden; box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
        .zenith-oracle-container { border: 4px double var(--gold); border-radius: 15px; padding: 30px; background: rgba(0,0,0,0.85); text-align: left; line-height: 1.8; position: relative; box-shadow: inset 0 0 25px rgba(212, 175, 55, 0.4); }
        
        /* 파티클 효과 [수정: 은은하게] */
        .particle { position: fixed; pointer-events: none; z-index: 9999; }
        .star { position: fixed; color: var(--bright-gold); font-size: 1rem; pointer-events: none; animation: starFadeSoft 1.2s forwards; }
        @keyframes starFadeSoft { 0% { transform: scale(0); opacity: 1; } 50% { opacity: 0.8; } 100% { transform: scale(1.2) translateY(-50px); opacity: 0; } }
    </style>
</head>
<body>
<div id="app-container">
    <div id="home-view">
        <h1 class="gold-title">ORACLE TAROT</h1>
        <span class="sub-title">PRO - MASTERPIECE</span>
        
        <div class="input-system-wrapper">
            <div class="beveled-border"></div><div class="beveled-inner"></div>
            <textarea id="seed-input" class="gold-input" placeholder="마음의 질문을 깊게 새기소서"></textarea>
        </div>

        <div id="cards-container" class="cards-stage">
            <div class="card-slot" id="slot-1"><img src="https://omegafund.github.io/oracle-tarot-pro/images/cards/back.jpg" class="card-img"></div>
            <div class="card-slot" id="slot-2"><img src="https://omegafund.github.io/oracle-tarot-pro/images/cards/back.jpg" class="card-img"></div>
            <div class="card-slot" id="slot-3"><img src="https://omegafund.github.io/oracle-tarot-pro/images/cards/back.jpg" class="card-img"></div>
        </div>

        <div class="button-container">
            <button class="gold-button" onclick="startRitual()">운명의 3대 신탁 확인</button>
            <div id="hand-pointer" class="spiritual-pointer">👇</div>
        </div>
    </div>

    <div id="result-view">
        <div id="category-display" style="color:var(--gold); font-weight:900; margin-bottom:20px; letter-spacing:0.2em;">◈ 운명의 여정 확인 ◈</div>
        <div class="result-cards">
            <div class="result-card-item"><img src="https://omegafund.github.io/oracle-tarot-pro/images/cards/back.jpg" class="card-img"></div>
            <div class="result-card-item"><img src="https://omegafund.github.io/oracle-tarot-pro/images/cards/back.jpg" class="card-img"></div>
            <div class="result-card-item"><img src="https://omegafund.github.io/oracle-tarot-pro/images/cards/back.jpg" class="card-img"></div>
        </div>
        <div class="zenith-oracle-container">
            <div id="ai-loading-text" style="color:var(--gold); text-align:center; font-weight:bold;">✨ 천상의 지혜를 연결 중...</div>
            <div id="oracle-content"></div>
        </div>
        <button onclick="location.reload()" style="margin-top:35px; background:none; border:1.5px solid #D4AF37; color:#D4AF37; padding:12px 30px; border-radius:25px; cursor:pointer; font-weight:bold;">처음으로</button>
    </div>
</div>

<script>
    const API_KEY = "REPLACE_ME_WITH_API_KEY";

    async function revealTheTrinity() {
        const seed = document.getElementById('seed-input').value;

    // 1. 손 모양 금가루 효과 루프 (상시 유지)
    setInterval(() => {
        const hand = document.getElementById('hand-pointer');
        const rect = hand.getBoundingClientRect();
        if(document.getElementById('home-view').style.display !== 'none') {
            createGoldDust(rect.left + rect.width/2, rect.top + 10);
        }
    }, 250);

    function createGoldDust(x, y) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = x + (Math.random() * 16 - 8) + 'px';
        p.style.top = y + (Math.random() * 10) + 'px';
        p.style.width = '3px';
        p.style.height = '3px';
        p.style.background = 'var(--bright-gold)';
        p.style.boxShadow = '0 0 5px var(--gold)';
        p.style.borderRadius = '50%';
        p.style.transition = 'all 1.2s ease-out';
        document.body.appendChild(p);
        setTimeout(() => { p.style.transform = 'translateY(40px)'; p.style.opacity = '0'; }, 10);
        setTimeout(() => p.remove(), 1200);
    }

    // 2. 부드러운 카드 날아가는 애니메이션 및 점사 시작
    async function startRitual() {
        const seed = document.getElementById('seed-input').value;
        if(!seed) { alert("질문을 입력해주세요."); return; }

        // 카드 한장씩 부드럽게 날리기 + 은은한 별 반짝임
        const slots = [document.getElementById('slot-1'), document.getElementById('slot-2'), document.getElementById('slot-3')];
        for (let i = 0; i < slots.length; i++) {
            setTimeout(() => {
                const cardImg = slots[i].querySelector('.card-img');
                cardImg.classList.add('card-fly');
                // 별 반짝임 위치 조정
                const rect = slots[i].getBoundingClientRect();
                createStar(rect.left + rect.width/2, rect.top + rect.height/2);
            }, i * 250); // 순차적 등장 속도 약간 느리게
        }

        // 홈뷰 숨기고 결과창 은은하게 등장
        setTimeout(() => {
            document.getElementById('home-view').style.display = 'none';
            const rv = document.getElementById('result-view');
            rv.style.display = 'flex';
            setTimeout(() => rv.classList.add('fade-in'), 100);
            revealTheTrinity(seed);
        }, 1200); // 전체 애니메이션 시간에 맞춤
    }

    function createStar(x, y) {
        for(let i=0; i<4; i++) { // 별 개수 줄임
            const s = document.createElement('div');
            s.className = 'star';
            s.innerHTML = '✦';
            s.style.left = x + (Math.random()*40 - 20) + 'px';
            s.style.top = y + (Math.random()*40 - 20) + 'px';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 1200);
        }
    }

    async function revealTheTrinity(seed) {
        const oracleContent = document.getElementById('oracle-content');
        const loadingText = document.getElementById('ai-loading-text');

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `당신은 'AI 오라클 제니스'입니다. 질문: "${seed}". 과거/현재/미래 타로 3장을 수비학으로 풀이하고 2026년 4월의 실시간 흐름을 반영한 비책을 내리세요.` }] }]
                })
            });
            const data = await response.json();
            const aiText = data?.candidates?.[0]?.content?.parts?.[0]?.text;

            if (aiText) {
                loadingText.style.display = 'none';
                oracleContent.innerHTML = aiText.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b style="color:var(--gold)">$1</b>');
            }
        } catch (e) {
            loadingText.innerText = "⚠️ 연결 실패: " + e.message;
        }
    }
</script>
</body>
</html>
