<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZEUS ORACLE TAROT</title>
    <style>
        :root {
            --gold: #D4AF37;
            --bright-gold: #FFF5C3;
            --dark-gold: #8C6212;
            --bg: #000;
            --text: #fff;
            --font: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            overflow-x: hidden;
        }
        #app-container {
            max-width: 500px;
            width: 100%;
            padding: 50px 25px 40px 25px;
            text-align: center;
            position: relative;
            margin: 0 auto;
            border-left: 1px solid rgba(212,175,55,0.15);
            border-right: 1px solid rgba(212,175,55,0.15);
            min-height: 100vh;
        }

        /* ════════════════════════════════════
           ✦ 아치형 별 타이틀 영역
        ════════════════════════════════════ */
        .arch-title-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 4px;
            padding-top: 10px;
        }
        .arch-svg-wrapper {
            position: relative;
            width: 320px;
            height: 90px;
            margin: 0 auto;
        }
        .arch-svg-wrapper svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: visible;
        }
        .gold-title {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            text-align: center;
            z-index: 2;
            color: var(--gold);
            font-size: 2.3rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 0.3em;
            text-shadow: 0 0 15px rgba(212,175,55,0.6), 0 0 30px rgba(212,175,55,0.3);
            line-height: 1;
        }
        .sub-title {
            color: var(--gold);
            font-size: 0.95rem;
            letter-spacing: 0.5em;
            margin-top: 6px;
            margin-bottom: 20px;
            display: block;
            font-weight: 800;
        }

        /* ════════════════════════════════════
           ✦ 아치 별 깜빡임 애니메이션
        ════════════════════════════════════ */
        @keyframes archStarTwinkle1 {
            0%,100%{opacity:0.2;}
            50%{opacity:1;filter:drop-shadow(0 0 8px #FFF5C3) drop-shadow(0 0 16px #D4AF37);}
        }
        @keyframes archStarTwinkle2 {
            0%,100%{opacity:0.5;}
            40%{opacity:1;filter:drop-shadow(0 0 10px #FFF5C3);}
        }
        @keyframes archStarTwinkle3 {
            0%,100%{opacity:0.15;}
            60%{opacity:0.9;filter:drop-shadow(0 0 6px #D4AF37);}
        }
        @keyframes archStarTwinkle4 {
            0%,100%{opacity:0.7;}
            30%{opacity:0.2;}
            70%{opacity:1;filter:drop-shadow(0 0 12px #FFF5C3);}
        }
        @keyframes archStarTwinkle5 {
            0%,100%{opacity:0.3;}
            55%{opacity:1;filter:drop-shadow(0 0 10px #D4AF37);}
        }

        .star-icon {
            color: var(--gold);
            font-size: 1.5rem;
            text-shadow: 0 0 10px var(--gold);
            animation: starPulse 2s infinite ease-in-out;
        }
        @keyframes starPulse {
            0%, 100% { opacity: 0.5; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .input-system-wrapper {
            position: relative;
            width: 100%;
            height: 115px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .beveled-border {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(145deg, var(--bright-gold), var(--gold), var(--dark-gold));
            clip-path: polygon(15px 0%, calc(100% - 15px) 0%, 100% 15px, 100% calc(100% - 14px), calc(100% - 15px) 100%, 15px 100%, 0% calc(100% - 14px), 0% 15px);
        }
        .beveled-inner {
            position: absolute;
            width: calc(100% - 6px);
            height: calc(100% - 6px);
            background: linear-gradient(135deg, #2D0054, #120022);
            clip-path: polygon(14px 0%, calc(100% - 14px) 0%, 100% 14px, 100% calc(100% - 14px), calc(100% - 14px) 100%, 14px 100%, 0% calc(100% - 14px), 0% 14px);
        }
        .gold-input {
            position: relative;
            z-index: 10;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1rem;
            width: 88%;
            text-align: center;
            resize: none;
            height: 70px;
            font-weight: bold;
            font-family: var(--font);
        }
        .gold-input::placeholder { color: rgba(212,175,55,0.6); }
        .cards-stage {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin: 30px 0;
            perspective: 1000px;
        }
        .card-slot {
            flex: 1;
            position: relative;
            aspect-ratio: 2/3;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(212,175,55,0.3);
            background: #111;
        }
        .card-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.4s ease;
        }
        .slot-hourglass {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.6rem;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold), 0 0 20px rgba(212,175,55,0.5);
            animation: hgSpin 1.4s infinite ease-in-out;
            line-height: 1;
            font-style: normal;
        }
        @keyframes hgSpin {
            0%   { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
            45%  { transform: translate(-50%, -50%) rotate(180deg); opacity: 0.6; }
            50%  { transform: translate(-50%, -50%) rotate(180deg); opacity: 1; }
            95%  { transform: translate(-50%, -50%) rotate(360deg); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) rotate(360deg); opacity: 1; }
        }
        .card-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.75);
            color: var(--gold);
            font-size: 0.6rem;
            font-weight: bold;
            padding: 4px 2px;
            text-align: center;
            letter-spacing: 0.05em;
        }
        @keyframes cardFlip {
            0%   { transform: rotateY(0deg) scale(1); }
            50%  { transform: rotateY(90deg) scale(1.05); }
            100% { transform: rotateY(0deg) scale(1); }
        }
        .flipping { animation: cardFlip 0.6s ease forwards; }
        @keyframes flyOutSoft {
            0%   { transform: scale(1) rotate(0); opacity: 1; }
            100% { transform: scale(0.5) rotate(15deg) translateY(-500px); opacity: 0; }
        }
        .card-fly { animation: flyOutSoft 0.8s forwards; }
        .button-container {
            position: relative;
            width: 100%;
            margin-top: 15px;
        }
        .gold-button {
            background: linear-gradient(180deg, #FFF5C3 0%, #D4AF37 100%);
            color: #000;
            border: none;
            padding: 18px 0;
            width: 100%;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            font-size: 1.1rem;
            font-family: var(--font);
            transition: transform 0.1s;
        }
        .gold-button:active { transform: scale(0.97); }
        .gold-button:disabled { opacity: 0.7; cursor: not-allowed; }
        .gold-button .orb-spin {
            display: inline-block;
            animation: orbPulse 0.8s ease-in-out infinite;
        }
        @keyframes orbPulse {
            0%, 100% { transform: scale(1) rotate(-10deg); }
            50%       { transform: scale(1.3) rotate(10deg); }
        }
        .spiritual-pointer {
            position: absolute;
            bottom: -20px; right: -10px;
            font-size: 2.5rem;
            z-index: 10;
            transform: rotate(150deg);
            animation: handMove 1.1s infinite ease-in-out;
            filter: drop-shadow(0 0 10px var(--gold));
        }
        @keyframes handMove {
            0%, 100% { transform: translateY(0) rotate(150deg); }
            50%       { transform: translateY(-15px) rotate(150deg); }
        }
        .disclaimer-text {
            margin-top: 28px;
            font-size: 0.72rem;
            color: rgba(212,175,55,0.55);
            line-height: 1.6;
            letter-spacing: 0.03em;
            border-top: 1px solid rgba(212,175,55,0.15);
            padding-top: 12px;
        }
        #result-view {
            display: none;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .result-cards {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            width: 100%;
        }
        .result-card-item {
            flex: 1;
            max-width: 100px;
            aspect-ratio: 2/3;
            border: 2.5px solid var(--gold);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }
        .result-card-item img { width:100%; height:100%; object-fit:cover; display:block; }
        .result-card-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8);
            color: var(--gold);
            font-size: 0.55rem;
            font-weight: bold;
            padding: 3px 2px;
            text-align: center;
        }
        .result-position-label {
            color: rgba(212,175,55,0.7);
            font-size: 0.65rem;
            text-align: center;
            margin-top: 4px;
            letter-spacing: 0.1em;
        }
        .zenith-oracle-container {
            border: 4px double var(--gold);
            border-radius: 15px;
            padding: 25px;
            background: rgba(0,0,0,0.85);
            text-align: left;
            line-height: 1.9;
            box-shadow: inset 0 0 25px rgba(212,175,55,0.2);
            width: 100%;
            position: relative;
        }
        /* 로딩 & 진행바 */
        #ai-loading-text {
            color: var(--gold);
            text-align: center;
            padding: 15px 0 8px;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            min-height: 2em;
        }
        #oracle-progress-wrap {
            width: 100%;
            background: rgba(212,175,55,0.15);
            border-radius: 50px;
            height: 6px;
            margin: 0 0 15px;
            overflow: hidden;
            display: none;
        }
        #oracle-progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 50px;
            background: linear-gradient(90deg, #8C6212, #D4AF37, #FFF5C3);
            box-shadow: 0 0 8px rgba(212,175,55,0.7);
            transition: width 0.5s ease;
        }
        #oracle-content { color: #eee; font-size: 0.95rem; }
        #oracle-content b, #oracle-content strong { color: var(--gold); }
        #oracle-content h2, #oracle-content h3 {
            color: var(--gold);
            border-bottom: 1px solid rgba(212,175,55,0.3);
            padding-bottom: 5px;
            margin-top: 20px;
        }

        /* ③ 스트리밍 커서 깜빡임 */
        .streaming-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--gold);
            margin-left: 2px;
            vertical-align: middle;
            animation: cursorBlink 0.7s infinite;
        }
        @keyframes cursorBlink {
            0%,100%{ opacity: 1; }
            50%{ opacity: 0; }
        }
        .reset-btn {
            margin-top: 35px;
            background: none;
            border: 1.5px solid var(--gold);
            color: var(--gold);
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 1rem;
            transition: all 0.2s;
        }
        .reset-btn:hover { background: var(--gold); color: #000; }
        .particle, .gold-dust {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            border-radius: 50%;
        }
        .card-block {
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(212,175,55,0.15);
            overflow: hidden;
        }
        .card-block:last-of-type { border-bottom: none; }
        .card-block h2 {
            font-size: 1rem;
            letter-spacing: 0.15em;
            color: var(--gold);
            margin: 0 0 4px 0;
            font-weight: 900;
        }
        /* 카드 이미지 — 텍스트 왼쪽에 float */
        .mini-card-float {
            float: left;
            width: 40px;
            height: 60px;
            object-fit: cover;
            border-radius: 5px;
            border: 1.5px solid rgba(212,175,55,0.6);
            margin: 2px 10px 6px 0;
            box-shadow: 0 0 8px rgba(212,175,55,0.2);
            flex-shrink: 0;
            cursor: pointer;
        }
        .card-text-wrap {
            /* float된 이미지 옆에서 텍스트 시작 */
            overflow: hidden;
        }
        .card-name-inline {
            font-size: 0.78rem;
            color: rgba(212,175,55,0.85);
            font-style: italic;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            display: block;
        }
        .card-text {
            font-size: 0.93rem;
            line-height: 1.85;
            color: rgba(255,255,255,0.88);
        }
        .synergy-reading {
            margin: 20px 0;
            padding: 16px;
            background: rgba(212,175,55,0.06);
            border: 1px solid rgba(212,175,55,0.25);
            border-radius: 10px;
            font-size: 0.93rem;
            line-height: 1.85;
            color: rgba(255,255,255,0.88);
        }
        .synergy-reading strong { color: var(--gold); }
        .final-reading {
            margin-top: 28px;
            padding: 0;
            background: transparent;
            border: none;
            font-size: 0.93rem;
            line-height: 1.85;
            color: rgba(255,255,255,0.9);
        }
        .final-reading strong { color: var(--gold); }
        .final-reading-inner {
            padding-bottom: 0;
        }
        /* 신탁 타이틀 — 녹색, 과거/현재/미래와 동일 스타일 */
        .zenith-title-block {
            margin-top: 0;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(46,204,113,0.4);
        }
        .zenith-title-main {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 0.15em;
            color: #2ecc71;
            margin: 0 0 2px 0;
            display: block;
        }
        .zenith-title-sub {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: rgba(46,204,113,0.75);
            display: block;
        }
        .zenith-oracle-text {
            font-size: 0.93rem;
            line-height: 1.85;
            color: rgba(255,255,255,0.88);
            margin-top: 14px;
        }
        .oracle-categories {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }
        .oracle-cat-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            background: rgba(46,204,113,0.06);
            border-left: 3px solid rgba(46,204,113,0.5);
            border-radius: 0 6px 6px 0;
            padding: 8px 10px;
        }
        .oracle-cat-icon { font-size: 1.1rem; flex-shrink: 0; }
        .oracle-cat-label {
            color: #2ecc71;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
            min-width: 52px;
        }
        .oracle-cat-val {
            color: rgba(255,255,255,0.88);
            font-size: 0.9rem;
            line-height: 1.7;
        }

        /* ── 유료 잠금 블러 */
        .locked-section {
            position: relative;
            margin-top: 10px;
        }
        .locked-blur {
            filter: blur(5px);
            pointer-events: none;
            user-select: none;
            opacity: 0.7;
        }
        .unlock-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            width: 90%;
        }
        .unlock-btn {
            background: linear-gradient(180deg, #FFF5C3 0%, #D4AF37 100%);
            color: #000;
            border: none;
            padding: 14px 24px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1rem;
            font-family: var(--font);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(212,175,55,0.5);
            transition: transform 0.1s;
        }
        .unlock-btn:active { transform: scale(0.97); }
        .unlock-desc {
            color: rgba(212,175,55,0.8);
            font-size: 0.78rem;
            margin-top: 8px;
            letter-spacing: 0.05em;
        }
        /* 결제 모달 */
        .pay-modal-overlay {
            position: fixed;
            top:0;left:0;width:100%;height:100%;
            background: rgba(0,0,0,0.85);
            z-index: 99998;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pay-modal {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 30px 24px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            position: relative;
        }
        .pay-modal h3 {
            color: var(--gold);
            font-size: 1.2rem;
            margin: 0 0 12px;
            letter-spacing: 0.1em;
        }
        .pay-modal p {
            color: rgba(255,255,255,0.8);
            font-size: 0.88rem;
            line-height: 1.7;
            margin: 0 0 20px;
        }
        .pay-account {
            background: rgba(212,175,55,0.1);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 20px;
            text-align: left;
        }
        .pay-account div {
            color: rgba(255,255,255,0.85);
            font-size: 0.88rem;
            line-height: 1.9;
        }
        .pay-account strong { color: var(--gold); }
        .pay-confirm-btn {
            background: linear-gradient(180deg, #FFF5C3 0%, #D4AF37 100%);
            color: #000;
            border: none;
            padding: 13px 0;
            width: 100%;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1rem;
            font-family: var(--font);
            cursor: pointer;
            margin-bottom: 10px;
        }
        .pay-close-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.5);
            padding: 10px 0;
            width: 100%;
            border-radius: 50px;
            font-family: var(--font);
            cursor: pointer;
            font-size: 0.88rem;
        }
    </style>
</head>
<body>
<div id="app-container">

    <div id="home-view">

        <!-- ✦ 아치형 별 타이틀 -->
        <div class="arch-title-wrapper">
            <div class="arch-svg-wrapper">
                <svg viewBox="0 0 320 90" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    <circle cx="18"  cy="72" r="3"   fill="#D4AF37" filter="url(#glow)" style="animation:archStarTwinkle3 2.1s infinite ease-in-out;"/>
                    <circle cx="38"  cy="52" r="2.5" fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle1 1.7s 0.3s infinite ease-in-out;"/>
                    <circle cx="58"  cy="34" r="4"   fill="#D4AF37" filter="url(#glow)" style="animation:archStarTwinkle5 2.4s 0.6s infinite ease-in-out;"/>
                    <circle cx="82"  cy="18" r="3"   fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle2 1.9s 0.1s infinite ease-in-out;"/>
                    <circle cx="110" cy="7"  r="3.5" fill="#D4AF37" filter="url(#glow)" style="animation:archStarTwinkle4 2.2s 0.8s infinite ease-in-out;"/>
                    <circle cx="140" cy="2"  r="4.5" fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle1 1.5s 0.4s infinite ease-in-out;"/>
                    <circle cx="160" cy="1"  r="5.5" fill="#FFD700" filter="url(#glow)" style="animation:archStarTwinkle5 1.3s 0s   infinite ease-in-out;"/>
                    <circle cx="180" cy="2"  r="4.5" fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle1 1.5s 0.5s infinite ease-in-out;"/>
                    <circle cx="210" cy="7"  r="3.5" fill="#D4AF37" filter="url(#glow)" style="animation:archStarTwinkle4 2.2s 0.2s infinite ease-in-out;"/>
                    <circle cx="238" cy="18" r="3"   fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle2 1.9s 0.7s infinite ease-in-out;"/>
                    <circle cx="262" cy="34" r="4"   fill="#D4AF37" filter="url(#glow)" style="animation:archStarTwinkle5 2.4s 0.3s infinite ease-in-out;"/>
                    <circle cx="282" cy="52" r="2.5" fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle1 1.7s 0.9s infinite ease-in-out;"/>
                    <circle cx="302" cy="72" r="3"   fill="#D4AF37" filter="url(#glow)" style="animation:archStarTwinkle3 2.1s 0.5s infinite ease-in-out;"/>
                    <circle cx="48"  cy="44" r="1.5" fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle2 1.1s 0.2s infinite ease-in-out;"/>
                    <circle cx="96"  cy="11" r="2"   fill="#FFD700" filter="url(#glow)" style="animation:archStarTwinkle4 1.8s 0.6s infinite ease-in-out;"/>
                    <circle cx="224" cy="11" r="2"   fill="#FFD700" filter="url(#glow)" style="animation:archStarTwinkle4 1.8s 0.3s infinite ease-in-out;"/>

                </svg>

//  영성적 싱크로니시티 카드 선택
// ════════════════════════════════════
function pickThreeCards(question) {
    const now = Date.now();
    let hash = now;
    for (let i = 0; i < question.length; i++) {
        hash = ((hash << 5) - hash) + question.charCodeAt(i);
        hash |= 0;
    }
    let s = Math.abs(hash);
    const rand = () => {
        s = (s * 1664525 + 1013904223) & 0xffffffff;
        return (s >>> 0) / 0xffffffff;
    };
    return [...CARDS].sort(() => rand() - 0.5).slice(0, 3);
}

async function getUpbitData(market = "KRW-BTC") {
    try {
        const priceRes = await fetch(`https://api.upbit.com/v1/ticker?markets=${market}`);
        const priceData = await priceRes.json();

        const candleRes = await fetch(`https://api.upbit.com/v1/candles/minutes/5?market=${market}&count=50`);
        const candleData = await candleRes.json();

        return {
            price: priceData[0].trade_price,
            candles: candleData.map(c => c.trade_price).reverse()
        };
    } catch (e) {
        console.error("업비트 API 실패", e);
        return null;
    }
}

function calculateRSI(prices, period = 14) {
    let gains = 0;
    let losses = 0;

    for (let i = 1; i <= period; i++) {
        const diff = prices[i] - prices[i - 1];
        if (diff >= 0) gains += diff;
        else losses -= diff;
    }

    let avgGain = gains / period;
    let avgLoss = losses / period;

    for (let i = period + 1; i < prices.length; i++) {
        const diff = prices[i] - prices[i - 1];

        if (diff >= 0) {
            avgGain = (avgGain * (period - 1) + diff) / period;
            avgLoss = (avgLoss * (period - 1)) / period;
        } else {
            avgGain = (avgGain * (period - 1)) / period;
            avgLoss = (avgLoss * (period - 1) - diff) / period;
        }
    }

    const rs = avgGain / (avgLoss || 1);
    return 100 - (100 / (1 + rs));
}

async function getTradingSignal(fullText) {

    const data = await getUpbitData("KRW-BTC");
    if (!data) return null;

    const rsi = calculateRSI(data.candles);

    // 🔥 타로 점수
    let tarotScore = 0;

    if (/Sun|Ace of Pentacles|Queen of Wands/.test(fullText)) tarotScore += 2;
    if (/Devil|Tower|Death/.test(fullText)) tarotScore -= 3;

    // 🔥 RSI 판단
    let rsiSignal = "중립";
    if (rsi < 30) rsiSignal = "과매도";      // 매수 신호
    else if (rsi > 70) rsiSignal = "과매수"; // 매도 신호

    // 🔥 최종 결론
    let finalAction = "관망";

    if (tarotScore > 0 && rsi < 35) {
        finalAction = "🔥 강한 매수";
    } else if (tarotScore < 0 && rsi > 65) {
        finalAction = "❌ 매수 금지";
    } else if (tarotScore > 0) {
        finalAction = "분할 매수";
    }

    return {
        price: data.price,
        rsi: rsi.toFixed(2),
        signal: finalAction,
        rsiState: rsiSignal
    };
}

// ════════════════════════════════════
async function startStreamFetch(userQuestion, cards) {
    const cardNames     = cards.map(c => c.name).join(', ');
    const cardPositions = cards.map((c, i) => `${['과거','현재','미래'][i]}: ${c.name}`).join(', ');
    const sessionToken  = localStorage.getItem('oracleSessionToken') || '';

    const controller = new AbortController();
    setTimeout(() => controller.abort(), 30000);

    return fetch('https://tarot-api.omegafund01.workers.dev', {
        method: 'POST',
        headers: {
            'Content-Type':    'application/json',
            'x-session-token': sessionToken
        },
        body: JSON.stringify({
            prompt:        userQuestion,
            cardNames:     cardNames,
            cardPositions: cardPositions,
            isReversed:    '없음',
            userName:      (window._oracleUserName || '유저님')
        }),
        signal: controller.signal
    });
}

// ════════════════════════════════════
//  ③ 응답 수신 + 유료/무료 분기 렌더링
// ════════════════════════════════════
async function renderStream(fetchPromise, cards) {
    const loadingEl    = document.getElementById('ai-loading-text');
    const contentEl    = document.getElementById('oracle-content');
    const progressWrap = document.getElementById('oracle-progress-wrap');
    const progressBar  = document.getElementById('oracle-progress-bar');

    loadingEl.style.display    = 'block';
    progressWrap.style.display = 'block';
    contentEl.innerHTML        = '';

    const loadingMessages = [
        '✨ 천상의 기운을 감지 중...',
        '🔮 운명의 카드를 해독 중...',
        '⚡ 2026년 데이터와 교신 중...',
        '🌌 신탁의 언어로 번역 중...',
        '📜 오라클이 응답을 준비 중...',
        '✦ 거의 완성되었습니다...'
    ];

    let msgIdx = 0, progressVal = 5;
    loadingEl.textContent = loadingMessages[0];
    progressBar.style.width = '5%';

    const loadingTimer = setInterval(() => {
        msgIdx = Math.min(msgIdx + 1, loadingMessages.length - 1);
        loadingEl.textContent = loadingMessages[msgIdx];
        progressVal = Math.min(progressVal + 14, 90);
        progressBar.style.width = progressVal + '%';
    }, 2800);

    try {
        const response = await fetchPromise;
        clearInterval(loadingTimer);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const reader  = response.body.getReader();
        const decoder = new TextDecoder();

        loadingEl.style.display    = 'none';
        progressWrap.style.display = 'none';
        progressBar.style.width    = '100%';

        const cursor = document.createElement('span');
        cursor.className = 'streaming-cursor';
        contentEl.appendChild(cursor);

        let buffer   = '';
        let fullText = '';

        // ── SSE 스트리밍 수신 — 전체 텍스트 누적
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const jsonStr = line.slice(6).trim();
                if (jsonStr === '[DONE]') continue;
                try {
                    const parsed = JSON.parse(jsonStr);
                    const chunk  = parsed?.candidates?.[0]?.content?.parts?.[0]?.text || '';
                    if (!chunk) continue;
                    fullText += chunk;

                    // 스트리밍 중: 전체 텍스트 실시간 렌더 (미래/신탁 포함)
                    // → 완료 후 유료 분기에서 블러 처리
                    cursor.remove();
                    contentEl.innerHTML = renderText(fullText, cards, undefined, undefined, undefined);
                    contentEl.appendChild(cursor);
                } catch(_) {}
            }
        }

        // ── 스트리밍 완료
        cursor.remove();

        // 🔥 리스크 분석
        const riskScore = analyzeRisk(cards);

        // 🔥 카드 점수 → decision 객체 (trend/action/timing/risk 포함)
        const cardScore    = calculateScore(cards);
        const cardDecision = getDecision(cardScore);

        // 🔥 투자 질문 판별
        const isFinance = /코인|비트코인|주식|투자|매수|매도/.test(fullText);

        // 🔥 리스크 트리거 적용 (인자 2개: text, risk)
        fullText = applyRiskTrigger(fullText, riskScore);

        // 🔥 RSI + 매매 신호
        let tradingSignal = null;
        if (typeof getTradingSignal === "function") {
            try {
                tradingSignal = await getTradingSignal(fullText);
            } catch(e) {
                console.log("trading signal error:", e);
            }
        }

        // 🔥 RSI 신호 문자열 추출
        const rsiSignalLabel = tradingSignal
            ? (tradingSignal.rsi < 30 ? "매수" : tradingSignal.rsi > 70 ? "회피" : "관망")
            : null;

        // 🔥 카드+RSI 병합 판단
        const mergedLabel = rsiSignalLabel
            ? mergeDecision(cardDecision.label, rsiSignalLabel)
            : cardDecision.label;

        // 🔥 기본 텍스트 렌더
        let finalHTML = renderText(fullText, cards, cardDecision, tradingSignal, mergedLabel);

        // 🔥 투자 블록 추가 (투자 질문일 때만)
        if (isFinance) {
            const rsiLine = tradingSignal
                ? `<br>📊 RSI: ${tradingSignal.rsi} (${rsiSignalLabel}) | 최종판단: <strong>${mergedLabel}</strong>`
                : '';
            finalHTML += `
    <div class="invest-block" style="margin-top:20px;padding:15px;border-top:1px solid rgba(255,255,255,0.2);">
        📊 <strong>실전 투자 신탁</strong>${rsiLine}<br><br>
        지금은 감정적 진입보다 흐름 확인이 우선입니다.<br>
        분할 접근과 리스크 관리가 핵심입니다.
    </div>
    `;
        }
        // ── 테스트 모드 프리패스
        const isTestMode = window.location.hostname === 'localhost'
            || window.location.search.includes('admin=true');

        const xPaid  = response.headers.get('X-Paid') === 'true';
        const token  = localStorage.getItem('oracleSessionToken') || '';
        const isPaid = isTestMode || isPaidUser || (xPaid && token.length > 10);

        if (isPaid) {
            // ── 유료/테스트: finalHTML 전체 그대로
            contentEl.innerHTML = finalHTML;
        } else {
            // ── 무료: finalHTML 렌더 후 미래+신탁 블러 처리
            contentEl.innerHTML = finalHTML;

            // 미래 card-block (3번째) 과 final-reading 에 블러 적용
            const cardBlocks = contentEl.querySelectorAll('.card-block');
            const finalReading = contentEl.querySelector('.final-reading');

            // 미래 카드 (index 2) 이후를 잠금
            if (cardBlocks.length >= 3) {
                // 미래 카드부터 끝까지 묶어서 블러 처리
                const lockWrapper = document.createElement('div');
                lockWrapper.className = 'locked-section';

                const blurDiv = document.createElement('div');
                blurDiv.className = 'locked-blur';

                // 미래 카드 블록 이동
                const futureBlock = cardBlocks[2];
                blurDiv.appendChild(futureBlock.cloneNode(true));

                // 신탁 블록 이동
                if (finalReading) {
                    blurDiv.appendChild(finalReading.cloneNode(true));
                    finalReading.remove();
                }
                futureBlock.replaceWith(lockWrapper);

                lockWrapper.appendChild(blurDiv);
                const overlayDiv = document.createElement('div');
                overlayDiv.className = 'unlock-overlay';
                overlayDiv.innerHTML = `
                    <button class="unlock-btn" onclick="showPayModal()">
                        🔓 미래 신탁 전체 보기
                    </button>
                    <div class="unlock-desc">프리미엄 전체 점사를 확인하세요</div>`;
                lockWrapper.appendChild(overlayDiv);
            }
        }

        setTimeout(() => {
            const seal = document.getElementById('oracle-seal');
            if (seal) seal.classList.add('stamped');
        }, 800);

    } catch (error) {
        clearInterval(loadingTimer);
        loadingEl.style.display    = 'none';
        progressWrap.style.display = 'none';
        contentEl.innerHTML = `
            <div style="color:#ff6b6b;padding:20px;border:1px solid #ff6b6b;border-radius:10px;">
                <strong>⚠️ 연결 실패</strong><br><br>
                <pre style="white-space:pre-wrap;font-size:0.8rem;color:#eee;">${error.message}</pre>
            </div>`;
    }
}

// ════════════════════════════════════
// 🔥 투자 판단 엔진 — 전역 함수
// ════════════════════════════════════
function analyzeRisk(cards) {
    let risk = 0;
    cards.forEach(c => {
        if (!c) return;
        const name = c.name || "";
        if (name.includes("Devil")) risk += 3;
        if (name.includes("Tower")) risk += 4;
        if (name.includes("Death")) risk += 2;
        if (name.includes("Ten of Swords")) risk += 3;
    });
    return risk;
}

function getInvestmentDecision(risk) {
    if (risk >= 6) return "회피";
    if (risk >= 3) return "관망";
    return "매수 가능";
}

function applyRiskTrigger(text, risk) {
    if (risk >= 6) {
        return text + `\n\n⚠️ 현재 흐름은 강한 붕괴 또는 손실 가능성이 감지됩니다.\n감정적 진입은 매우 위험합니다. 반드시 관망하십시오.\n`;
    }
    if (risk >= 3) {
        return text + `\n\n⚠️ 변동성이 높은 구간입니다.\n확신 없는 진입은 손실로 이어질 수 있습니다.\n`;
    }
    return text;
}

function getNumerologyScore() {
    const now = new Date();
    let num = (now.getDate() + now.getHours());
    while (num > 9) {
        num = num.toString().split("").reduce((a,b)=>a+parseInt(b),0);
    }
    return num;
}

// ════════════════════════════════════
// 🔥 카드 점수 계산 → decision 객체 반환
// ════════════════════════════════════
function calculateScore(cards) {
    let score = 0;
    cards.forEach(c => {
        if (!c) return;
        const name = c.name || "";
        if (name.includes("Sun") || name.includes("태양")) score += 3;
        if (name.includes("Ace of Pentacles") || name.includes("펜타클 에이스")) score += 2;
        if (name.includes("Nine of Cups") || name.includes("컵9")) score += 2;
        if (name.includes("Star") || name.includes("별")) score += 1;
        if (name.includes("Wheel of Fortune")) score += 1;
        if (name.includes("Devil") || name.includes("악마")) score -= 3;
        if (name.includes("Tower") || name.includes("탑")) score -= 4;
        if (name.includes("Ten of Swords")) score -= 3;
        if (name.includes("Death") || name.includes("죽음")) score -= 2;
        if (name.includes("Moon") || name.includes("달")) score -= 1;
    });
    return score;
}

function getDecision(score) {
    const num = getNumerologyScore();
    if (score >= 4) {
        const trend   = "상승 흐름 우세 — 긍정 에너지 감지";
        const action  = num === 7 || num === 9 ? "분할 매수 (⚠️ 타이밍 지연 — 신중)" : "분할 매수 진입 고려";
        const timing  = "현재~단기 진입 적기";
        const risk    = "낮음 — 단, 감정적 추격매수 금지";
        return { label: "매수", trend, action, timing, risk };
    } else if (score >= 1) {
        const trend   = "방향성 불명확 — 관망 구간";
        const action  = num === 1 || num === 3 ? "소량 분할 진입 (🔥 수비학 기회 신호)" : "현금 보유 유지";
        const timing  = "돌파 확인 후 진입";
        const risk    = "중간 — 변동성 주의";
        return { label: "관망", trend, action, timing, risk };
    } else {
        const trend   = "하락 에너지 감지 — 리스크 구간";
        const action  = "진입 금지 / 보유 시 손절 기준 재검토";
        const timing  = "시장 안정 확인 전까지 대기";
        const risk    = "높음 — 붕괴 가능성 주의";
        return { label: "회피", trend, action, timing, risk };
    }
}

// ════════════════════════════════════
// 🔥 카드판단 + RSI신호 병합
// ════════════════════════════════════
function mergeDecision(cardDecision, rsiSignal) {
    if (cardDecision === "회피") {
        return "회피"; // 🔥 카드가 무조건 우선
    }
    if (cardDecision === "관망") {
        if (rsiSignal === "매수") return "관망 (신중)";
        return "관망";
    }
    if (cardDecision === "매수") {
        if (rsiSignal === "관망") return "분할 매수";
        return "매수";
    }
    return cardDecision;
}

// ════════════════════════════════════
//  텍스트 → HTML 변환
//  [과거]/[현재]/[미래]/[제우스의 신탁] 섹션 분리 렌더
//  또는 워커 HTML 태그 직접 렌더 (두 방식 모두 지원)
// ════════════════════════════════════
function renderText(text, cards, cardDecision, tradingSignal, mergedLabel) {

    // ══════════════════════════════════════════
    // 전처리: 신탁 시작점을 [[ZEUS]]로 정규화
    // Gemini가 어떤 형태로 보내도 전부 잡음
    // ══════════════════════════════════════════
    let t0 = text
        .replace(/👁/g, '')
        .replace(/\[합산 과정:[^\]]*\]/g, '')
        .replace(/✦\s*카드\s*흐름\s*종합\s*독해\s*✦[^]*?(?=👁|제우스|ZENITH|\[\[|$)/g, '');

    // 신탁 헤더 정규화 — 가장 넓은 패턴부터 좁은 순서로
    // 패턴1: 제우스 운명의 신탁ZEUS DESTINY ORACLE (붙어있음)
    t0 = t0.replace(/제우스\s*운명의?\s*신탁\s*ZEUS\s*DESTINY\s*ORACLE/g, '[[ZENITH]]');
    // 패턴2: 👁\n제우스 운명의 신탁\nZEUS (여러줄)
    t0 = t0.replace(/👁\s*[\n\r]*\s*제우스\s*운명의?\s*[\n\r]*\s*신탁\s*[\n\r]*\s*(?:ZEUS\s*DESTINY\s*ORACLE)?/g, '[[ZENITH]]');
    // 패턴3: 제우스 운명의 신탁 (단독, 줄바꿈 포함)
    t0 = t0.replace(/제우스\s*운명의?\s*신탁/g, '[[ZENITH]]');
    // 패턴4: 남은 👁 단독 (신탁 마커로 처리)
    t0 = t0.replace(/👁\s*[\n\r]*/g, '[[ZENITH]]');
    // 패턴5: ZEUS DESTINY ORACLE 단독 잔재 제거
    t0 = t0.replace(/ZEUS\s*DESTINY\s*ORACLE/g, '');
    // [[ZEUS]] 중복 제거
    t0 = t0.replace(/\[\[ZENITH\]\]\s*\[\[ZENITH\]\]/g, '[[ZENITH]]');
    t0 = t0.replace(/(\[\[ZENITH\]\][^]*?)\[\[ZENITH\]\]/g, '$1');
    // 수호에너지 이후 제거
    t0 = t0.replace(/🌙[^]*/g, '');
    // 빈줄 압축
    t0 = t0.replace(/\n{3,}/g, '\n\n');

    const formatChunk = t => (t || '').trim()
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/^#{1,3}\s(.+)/gm, '<h3>$1</h3>')
        .replace(/\n{2,}/g, '\n')
        .replace(/\n/g, '<br>');

    const labels = ['과거','현재','미래'];

    // ── 신탁 분리
    const zIdx = t0.indexOf('[[ZENITH]]');
    let mainText   = zIdx > -1 ? t0.substring(0, zIdx).trim() : t0.trim();
    let oracleText = zIdx > -1 ? t0.substring(zIdx + 10).trim() : '';

    // ── 카드 섹션 분리
    let introPart = '';
    let cardTexts = ['','',''];

    const secRe = /(?:^|\n)[ \t]*(과거|현재|미래)[ \t]*(?:\n|$)/g;
    const allM  = [...mainText.matchAll(secRe)];
    const mP = allM.find(m => m[1]==='과거');
    const mC = allM.find(m => m[1]==='현재');
    const mF = allM.find(m => m[1]==='미래');

    if (mP && mC && mF) {
        const getAfter = m => {
            const nl = mainText.indexOf('\n', m.index + m[0].length - 1);
            return nl > -1 ? nl + 1 : m.index + m[0].length;
        };
        introPart    = mainText.substring(0, mP.index).trim();
        cardTexts[0] = mainText.substring(getAfter(mP), mC.index).trim();
        cardTexts[1] = mainText.substring(getAfter(mC), mF.index).trim();
        cardTexts[2] = mainText.substring(getAfter(mF)).trim();
    } else if (cards && cards.length === 3) {
        const pos2 = cards.map(c => mainText.indexOf(c.name.split(' (')[0]));
        if (pos2[0]>-1 && pos2[1]>-1 && pos2[2]>-1) {
            introPart    = mainText.substring(0, pos2[0]).trim();
            cardTexts[0] = mainText.substring(pos2[0], pos2[1]).replace(/^[^\n]*\n/,'').trim();
            cardTexts[1] = mainText.substring(pos2[1], pos2[2]).replace(/^[^\n]*\n/,'').trim();
            cardTexts[2] = mainText.substring(pos2[2]).replace(/^[^\n]*\n/,'').trim();
        } else {
            introPart = mainText.trim();
        }
    } else {
        introPart = mainText.trim();
    }

    // 카드명 + 중복 레이블 제거
    cardTexts = cardTexts.map((t, i) => {
        let r = t.replace(/^[ \t]*(과거|현재|미래)[ \t]*\n?/,'').trim();
        if (cards && cards[i]) {
            const n = cards[i].name.split(' (')[0];
            r = r.replace(new RegExp('^'+n.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'[^\n]*\n?','i'),'').trim();
        }
        return r;
    });

    // ── 카드 렌더
    const cardSections = (cards || []).map((card, i) => `
        <div class="card-block">
            <h2>${labels[i]}</h2>
            <img src="${BASE_URL}${card.file}" class="mini-card-float"
                 onclick="expandCard(this)"
                 onerror="this.style.display='none'">
            <div class="card-text-wrap">
                <span class="card-name-inline">${card.name}</span>
                <div class="card-text">${formatChunk(cardTexts[i])}</div>
            </div>
        </div>`).join('');

    const introHtml = introPart
        ? `<div style="margin-bottom:8px;color:rgba(255,255,255,0.85);line-height:1.75;font-size:0.9rem;">${formatChunk(introPart)}</div>`
        : '';

    // ── 신탁 본문에서 추세/행동/타이밍/리스크 카테고리 파싱 후 포매팅
    function buildOracleCategories(raw) {
        // 이미 이모지 카테고리가 있으면 그대로 포맷
        const hasEmoji = /📈|🧭|⚡|🛡️/.test(raw);
        if (hasEmoji) return formatChunk(raw);

        // 카테고리 키워드로 섹션 추출 시도
        const catDefs = [
            { keys: ['추세','trend'], icon: '📈', label: '추세' },
            { keys: ['행동','action'], icon: '🧭', label: '행동' },
            { keys: ['타이밍','timing'], icon: '⚡', label: '타이밍' },
            { keys: ['리스크','risk'], icon: '🛡️', label: '리스크' }
        ];
        const lines = raw.split('\n');
        let structured = '';
        let currentCat = null;
        let currentLines = [];
        let preamble = '';
        let inCat = false;

        for (const line of lines) {
            const trimmed = line.trim();
            const matched = catDefs.find(c =>
                c.keys.some(k => new RegExp('^'+k+'\\s*[:：]', 'i').test(trimmed) ||
                    new RegExp('^\\*\\*'+k, 'i').test(trimmed))
            );
            if (matched) {
                if (currentCat) {
                    structured += `<div class="oracle-cat-row"><span class="oracle-cat-icon">${currentCat.icon}</span><span class="oracle-cat-label">${currentCat.label}</span><span class="oracle-cat-val">${formatChunk(currentLines.join(' ').replace(/^[^:：]+[:：]\s*/,''))}</span></div>`;
                }
                currentCat = matched;
                currentLines = [trimmed];
                inCat = true;
            } else if (inCat && trimmed) {
                currentLines.push(trimmed);
            } else if (!inCat) {
                preamble += line + '\n';
            }
        }
        if (currentCat) {
            structured += `<div class="oracle-cat-row"><span class="oracle-cat-icon">${currentCat.icon}</span><span class="oracle-cat-label">${currentCat.label}</span><span class="oracle-cat-val">${formatChunk(currentLines.join(' ').replace(/^[^:：]+[:：]\s*/,''))}</span></div>`;
        }

        if (structured) {
            return (preamble ? formatChunk(preamble.trim()) + '<br><br>' : '') +
                '<div class="oracle-categories">' + structured + '</div>';
        }
        // 카테고리 없으면 기본 포맷
        return formatChunk(raw);
    }

    // ── 신탁 4개 카테고리 블록 — cardDecision 기반으로 항상 생성
    function buildDecisionCats(dec, signal, merged) {
        if (!dec) return '';
        const finalLabel = merged || dec.label;
        const rsiLine = signal
            ? `<br><small style="color:rgba(255,255,255,0.5);">RSI ${signal.rsi} 반영 → 최종: ${finalLabel}</small>`
            : '';
        return `<div class="oracle-categories">
            <div class="oracle-cat-row"><span class="oracle-cat-icon">📈</span><span class="oracle-cat-label">추세</span><span class="oracle-cat-val">${dec.trend}</span></div>
            <div class="oracle-cat-row"><span class="oracle-cat-icon">🧭</span><span class="oracle-cat-label">행동</span><span class="oracle-cat-val">${dec.action}${rsiLine}</span></div>
            <div class="oracle-cat-row"><span class="oracle-cat-icon">⚡</span><span class="oracle-cat-label">타이밍</span><span class="oracle-cat-val">${dec.timing}</span></div>
            <div class="oracle-cat-row"><span class="oracle-cat-icon">🛡️</span><span class="oracle-cat-label">리스크</span><span class="oracle-cat-val">${dec.risk}</span></div>
        </div>`;
    }

    // ── 신탁 렌더 — 항상 동일한 2줄 타이틀 + 4개 카테고리 항상 출력
    const aiOracleBody = oracleText ? buildOracleCategories(oracleText) : '';
    const decisionCats = buildDecisionCats(cardDecision, tradingSignal, mergedLabel);
    const oracleBody   = aiOracleBody
        ? aiOracleBody + (decisionCats ? '<br>' + decisionCats : '')
        : decisionCats;

    const oracleHtml = `
        <div class="final-reading">
            <div class="final-reading-inner">
                <div class="zenith-title-block">
                    <span class="zenith-title-main">제우스의 최종신탁</span>
                    <span class="zenith-title-sub">ZEUS FINAL ORACLE</span>
                </div>
                <div class="zenith-oracle-text">${oracleBody}</div>
            </div>
        </div>`;

    return introHtml + cardSections + oracleHtml;
}

// 카드 터치 확대 함수
function expandCard(img) {
    const overlay = document.createElement('div');
    overlay.style.cssText = `
        position:fixed;top:0;left:0;width:100%;height:100%;
        background:rgba(0,0,0,0.92);z-index:99999;
        display:flex;align-items:center;justify-content:center;
        cursor:pointer;`;
    const big = document.createElement('img');
    big.src = img.src;
    big.style.cssText = `
        max-width:85vw;max-height:80vh;
        border-radius:12px;
        border:2px solid #D4AF37;
        box-shadow:0 0 30px rgba(212,175,55,0.5);`;
    overlay.appendChild(big);
    overlay.onclick = () => overlay.remove();
    document.body.appendChild(overlay);
}

    if (btn) { btn.disabled = true; btn.textContent = '확인 중...'; }

    try {
        // 워커 /verify-payment 엔드포인트에서 HMAC 서명 토큰 발급
        // 테스트 모드: paymentKey = "TEST-PAY-2900"
        // 실제 운영 시: PG사에서 받은 결제키로 교체
        const res = await fetch('https://tarot-api.omegafund01.workers.dev/verify-payment', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-session-token': localStorage.getItem('oracleSessionToken') || ''
            },
            body: JSON.stringify({ paymentKey: 'TEST-PAY-2900' })
        });
        const data = await res.json();

        if (!data.ok) {
            // 데모 모드: ok가 false여도 테스트 통과 처리
            console.warn('결제 확인 서버 응답 실패(데모 모드 — 계속 진행):', data.error);
        }

        // 서버 서명 토큰 저장 (위조 불가 — 서버만 발급 가능)
        if (data.token) localStorage.setItem('oracleSessionToken', data.token);
        isPaidUser = true; // 결제 완료 플래그

    } catch(e) {
        // 데모 모드: 네트워크 오류여도 결제 완료로 처리
        console.warn('결제 확인 네트워크 오류(데모 모드 — 계속 진행):', e.message);
        isPaidUser = true;
    }

    closePayModal();

    // 결과 재조회
    const question = document.getElementById('seed-input')
        ? document.getElementById('seed-input').value
        : '';

    if (selectedCards && selectedCards.length > 0) {
        const contentEl = document.getElementById('oracle-content');
        if (contentEl) contentEl.innerHTML = '';
        const streamPromise = startStreamFetch(question || '재조회', selectedCards);
        renderStream(streamPromise, selectedCards);
    } else {
        location.reload();
    }
}
</script>
</body>
</html>
