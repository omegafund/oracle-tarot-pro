<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ORACLE TAROT PRO</title>
    <style>
        :root {
            --gold: #D4AF37;
            --bright-gold: #FFF5C3;
            --dark-gold: #8C6212;
            --bg: #000;
            --text: #fff;
            --font: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            overflow-x: hidden;
        }
        #app-container {
            max-width: 500px;
            width: 100%;
            padding: 50px 25px 40px 25px;
            text-align: center;
            position: relative;
            margin: 0 auto;
            border-left: 1px solid rgba(212,175,55,0.15);
            border-right: 1px solid rgba(212,175,55,0.15);
            min-height: 100vh;
        }
        .gold-title {
            color: var(--gold);
            font-size: 2.3rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 0.3em;
            text-shadow: 0 0 15px rgba(212,175,55,0.6);
        }
        .sub-title {
            color: var(--gold);
            font-size: 0.95rem;
            letter-spacing: 0.5em;
            margin-bottom: 20px;
            display: block;
            font-weight: 800;
        }
        .star-icon {
            color: var(--gold);
            font-size: 1.5rem;
            text-shadow: 0 0 10px var(--gold);
            animation: starPulse 2s infinite ease-in-out;
        }
        @keyframes starPulse {
            0%, 100% { opacity: 0.5; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .input-system-wrapper {
            position: relative;
            width: 100%;
            height: 115px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .beveled-border {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(145deg, var(--bright-gold), var(--gold), var(--dark-gold));
            clip-path: polygon(15px 0%, calc(100% - 15px) 0%, 100% 15px, 100% calc(100% - 14px), calc(100% - 15px) 100%, 15px 100%, 0% calc(100% - 14px), 0% 15px);
        }
        .beveled-inner {
            position: absolute;
            width: calc(100% - 6px);
            height: calc(100% - 6px);
            background: linear-gradient(135deg, #2D0054, #120022);
            clip-path: polygon(14px 0%, calc(100% - 14px) 0%, 100% 14px, 100% calc(100% - 14px), calc(100% - 14px) 100%, 14px 100%, 0% calc(100% - 14px), 0% 14px);
        }
        .gold-input {
            position: relative;
            z-index: 10;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1rem;
            width: 88%;
            text-align: center;
            resize: none;
            height: 70px;
            font-weight: bold;
            font-family: var(--font);
        }
        .gold-input::placeholder { color: rgba(212,175,55,0.6); }
        .cards-stage {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin: 30px 0;
            perspective: 1000px;
        }
        .card-slot {
            flex: 1;
            position: relative;
            aspect-ratio: 2/3;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(212,175,55,0.3);
            background: #111;
        }
        .card-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.4s ease;
        }
        .slot-hourglass {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.6rem;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold), 0 0 20px rgba(212,175,55,0.5);
            animation: hgSpin 1.4s infinite ease-in-out;
            line-height: 1;
            font-style: normal;
        }
        @keyframes hgSpin {
            0%   { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
            45%  { transform: translate(-50%, -50%) rotate(180deg); opacity: 0.6; }
            50%  { transform: translate(-50%, -50%) rotate(180deg); opacity: 1; }
            95%  { transform: translate(-50%, -50%) rotate(360deg); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) rotate(360deg); opacity: 1; }
        }
        .card-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.75);
            color: var(--gold);
            font-size: 0.6rem;
            font-weight: bold;
            padding: 4px 2px;
            text-align: center;
            letter-spacing: 0.05em;
        }
        @keyframes cardFlip {
            0%   { transform: rotateY(0deg) scale(1); }
            50%  { transform: rotateY(90deg) scale(1.05); }
            100% { transform: rotateY(0deg) scale(1); }
        }
        .flipping { animation: cardFlip 0.6s ease forwards; }
        @keyframes flyOutSoft {
            0%   { transform: scale(1) rotate(0); opacity: 1; }
            100% { transform: scale(0.5) rotate(15deg) translateY(-500px); opacity: 0; }
        }
        .card-fly { animation: flyOutSoft 0.8s forwards; }
        .button-container {
            position: relative;
            width: 100%;
            margin-top: 15px;
        }
        .gold-button {
            background: linear-gradient(180deg, #FFF5C3 0%, #D4AF37 100%);
            color: #000;
            border: none;
            padding: 18px 0;
            width: 100%;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            font-size: 1.1rem;
            font-family: var(--font);
            transition: transform 0.1s;
        }
        .gold-button:active { transform: scale(0.97); }
        .gold-button:disabled { opacity: 0.7; cursor: not-allowed; }

        /* ✅ 🔮 회전 애니메이션 */
        .gold-button .orb-spin {
            display: inline-block;
            animation: orbPulse 0.8s ease-in-out infinite;
        }
        @keyframes orbPulse {
            0%, 100% { transform: scale(1) rotate(-10deg); }
            50%       { transform: scale(1.3) rotate(10deg); }
        }

        .spiritual-pointer {
            position: absolute;
            bottom: -20px; right: -10px;
            font-size: 2.5rem;
            z-index: 10;
            transform: rotate(150deg);
            animation: handMove 1.1s infinite ease-in-out;
            filter: drop-shadow(0 0 10px var(--gold));
        }
        @keyframes handMove {
            0%, 100% { transform: translateY(0) rotate(150deg); }
            50%       { transform: translateY(-15px) rotate(150deg); }
        }
        .disclaimer-text {
            margin-top: 28px;
            font-size: 0.72rem;
            color: rgba(212,175,55,0.55);
            line-height: 1.6;
            letter-spacing: 0.03em;
            border-top: 1px solid rgba(212,175,55,0.15);
            padding-top: 12px;
        }
        #result-view {
            display: none;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .result-cards {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            width: 100%;
        }
        .result-card-item {
            flex: 1;
            max-width: 100px;
            aspect-ratio: 2/3;
            border: 2.5px solid var(--gold);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }
        .result-card-item img { width:100%; height:100%; object-fit:cover; display:block; }
        .result-card-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8);
            color: var(--gold);
            font-size: 0.55rem;
            font-weight: bold;
            padding: 3px 2px;
            text-align: center;
        }
        .result-position-label {
            color: rgba(212,175,55,0.7);
            font-size: 0.65rem;
            text-align: center;
            margin-top: 4px;
            letter-spacing: 0.1em;
        }
        .zenith-oracle-container {
            border: 4px double var(--gold);
            border-radius: 15px;
            padding: 25px;
            background: rgba(0,0,0,0.85);
            text-align: left;
            line-height: 1.9;
            box-shadow: inset 0 0 25px rgba(212,175,55,0.2);
            width: 100%;
            position: relative;
        }
        .oracle-seal {
            width: 70px; height: 70px;
            margin: 15px auto 0;
            background: url('https://omegafund.github.io/oracle-tarot-pro/images/seal_pattern.png') no-repeat center/contain;
            opacity: 0;
            transition: all 1.5s ease;
            filter: sepia(1) saturate(5) hue-rotate(-10deg);
        }
        .oracle-seal.stamped { opacity: 0.6; transform: scale(1.1); filter: drop-shadow(0 0 8px var(--gold)); }

        /* ✅ 로딩 텍스트 & 진행바 */
        #ai-loading-text {
            color: var(--gold);
            text-align: center;
            padding: 15px 0 8px;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            min-height: 2em;
        }
        #oracle-progress-wrap {
            width: 100%;
            background: rgba(212,175,55,0.15);
            border-radius: 50px;
            height: 6px;
            margin: 0 0 15px;
            overflow: hidden;
            display: none;
        }
        #oracle-progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 50px;
            background: linear-gradient(90deg, #8C6212, #D4AF37, #FFF5C3);
            box-shadow: 0 0 8px rgba(212,175,55,0.7);
            transition: width 0.5s ease;
        }
        #oracle-content { color: #eee; font-size: 0.95rem; }
        #oracle-content b, #oracle-content strong { color: var(--gold); }
        #oracle-content h2, #oracle-content h3 {
            color: var(--gold);
            border-bottom: 1px solid rgba(212,175,55,0.3);
            padding-bottom: 5px;
            margin-top: 20px;
        }
        .reset-btn {
            margin-top: 35px;
            background: none;
            border: 1.5px solid var(--gold);
            color: var(--gold);
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 1rem;
            transition: all 0.2s;
        }
        .reset-btn:hover { background: var(--gold); color: #000; }
        .particle, .gold-dust {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            border-radius: 50%;
        }
        /* 금색 이중선 스타일 정의 */
.gold-divider {
    border: none;
    height: 4px; /* 선의 전체 두께 */
    border-top: 2px solid #D4AF37; /* 위쪽 금색 줄 */
    border-bottom: 2px solid #C5A028; /* 아래쪽 조금 더 짙은 금색 줄 */
    margin: 25px 0; /* 위아래 여유 공간 */
    box-shadow: 0 1px 2px rgba(0,0,0,0.2); /* 약간의 입체감 */
}
    </style>
</head>
<body>
<div id="app-container">

    <div id="home-view">
        <div class="title-wrapper" style="display: flex; align-items: center; justify-content: center; gap: 15px;">
            <span class="star-icon">✦</span>
            <h1 class="gold-title" style="margin: 0;">ORACLE TAROT</h1>
            <span class="star-icon">✦</span>
        </div>
        <span class="sub-title">PRO - MASTERPIECE</span>

        <div class="input-system-wrapper">
            <div class="beveled-border"></div>
            <div class="beveled-inner"></div>
            <textarea id="seed-input" class="gold-input" placeholder="마음의 질문을 깊게 새기소서"></textarea>
        </div>

        <div class="cards-stage">
            <div class="card-slot" id="slot-0">
                <img id="card-img-0" src="" alt="카드">
                <div class="card-label">과 거</div>
            </div>
            <div class="card-slot" id="slot-1">
                <img id="card-img-1" src="" alt="카드">
                <div class="card-label">현 재</div>
            </div>
            <div class="card-slot" id="slot-2">
                <img id="card-img-2" src="" alt="카드">
                <div class="card-label">미 래</div>
            </div>
        </div>

        <div class="button-container">
            <button class="gold-button" id="ritual-btn" onclick="startRitual()">운명의 3대 신탁 확인</button>
            <div class="spiritual-pointer">👇</div>
        </div>

        <div class="disclaimer-text">
            ✦ 본 서비스는 영성적 매칭 알고리즘과 AI 기반의 타로 해석을 제공합니다 ✦<br>
            참고용 콘텐츠이며, 실제 투자·법률·의료 판단의 근거로 사용하지 마십시오.
        </div>
    </div>

    <div id="result-view">
        <div class="title-wrapper" style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 5px;">
            <span class="star-icon">✧</span>
            <h1 class="gold-title" style="font-size:1.8rem; margin:0;">제니스 운명의 신탁</h1>
            <span class="star-icon">✧</span>
        </div>
        <span class="sub-title" style="font-size:0.8rem;">ZENITH DESTINY ORACLE</span>

        <div class="result-cards" id="result-cards-container"></div>

        <div class="zenith-oracle-container">
            <div id="ai-loading-text"></div>
            <div id="oracle-progress-wrap">
                <div id="oracle-progress-bar"></div>
            </div>
            <div id="oracle-content"></div>
            <div id="oracle-seal" class="oracle-seal"></div>
        </div>

        <button class="reset-btn" onclick="location.reload()">✦ 처음으로 돌아가기 ✦</button>
    </div>

</div>
<script>
// ════════════════════════════════════
//  카드 데이터 m00 ~ m77 (78장)
// ════════════════════════════════════
const CARD_NAMES = [
    'The Fool (바보)','The Magician (마법사)','The High Priestess (여교황)',
    'The Empress (여황제)','The Emperor (황제)','The Hierophant (교황)',
    'The Lovers (연인)','The Chariot (전차)','Strength (힘)',
    'The Hermit (은둔자)','Wheel of Fortune (운명의 수레바퀴)','Justice (정의)',
    'The Hanged Man (매달린 사람)','Death (죽음)','Temperance (절제)',
    'The Devil (악마)','The Tower (탑)','The Star (별)',
    'The Moon (달)','The Sun (태양)','Judgement (심판)','The World (세계)',
    'Ace of Wands','Two of Wands','Three of Wands','Four of Wands',
    'Five of Wands','Six of Wands','Seven of Wands','Eight of Wands',
    'Nine of Wands','Ten of Wands','Page of Wands','Knight of Wands',
    'Queen of Wands','King of Wands',
    'Ace of Cups','Two of Cups','Three of Cups','Four of Cups',
    'Five of Cups','Six of Cups','Seven of Cups','Eight of Cups',
    'Nine of Cups','Ten of Cups','Page of Cups','Knight of Cups',
    'Queen of Cups','King of Cups',
    'Ace of Swords','Two of Swords','Three of Swords','Four of Swords',
    'Five of Swords','Six of Swords','Seven of Swords','Eight of Swords',
    'Nine of Swords','Ten of Swords','Page of Swords','Knight of Swords',
    'Queen of Swords','King of Swords',
    'Ace of Pentacles','Two of Pentacles','Three of Pentacles','Four of Pentacles',
    'Five of Pentacles','Six of Pentacles','Seven of Pentacles','Eight of Pentacles',
    'Nine of Pentacles','Ten of Pentacles','Page of Pentacles','Knight of Pentacles',
    'Queen of Pentacles','King of Pentacles'
];

const CARDS = Array.from({length: 78}, (_, i) => ({
    id: i,
    name: CARD_NAMES[i] || `Card ${i}`,
    file: `m${String(i).padStart(2,'0')}.jpg`
}));

const BASE_URL = 'https://omegafund.github.io/oracle-tarot-pro/images/cards/';
let selectedCards = [];

// ════════════════════════════════════
//  홈 카드 1초마다 랜덤 교체
// ════════════════════════════════════
function updateSlot(idx) {
    const img = document.getElementById(`card-img-${idx}`);
    const slot = document.getElementById(`slot-${idx}`);
    if (!img) return;
    img.style.opacity = '0';
    setTimeout(() => {
        const card = CARDS[Math.floor(Math.random() * CARDS.length)];
        img.src = `${BASE_URL}${card.file}`;
        img.onerror = () => {
            img.style.display = 'none';
            const old = slot.querySelector('.slot-hourglass');
            if (old) old.remove();
            const hg = document.createElement('div');
            hg.className = 'slot-hourglass';
            hg.textContent = '⧗';
            slot.appendChild(hg);
        };
        img.onload = () => {
            const old = slot.querySelector('.slot-hourglass');
            if (old) old.remove();
            img.style.display = 'block';
            img.style.opacity = '1';
        };
    }, 300);
}

updateSlot(0); updateSlot(1); updateSlot(2);

let homeSlotIdx = 0;
const homeInterval = setInterval(() => {
    if (document.getElementById('home-view').style.display === 'none') return;
    updateSlot(homeSlotIdx % 3);
    homeSlotIdx++;
}, 1000);

// ════════════════════════════════════
//  손가락 금가루 (조밀)
// ════════════════════════════════════
function createGoldDust(x, y) {
    for (let k = 0; k < 5; k++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 3 + 2;
        const angle = Math.random() * 360;
        const r = Math.random() * 25;
        p.style.cssText = `left:${x+Math.cos(angle)*r}px;top:${y+Math.sin(angle)*r}px;
            width:${size}px;height:${size}px;
            background:radial-gradient(circle,#fffbe6,#D4AF37);
            box-shadow:0 0 ${size+2}px 1px rgba(255,245,195,0.95);
            transition:all ${0.9+Math.random()*0.6}s ease-out;opacity:1;`;
        document.body.appendChild(p);
        requestAnimationFrame(() => {
            p.style.transform = `translate(${(Math.random()-.5)*30}px,${30+Math.random()*30}px)`;
            p.style.opacity = '0';
        });
        setTimeout(() => p.remove(), 1600);
    }
}
setInterval(() => {
    const ptr = document.querySelector('.spiritual-pointer');
    if (ptr && document.getElementById('home-view').style.display !== 'none') {
        const r = ptr.getBoundingClientRect();
        createGoldDust(r.left + r.width/2, r.top + r.height/2);
    }
}, 150);

// ════════════════════════════════════
//  카드 사라질 때 금가루 폭발
// ════════════════════════════════════
function spawnGoldExplosion(slotEl) {
    const r = slotEl.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    for (let i = 0; i < 60; i++) {
        const p = document.createElement('div');
        p.className = 'gold-dust';
        const size = Math.random()*4+2;
        const angle = Math.random()*360;
        const dist = 40+Math.random()*120;
        const dx = Math.cos(angle*Math.PI/180)*dist;
        const dy = Math.sin(angle*Math.PI/180)*dist;
        const dur = 600+Math.random()*600;
        const del = Math.random()*200;
        p.style.cssText = `left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;
            background:radial-gradient(circle,#fff9e6,#FFD700);
            box-shadow:0 0 ${size+3}px 2px rgba(255,240,120,1);
            transition:transform ${dur}ms ease-out ${del}ms,opacity ${dur}ms ease-out ${del}ms;opacity:1;`;
        document.body.appendChild(p);
        requestAnimationFrame(() => requestAnimationFrame(() => {
            p.style.transform = `translate(${dx}px,${dy}px) scale(0.2)`;
            p.style.opacity = '0';
        }));
        setTimeout(() => p.remove(), dur+del+100);
    }
}

// ════════════════════════════════════
//  영성적 싱크로니시티 카드 선택
// ════════════════════════════════════
function pickThreeCards(question) {
    const now = Date.now();
    let hash = now;
    for (let i = 0; i < question.length; i++) {
        hash = ((hash << 5) - hash) + question.charCodeAt(i);
        hash |= 0;
    }
    let s = Math.abs(hash);
    const rand = () => {
        s = (s * 1664525 + 1013904223) & 0xffffffff;
        return (s >>> 0) / 0xffffffff;
    };
    return [...CARDS].sort(() => rand() - 0.5).slice(0, 3);
}

// ════════════════════════════════════
//  메인 리추얼
// ════════════════════════════════════
async function startRitual() {
    const question = document.getElementById('seed-input').value.trim();
    if (!question) { alert('질문을 입력해주세요.'); return; }

    // ✅ 버튼에 🔮 진동 애니메이션
    const btn = document.getElementById('ritual-btn');
    btn.disabled = true;
    btn.innerHTML = '신탁을 소환하는 중 <span class="orb-spin">🔮</span>';

    clearInterval(homeInterval);
    selectedCards = pickThreeCards(question);

    for (let i = 0; i < 3; i++) {
        await flipCard(i, selectedCards[i]);
        await delay(300);
    }
    await delay(800);

    for (let i = 0; i < 3; i++) {
        const slot = document.getElementById(`slot-${i}`);
        const img = document.getElementById(`card-img-${i}`);
        if (slot) spawnGoldExplosion(slot);
        if (img) img.classList.add('card-fly');
        await delay(200);
    }
    await delay(700);
    showResultView(question);
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function flipCard(index, card) {
    return new Promise(resolve => {
        const img = document.getElementById(`card-img-${index}`);
        const slot = document.getElementById(`slot-${index}`);
        img.classList.add('flipping');
        setTimeout(() => {
            img.src = `${BASE_URL}${card.file}`;
            img.onerror = () => {
                img.style.display = 'none';
                const old = slot.querySelector('.slot-hourglass');
                if (old) old.remove();
                const hg = document.createElement('div');
                hg.className = 'slot-hourglass';
                hg.textContent = '⧗';
                slot.appendChild(hg);
            };
            img.classList.remove('flipping');
            resolve();
        }, 300);
    });
}

// ════════════════════════════════════
//  실시간 타이핑 및 자동 스크롤
// ════════════════════════════════════
async function typeWriter(text, element) {
    element.innerHTML = "";
    const formattedText = text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/^#{1,3}\s(.+)/gm, '<h3>$1</h3>')
        .replace(/\n/g, '<br>');

    let i = 0;
    return new Promise(resolve => {
        const typing = setInterval(() => {
            if (i < formattedText.length) {
                if (formattedText[i] === '<') {
                    let tagEnd = formattedText.indexOf('>', i);
                    element.innerHTML += formattedText.substring(i, tagEnd + 1);
                    i = tagEnd + 1;
                } else {
                    element.innerHTML += formattedText[i];
                    i++;
                }
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } else {
                clearInterval(typing);
                document.getElementById('oracle-seal').classList.add('stamped');
                resolve();
            }
        }, 40);
    });
}

// ════════════════════════════════════
// 🃏 AI 신탁 (Cloudflare Worker 경유)
// ════════════════════════════════════
async function fetchOracleInterpretation(userQuestion, cards) {
    const loadingEl = document.getElementById('ai-loading-text');
    const contentEl = document.getElementById('oracle-content');
    const ritualBtn = document.getElementById('ritual-btn');
    const progressWrap = document.getElementById('oracle-progress-wrap');
    const progressBar = document.getElementById('oracle-progress-bar');

    // ✅ 변수 선언 (핵심 버그 수정)
    const cardNames = cards.map(c => c.name).join(', ');
    const cardDesc = cards.map((c, i) => `${['과거','현재','미래'][i]}: ${c.name}`).join(', ');

    const promptMessage = `
[ROLE: 2026 ZENITH MULTI-ORACLE]
너는 2026년의 모든 흐름(주식, 부동산, 연애, 운세)을 통제하는 타로카드 해석전문가 오라클이다. 
사용자의 질문("${userQuestion}")을 분석하여 아래 4가지 중 하나의 모드로 자동 전환하라.

1. [INVEST 모드 (주식/재테크)]:
   - 2026년 반도체, AI, 금리 데이터를 기반으로 차트와 수급 위주 분석.
2. [REAL ESTATE 모드 (부동산/이사)]:
   - 2026년 수도권 공급 물량, GTX 노선 개통 상황, 정책 변화를 반영한 실전 조언.
3. [ROMANCE 모드 (연애/재회)]:
   - 상대의 심리, 관계의 에너지 흐름, 2026년 특유의 인연법(명리학적 관점) 결합.
4. [GENERAL 모드 (일상/운세)]:
   - 오늘의 기운, 주의해야 할 액운, 행운의 방향과 색상, 행운의 숫자 제시.

[COMMON RULES - 절대 준수 지침]
1. 답변 형식: 반드시 [과거], [현재], [미래], [제니스 운명 신탁]의 4단계 섹션을 엄수하되 3문장 이내로 작성하라.
2. 데이터 결합: 선택된 카드("${cardNames}")의 추상적 풀이는 배제하고, 2026년의 실물 경제(반도체/부동산 공급/금리) 및 실전 심리 데이터를 1%의 오차 없이 결합하여 분석하라.
3. 페르소나: 해당 분야(투자/부동산/명리)의 세계관 최강자이자 최고 권위자로서 반드시 정중한 경어를 사용하십시오. 세련된 일류 전문 용어를 사용하라.
4. 금지 사항: "카드가 흐름을 보여줍니다" 같은 뻔한 초보적 표현은 절대 금지한다.

[USER INPUT & EXECUTION]
- 사용자의 질문: "${userQuestion}"
- 운명의 카드: ${cardDesc}

위 정보를 바탕으로 2026년의 실전 데이터를 녹여낸 통찰을 제공하라.
반드시 한글로 작성하고, 질문의 본질을 꿰뚫는 결정적 해답을 제시하되 경어를 반드시 사용하라.
`;

    // ✅ 로딩 시작
    loadingEl.style.display = 'block';
    progressWrap.style.display = 'block';
    contentEl.innerHTML = '';

    // ✅ 단계별 메시지 + 진행바
    const loadingMessages = [
        '✨ 천상의 기운을 감지 중...',
        '🔮 운명의 카드를 해독 중...',
        '⚡ 2026년 데이터와 교신 중...',
        '🌌 신탁의 언어로 번역 중...',
        '📜 오라클이 응답을 준비 중...',
        '✦ 거의 완성되었습니다...'
    ];

    let msgIdx = 0;
    let progressVal = 5;
    loadingEl.textContent = loadingMessages[0];
    progressBar.style.width = '5%';

    const loadingTimer = setInterval(() => {
        msgIdx = Math.min(msgIdx + 1, loadingMessages.length - 1);
        loadingEl.textContent = loadingMessages[msgIdx];
        progressVal = Math.min(progressVal + 14, 90);
        progressBar.style.width = progressVal + '%';
    }, 2800);

    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 25000);

        const response = await fetch('https://tarot-api.omegafund01.workers.dev', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: promptMessage }),
            signal: controller.signal
        });

        clearTimeout(timeout);
        clearInterval(loadingTimer);
        progressBar.style.width = '100%';
        await delay(400);

        const rawText = await response.text();
        console.log('=== Worker 원문 응답 ===');
        console.log(rawText);

        let data;
        try {
            data = JSON.parse(rawText);
        } catch(e) {
            throw new Error('JSON 파싱 실패: ' + rawText.substring(0, 200));
        }

        if (data.error) {
            throw new Error('에러: ' + data.error + '\nGoogle 원문: ' + (data.googleRawError || data.message || ''));
        }

        const aiText = data?.text?.trim();
        if (!aiText) {
            throw new Error('빈 응답. 전체 데이터: ' + JSON.stringify(data));
        }

        loadingEl.style.display = 'none';
        progressWrap.style.display = 'none';
        // 타이핑 효과 대신 즉시 디자인이 적용된 결과물을 뿌려줍니다.
contentEl.innerHTML = aiText.replace(/\n/g, '<br>'); 
loadingEl.style.display = 'none'; // 혹시라도 안 꺼졌을 로딩창을 끕니다.

    } catch (error) {
        clearInterval(loadingTimer);
        console.error('Oracle 에러:', error);
        loadingEl.style.display = 'none';
        progressWrap.style.display = 'none';
        if (ritualBtn) {
            ritualBtn.disabled = false;
            ritualBtn.innerHTML = '다시 시도하기';
        }
        contentEl.innerHTML = `
            <div style="color:#ff6b6b; padding:20px; border:1px solid #ff6b6b; border-radius:10px;">
                <strong>⚠️ 연결 실패 — 상세 원인</strong><br><br>
                <pre style="white-space:pre-wrap; font-size:0.8rem; color:#eee;">${error.message}</pre>
            </div>
        `;
    }
}
</script>
