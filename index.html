<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZEUS ORACLE TAROT</title>
    <style>
        :root {
            --gold: #D4AF37;
            --bright-gold: #FFF5C3;
            --dark-gold: #8C6212;
            --bg: #000;
            --text: #fff;
            --font: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            overflow-x: hidden;
        }
        #app-container {
            max-width: 500px;
            width: 100%;
            padding: 50px 25px 40px 25px;
            text-align: center;
            position: relative;
            margin: 0 auto;
            border-left: 1px solid rgba(212,175,55,0.15);
            border-right: 1px solid rgba(212,175,55,0.15);
            min-height: 100vh;
        }

        /* ════════════════════════════════════
           ✦ 아치형 별 타이틀 영역
        ════════════════════════════════════ */
        .arch-title-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 4px;
            padding-top: 10px;
        }
        .arch-svg-wrapper {
            position: relative;
            width: 320px;
            height: 130px;
            margin: 0 auto;
        }
        .arch-svg-wrapper svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: visible;
        }
        .gold-title {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            text-align: center;
            z-index: 2;
            color: var(--gold);
            font-size: 2.3rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 0.3em;
            text-shadow: 0 0 15px rgba(212,175,55,0.6), 0 0 30px rgba(212,175,55,0.3);
            line-height: 1;
        }
        .sub-title {
            color: var(--gold);
            font-size: 0.95rem;
            letter-spacing: 0.5em;
            margin-top: 6px;
            margin-bottom: 20px;
            display: block;
            font-weight: 800;
        }

        /* ════════════════════════════════════
           ✦ 아치 별 깜빡임 애니메이션
        ════════════════════════════════════ */
        @keyframes archStarTwinkle1 {
            0%,100%{opacity:0.2;}
            50%{opacity:1;filter:drop-shadow(0 0 8px #FFF5C3) drop-shadow(0 0 16px #D4AF37);}
        }
        @keyframes archStarTwinkle2 {
            0%,100%{opacity:0.5;}
            40%{opacity:1;filter:drop-shadow(0 0 10px #FFF5C3);}
        }
        @keyframes archStarTwinkle3 {
            0%,100%{opacity:0.15;}
            60%{opacity:0.9;filter:drop-shadow(0 0 6px #D4AF37);}
        }
        @keyframes archStarTwinkle4 {
            0%,100%{opacity:0.7;}
            30%{opacity:0.2;}
            70%{opacity:1;filter:drop-shadow(0 0 12px #FFF5C3);}
        }
        @keyframes archStarTwinkle5 {
            0%,100%{opacity:0.3;}
            55%{opacity:1;filter:drop-shadow(0 0 10px #D4AF37);}
        }

        .star-icon {
            color: var(--gold);
            font-size: 1.5rem;
            text-shadow: 0 0 10px var(--gold);
            animation: starPulse 2s infinite ease-in-out;
        }
        @keyframes starPulse {
            0%, 100% { opacity: 0.5; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .input-system-wrapper {
            position: relative;
            width: 100%;
            height: 115px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .beveled-border {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(145deg, var(--bright-gold), var(--gold), var(--dark-gold));
            clip-path: polygon(15px 0%, calc(100% - 15px) 0%, 100% 15px, 100% calc(100% - 14px), calc(100% - 15px) 100%, 15px 100%, 0% calc(100% - 14px), 0% 15px);
        }
        .beveled-inner {
            position: absolute;
            width: calc(100% - 6px);
            height: calc(100% - 6px);
            background: linear-gradient(135deg, #2D0054, #120022);
            clip-path: polygon(14px 0%, calc(100% - 14px) 0%, 100% 14px, 100% calc(100% - 14px), calc(100% - 14px) 100%, 14px 100%, 0% calc(100% - 14px), 0% 14px);
        }
        .gold-input {
            position: relative;
            z-index: 10;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1rem;
            width: 88%;
            text-align: center;
            resize: none;
            height: 70px;
            font-weight: bold;
            font-family: var(--font);
        }
        .gold-input::placeholder { color: rgba(212,175,55,0.6); }
        .cards-stage {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin: 30px 0;
            perspective: 1000px;
        }
        .card-slot {
            flex: 1;
            position: relative;
            aspect-ratio: 2/3;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(212,175,55,0.3);
            background: #111;
        }
        .card-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.4s ease;
        }
        .slot-hourglass {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.6rem;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold), 0 0 20px rgba(212,175,55,0.5);
            animation: hgSpin 1.4s infinite ease-in-out;
            line-height: 1;
            font-style: normal;
        }
        @keyframes hgSpin {
            0%   { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
            45%  { transform: translate(-50%, -50%) rotate(180deg); opacity: 0.6; }
            50%  { transform: translate(-50%, -50%) rotate(180deg); opacity: 1; }
            95%  { transform: translate(-50%, -50%) rotate(360deg); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) rotate(360deg); opacity: 1; }
        }
        .card-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.75);
            color: var(--gold);
            font-size: 0.6rem;
            font-weight: bold;
            padding: 4px 2px;
            text-align: center;
            letter-spacing: 0.05em;
        }
        @keyframes cardFlip {
            0%   { transform: rotateY(0deg) scale(1); }
            50%  { transform: rotateY(90deg) scale(1.05); }
            100% { transform: rotateY(0deg) scale(1); }
        }
        .flipping { animation: cardFlip 0.6s ease forwards; }
        @keyframes flyOutSoft {
            0%   { transform: scale(1) rotate(0); opacity: 1; }
            100% { transform: scale(0.5) rotate(15deg) translateY(-500px); opacity: 0; }
        }
        .card-fly { animation: flyOutSoft 0.8s forwards; }
        .button-container {
            position: relative;
            width: 100%;
            margin-top: 15px;
        }
        .gold-button {
            background: linear-gradient(180deg, #FFF5C3 0%, #D4AF37 100%);
            color: #000;
            border: none;
            padding: 18px 0;
            width: 100%;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            font-size: 1.1rem;
            font-family: var(--font);
            transition: transform 0.1s;
        }
        .gold-button:active { transform: scale(0.97); }
        .gold-button:disabled { opacity: 0.7; cursor: not-allowed; }
        .gold-button .orb-spin {
            display: inline-block;
            animation: orbPulse 0.8s ease-in-out infinite;
        }
        @keyframes orbPulse {
            0%, 100% { transform: scale(1) rotate(-10deg); }
            50%       { transform: scale(1.3) rotate(10deg); }
        }
        .spiritual-pointer {
            position: absolute;
            bottom: -20px; right: -10px;
            font-size: 2.5rem;
            z-index: 10;
            transform: rotate(150deg);
            animation: handMove 1.1s infinite ease-in-out;
            filter: drop-shadow(0 0 10px var(--gold));
        }
        @keyframes handMove {
            0%, 100% { transform: translateY(0) rotate(150deg); }
            50%       { transform: translateY(-15px) rotate(150deg); }
        }
        .disclaimer-text {
            margin-top: 28px;
            font-size: 0.72rem;
            color: rgba(212,175,55,0.55);
            line-height: 1.6;
            letter-spacing: 0.03em;
            border-top: 1px solid rgba(212,175,55,0.15);
            padding-top: 12px;
        }
        #result-view {
            display: none;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .result-cards {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            width: 100%;
        }
        .result-card-item {
            flex: 1;
            max-width: 100px;
            aspect-ratio: 2/3;
            border: 2.5px solid var(--gold);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }
        .result-card-item img { width:100%; height:100%; object-fit:cover; display:block; }
        .result-card-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8);
            color: var(--gold);
            font-size: 0.55rem;
            font-weight: bold;
            padding: 3px 2px;
            text-align: center;
        }
        .result-position-label {
            color: rgba(212,175,55,0.7);
            font-size: 0.65rem;
            text-align: center;
            margin-top: 4px;
            letter-spacing: 0.1em;
        }
        .zenith-oracle-container {
            border: 4px double var(--gold);
            border-radius: 15px;
            padding: 25px;
            background: rgba(0,0,0,0.85);
            text-align: left;
            line-height: 1.9;
            box-shadow: inset 0 0 25px rgba(212,175,55,0.2);
            width: 100%;
            position: relative;
        }
        /* 로딩 & 진행바 */
        #ai-loading-text {
            color: var(--gold);
            text-align: center;
            padding: 15px 0 8px;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            min-height: 2em;
        }
        #oracle-progress-wrap {
            width: 100%;
            background: rgba(212,175,55,0.15);
            border-radius: 50px;
            height: 6px;
            margin: 0 0 15px;
            overflow: hidden;
            display: none;
        }
        #oracle-progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 50px;
            background: linear-gradient(90deg, #8C6212, #D4AF37, #FFF5C3);
            box-shadow: 0 0 8px rgba(212,175,55,0.7);
            transition: width 0.5s ease;
        }
        #oracle-content { color: #eee; font-size: 0.95rem; }
        #oracle-content b, #oracle-content strong { color: var(--gold); }
        #oracle-content h2, #oracle-content h3 {
            color: var(--gold);
            border-bottom: 1px solid rgba(212,175,55,0.3);
            padding-bottom: 5px;
            margin-top: 20px;
        }

        /* ③ 스트리밍 커서 깜빡임 */
        .streaming-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--gold);
            margin-left: 2px;
            vertical-align: middle;
            animation: cursorBlink 0.7s infinite;
        }
        @keyframes cursorBlink {
            0%,100%{ opacity: 1; }
            50%{ opacity: 0; }
        }
        .reset-btn {
            margin-top: 35px;
            background: none;
            border: 1.5px solid var(--gold);
            color: var(--gold);
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 1rem;
            transition: all 0.2s;
        }
        .reset-btn:hover { background: var(--gold); color: #000; }
        .particle, .gold-dust {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            border-radius: 50%;
        }
        .card-block {
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(212,175,55,0.15);
            overflow: hidden;
        }
        .card-block:last-of-type { border-bottom: none; }
        .card-block h2 {
            font-size: 1rem;
            letter-spacing: 0.15em;
            color: var(--gold);
            margin: 0 0 4px 0;
            font-weight: 900;
        }
        /* 카드 이미지 — 텍스트 왼쪽에 float */
        .mini-card-float {
            float: left;
            width: 40px;
            height: 60px;
            object-fit: cover;
            border-radius: 5px;
            border: 1.5px solid rgba(212,175,55,0.6);
            margin: 2px 10px 6px 0;
            box-shadow: 0 0 8px rgba(212,175,55,0.2);
            flex-shrink: 0;
            cursor: pointer;
        }
        .card-text-wrap {
            /* float된 이미지 옆에서 텍스트 시작 */
            overflow: hidden;
        }
        .card-name-inline {
            font-size: 0.78rem;
            color: rgba(212,175,55,0.85);
            font-style: italic;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            display: block;
        }
        .card-text {
            font-size: 0.93rem;
            line-height: 1.85;
            color: rgba(255,255,255,0.88);
        }
        .synergy-reading {
            margin: 20px 0;
            padding: 16px;
            background: rgba(212,175,55,0.06);
            border: 1px solid rgba(212,175,55,0.25);
            border-radius: 10px;
            font-size: 0.93rem;
            line-height: 1.85;
            color: rgba(255,255,255,0.88);
        }
        .synergy-reading strong { color: var(--gold); }
        .final-reading {
            margin-top: 28px;
            padding: 0;
            background: transparent;
            border: none;
            font-size: 0.93rem;
            line-height: 1.85;
            color: rgba(255,255,255,0.9);
        }
        .final-reading strong { color: var(--gold); }
        .final-reading-inner {
            padding-bottom: 0;
        }
        /* 신탁 타이틀 — 녹색, 과거/현재/미래와 동일 스타일 */
        .zenith-title-block {
            margin-top: 0;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(46,204,113,0.4);
        }
        .zenith-title-main {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 0.15em;
            color: #2ecc71;
            margin: 0 0 2px 0;
            display: block;
        }
        .zenith-title-sub {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: rgba(46,204,113,0.75);
            display: block;
        }
        .zenith-oracle-text {
            font-size: 0.93rem;
            line-height: 1.85;
            color: rgba(255,255,255,0.88);
            margin-top: 14px;
        }
        .oracle-categories {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }
        .oracle-cat-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            background: rgba(46,204,113,0.06);
            border-left: 3px solid rgba(46,204,113,0.5);
            border-radius: 0 6px 6px 0;
            padding: 8px 10px;
        }
        .oracle-cat-icon { font-size: 1.1rem; flex-shrink: 0; }
        .oracle-cat-label {
            color: #2ecc71;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
            min-width: 52px;
        }
        .oracle-cat-val {
            color: rgba(255,255,255,0.88);
            font-size: 0.9rem;
            line-height: 1.7;
        }

        /* ── 유료 잠금 블러 */
        .locked-section {
            position: relative;
            margin-top: 10px;
        }
        .locked-blur {
            filter: blur(5px);
            pointer-events: none;
            user-select: none;
            opacity: 0.7;
        }
        .unlock-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            width: 90%;
        }
        .unlock-btn {
            background: linear-gradient(180deg, #FFF5C3 0%, #D4AF37 100%);
            color: #000;
            border: none;
            padding: 14px 24px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1rem;
            font-family: var(--font);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(212,175,55,0.5);
            transition: transform 0.1s;
        }
        .unlock-btn:active { transform: scale(0.97); }
        .unlock-desc {
            color: rgba(212,175,55,0.8);
            font-size: 0.78rem;
            margin-top: 8px;
            letter-spacing: 0.05em;
        }
        /* 결제 모달 */
        .pay-modal-overlay {
            position: fixed;
            top:0;left:0;width:100%;height:100%;
            background: rgba(0,0,0,0.85);
            z-index: 99998;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pay-modal {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 30px 24px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            position: relative;
        }
        .pay-modal h3 {
            color: var(--gold);
            font-size: 1.2rem;
            margin: 0 0 12px;
            letter-spacing: 0.1em;
        }
        .pay-modal p {
            color: rgba(255,255,255,0.8);
            font-size: 0.88rem;
            line-height: 1.7;
            margin: 0 0 20px;
        }
        .pay-account {
            background: rgba(212,175,55,0.1);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 20px;
            text-align: left;
        }
        .pay-account div {
            color: rgba(255,255,255,0.85);
            font-size: 0.88rem;
            line-height: 1.9;
        }
        .pay-account strong { color: var(--gold); }
        .pay-confirm-btn {
            background: linear-gradient(180deg, #FFF5C3 0%, #D4AF37 100%);
            color: #000;
            border: none;
            padding: 13px 0;
            width: 100%;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1rem;
            font-family: var(--font);
            cursor: pointer;
            margin-bottom: 10px;
        }
        .pay-close-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.5);
            padding: 10px 0;
            width: 100%;
            border-radius: 50px;
            font-family: var(--font);
            cursor: pointer;
            font-size: 0.88rem;
        }
    </style>
</head>
<body>
<div id="app-container">

    <div id="home-view">

        <!-- ✦ 아치형 별 타이틀 -->
        <div class="arch-title-wrapper">
            <div class="arch-svg-wrapper">
                <svg viewBox="0 0 320 130" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    <!-- 아치 별 — 모두 글자(하단 40px) 위쪽에만 위치 -->
                    <circle cx="18"  cy="90" r="3"   fill="#D4AF37" filter="url(#glow)" style="animation:archStarTwinkle3 2.1s infinite ease-in-out;"/>
                    <circle cx="38"  cy="68" r="2.5" fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle1 1.7s 0.3s infinite ease-in-out;"/>
                    <circle cx="58"  cy="48" r="4"   fill="#D4AF37" filter="url(#glow)" style="animation:archStarTwinkle5 2.4s 0.6s infinite ease-in-out;"/>
                    <circle cx="82"  cy="30" r="3"   fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle2 1.9s 0.1s infinite ease-in-out;"/>
                    <circle cx="110" cy="16" r="3.5" fill="#D4AF37" filter="url(#glow)" style="animation:archStarTwinkle4 2.2s 0.8s infinite ease-in-out;"/>
                    <circle cx="140" cy="6"  r="4.5" fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle1 1.5s 0.4s infinite ease-in-out;"/>
                    <circle cx="160" cy="2"  r="5.5" fill="#FFD700" filter="url(#glow)" style="animation:archStarTwinkle5 1.3s 0s   infinite ease-in-out;"/>
                    <circle cx="180" cy="6"  r="4.5" fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle1 1.5s 0.5s infinite ease-in-out;"/>
                    <circle cx="210" cy="16" r="3.5" fill="#D4AF37" filter="url(#glow)" style="animation:archStarTwinkle4 2.2s 0.2s infinite ease-in-out;"/>
                    <circle cx="238" cy="30" r="3"   fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle2 1.9s 0.7s infinite ease-in-out;"/>
                    <circle cx="262" cy="48" r="4"   fill="#D4AF37" filter="url(#glow)" style="animation:archStarTwinkle5 2.4s 0.3s infinite ease-in-out;"/>
                    <circle cx="282" cy="68" r="2.5" fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle1 1.7s 0.9s infinite ease-in-out;"/>
                    <circle cx="302" cy="90" r="3"   fill="#D4AF37" filter="url(#glow)" style="animation:archStarTwinkle3 2.1s 0.5s infinite ease-in-out;"/>
                    <circle cx="48"  cy="58" r="1.5" fill="#FFF5C3" filter="url(#glow)" style="animation:archStarTwinkle2 1.1s 0.2s infinite ease-in-out;"/>
                    <circle cx="96"  cy="22" r="2"   fill="#FFD700" filter="url(#glow)" style="animation:archStarTwinkle4 1.8s 0.6s infinite ease-in-out;"/>
                    <circle cx="224" cy="22" r="2"   fill="#FFD700" filter="url(#glow)" style="animation:archStarTwinkle4 1.8s 0.3s infinite ease-in-out;"/>

//  영성적 싱크로니시티 카드 선택
// ════════════════════════════════════
function pickThreeCards(question) {
    const now = Date.now();
    let hash = now;
    for (let i = 0; i < question.length; i++) {
        hash = ((hash << 5) - hash) + question.charCodeAt(i);
        hash |= 0;
    }
    let s = Math.abs(hash);
    const rand = () => {
        s = (s * 1664525 + 1013904223) & 0xffffffff;
        return (s >>> 0) / 0xffffffff;
    };
    return [...CARDS].sort(() => rand() - 0.5).slice(0, 3);
}

async function getUpbitData(market = "KRW-BTC") {
    try {
        const priceRes = await fetch(`https://api.upbit.com/v1/ticker?markets=${market}`);
        const priceData = await priceRes.json();

        const candleRes = await fetch(`https://api.upbit.com/v1/candles/minutes/5?market=${market}&count=50`);
        const candleData = await candleRes.json();

        return {
            price: priceData[0].trade_price,
            candles: candleData.map(c => c.trade_price).reverse()
        };
    } catch (e) {
        console.error("업비트 API 실패", e);
        return null;
    }
}

function calculateRSI(prices, period = 14) {
    let gains = 0;
    let losses = 0;

    for (let i = 1; i <= period; i++) {
        const diff = prices[i] - prices[i - 1];
        if (diff >= 0) gains += diff;
        else losses -= diff;
    }

    let avgGain = gains / period;
    let avgLoss = losses / period;

    for (let i = period + 1; i < prices.length; i++) {
        const diff = prices[i] - prices[i - 1];

        if (diff >= 0) {
            avgGain = (avgGain * (period - 1) + diff) / period;
            avgLoss = (avgLoss * (period - 1)) / period;
        } else {
            avgGain = (avgGain * (period - 1)) / period;
            avgLoss = (avgLoss * (period - 1) - diff) / period;
        }
    }

    const rs = avgGain / (avgLoss || 1);
    return 100 - (100 / (1 + rs));
}

async function getTradingSignal(fullText) {

    const data = await getUpbitData("KRW-BTC");
    if (!data) return null;

    const rsi = calculateRSI(data.candles);

    // 🔥 타로 점수
    let tarotScore = 0;

    if (/Sun|Ace of Pentacles|Queen of Wands/.test(fullText)) tarotScore += 2;
    if (/Devil|Tower|Death/.test(fullText)) tarotScore -= 3;

    // 🔥 RSI 판단
    let rsiSignal = "중립";
    if (rsi < 30) rsiSignal = "과매도";      // 매수 신호
    else if (rsi > 70) rsiSignal = "과매수"; // 매도 신호

    // 🔥 최종 결론
    let finalAction = "관망";

    if (tarotScore > 0 && rsi < 35) {
        finalAction = "🔥 강한 매수";
    } else if (tarotScore < 0 && rsi > 65) {
        finalAction = "❌ 매수 금지";
    } else if (tarotScore > 0) {
        finalAction = "분할 매수";
    }

    return {
        price: data.price,
        rsi: rsi.toFixed(2),
        signal: finalAction,
        rsiState: rsiSignal
    };
}

async function startStreamFetch(userQuestion, cards) {
    const cardNames     = cards.map(c => c.name).join(', ');
    const cardPositions = cards.map((c, i) => `${['과거','현재','미래'][i]}: ${c.name}`).join(', ');
    const sessionToken  = localStorage.getItem('oracleSessionToken') || '';

    // ── 질문 유형 분기: 투자/주식 vs 일반운세
    window._isFinanceQuery = /코인|비트코인|주식|투자|매수|매도|ETF|선물|암호화폐|달러|환율/.test(userQuestion);

    const controller = new AbortController();
    setTimeout(() => controller.abort(), 30000);

    return fetch('https://tarot-api.omegafund01.workers.dev', {
        method: 'POST',
        headers: {
            'Content-Type':    'application/json',
            'x-session-token': sessionToken
        },
        body: JSON.stringify({
            prompt:        userQuestion,
            cardNames:     cardNames,
            cardPositions: cardPositions,
            isReversed:    '없음',
            userName:      (window._oracleUserName || '유저님')
        }),
        signal: controller.signal
    });
}

// ════════════════════════════════════
//  ③ 응답 수신 + 유료/무료 분기 렌더링
// ════════════════════════════════════
async function renderStream(fetchPromise, cards) {
    const loadingEl    = document.getElementById('ai-loading-text');
    const contentEl    = document.getElementById('oracle-content');
    const progressWrap = document.getElementById('oracle-progress-wrap');
    const progressBar  = document.getElementById('oracle-progress-bar');

    loadingEl.style.display    = 'block';
    progressWrap.style.display = 'block';
    contentEl.innerHTML        = '';

    const loadingMessages = [
        '✨ 천상의 기운을 감지 중...',
        '🔮 운명의 카드를 해독 중...',
        '⚡ 2026년 데이터와 교신 중...',
        '🌌 신탁의 언어로 번역 중...',
        '📜 오라클이 응답을 준비 중...',
        '✦ 거의 완성되었습니다...'
    ];

    let msgIdx = 0, progressVal = 5;
    loadingEl.textContent = loadingMessages[0];
    progressBar.style.width = '5%';

    const loadingTimer = setInterval(() => {
        msgIdx = Math.min(msgIdx + 1, loadingMessages.length - 1);
        loadingEl.textContent = loadingMessages[msgIdx];
        progressVal = Math.min(progressVal + 14, 90);
        progressBar.style.width = progressVal + '%';
    }, 2800);

    try {
        const response = await fetchPromise;
        clearInterval(loadingTimer);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const reader  = response.body.getReader();
        const decoder = new TextDecoder();

        loadingEl.style.display    = 'none';
        progressWrap.style.display = 'none';
        progressBar.style.width    = '100%';

        const cursor = document.createElement('span');
        cursor.className = 'streaming-cursor';
        contentEl.appendChild(cursor);

        let buffer   = '';
        let fullText = '';

        // ── SSE 스트리밍 수신 — 전체 텍스트 누적
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const jsonStr = line.slice(6).trim();
                if (jsonStr === '[DONE]') continue;
                try {
                    const parsed = JSON.parse(jsonStr);
                    const chunk  = parsed?.candidates?.[0]?.content?.parts?.[0]?.text || '';
                    if (!chunk) continue;
                    fullText += chunk;
                    cursor.remove();
                    contentEl.innerHTML = renderText(fullText, cards, null, false);
                    contentEl.appendChild(cursor);
                } catch(_) {}
            }
        }

        // ── 스트리밍 완료
        cursor.remove();

        const riskScore = analyzeRisk(cards);
        const isFinance = window._isFinanceQuery || /코인|주식|투자|매수|매도|부동산/.test(fullText);

        let investmentData = isFinance ? generateInvestmentData(cards, fullText) : null;
        if (isFinance) fullText = applyRiskTrigger(fullText, riskScore);

        window.lastResponseText = fullText;
        window.lastCards = cards;
        window.lastInvestData = investmentData;

        const isTestMode = window.location.hostname === 'localhost' || window.location.search.includes('admin=true');
        const isPaid = isTestMode || isPaidUser;

        let finalHTML = renderText(fullText, cards, investmentData, isPaid);

        if (isPaid) {
            contentEl.innerHTML = finalHTML;
        } else {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = finalHTML;
            const cardBlocks = tempDiv.querySelectorAll('.card-block');
            const finalReading = tempDiv.querySelector('.final-reading');

            if (cardBlocks.length >= 3) {
                const futureBlock = cardBlocks[2];
                const futureText = futureBlock.querySelector('.card-text, div[style]');
                if (futureText) futureText.innerHTML = '결제 후 확인 가능한 미래 신탁입니다.';
                if (finalReading) finalReading.remove();

                const lockWrapper = document.createElement('div');
                lockWrapper.className = 'locked-section';
                const blurDiv = document.createElement('div');
                blurDiv.className = 'locked-blur';
                blurDiv.appendChild(futureBlock.cloneNode(true));
                lockWrapper.appendChild(blurDiv);

                const overlayDiv = document.createElement('div');
                overlayDiv.className = 'unlock-overlay';
                overlayDiv.innerHTML = `
                    <button class="unlock-btn" onclick="showPayModal()">🔓 미래 신탁 전체 보기</button>
                    <div class="unlock-desc">과거/현재를 넘어 당신의 미래를 확인하세요</div>`;
                lockWrapper.appendChild(overlayDiv);
                futureBlock.replaceWith(lockWrapper);
            }
            contentEl.innerHTML = tempDiv.innerHTML;
        }

        setTimeout(() => {
            const seal = document.getElementById('oracle-seal');
            if (seal) seal.classList.add('stamped');
        }, 800);

    } catch (error) {
        clearInterval(loadingTimer);
        loadingEl.style.display    = 'none';
        progressWrap.style.display = 'none';
        contentEl.innerHTML = `
            <div style="color:#ff6b6b;padding:20px;border:1px solid #ff6b6b;border-radius:10px;">
                <strong>⚠️ 연결 실패</strong><br><br>
                <pre style="white-space:pre-wrap;font-size:0.8rem;color:#eee;">${error.message}</pre>
            </div>`;
    }
}

function analyzeRisk(cards) {
    let risk = 0;
    cards.forEach(c => {
        if (!c) return;
        const name = c.name || "";
        if (name.includes("Devil")) risk += 3;
        if (name.includes("Tower")) risk += 4;
        if (name.includes("Death")) risk += 2;
        if (name.includes("Ten of Swords")) risk += 3;
    });
    return risk;
}

function getInvestmentDecision(risk) {
    if (risk >= 6) return "회피";
    if (risk >= 3) return "관망";
    return "매수 가능";
}

function applyRiskTrigger(text, risk) {
    if (risk >= 6) {
        return text + `\n\n⚠️ 현재 흐름은 강한 붕괴 또는 손실 가능성이 감지됩니다.\n감정적 진입은 매우 위험합니다. 반드시 관망하십시오.\n`;
    }
    if (risk >= 3) {
        return text + `\n\n⚠️ 변동성이 높은 구간입니다.\n확신 없는 진입은 손실로 이어질 수 있습니다.\n`;
    }
    return text;
}

function getNumerologyScore() {
    const now = new Date();
    let num = (now.getDate() + now.getHours());
    while (num > 9) {
        num = num.toString().split("").reduce((a,b)=>a+parseInt(b),0);
    }
    return num;
}

// 🔥 카드 점수 계산 → decision 객체 반환
// ════════════════════════════════════
function calculateScore(cards) {
    let score = 0;
    cards.forEach(c => {
        if (!c) return;
        const name = c.name || "";
        if (name.includes("Sun") || name.includes("태양")) score += 3;
        if (name.includes("Ace of Pentacles") || name.includes("펜타클 에이스")) score += 2;
        if (name.includes("Nine of Cups") || name.includes("컵9")) score += 2;
        if (name.includes("Star") || name.includes("별")) score += 1;
        if (name.includes("Wheel of Fortune")) score += 1;
        if (name.includes("Devil") || name.includes("악마")) score -= 3;
        if (name.includes("Tower") || name.includes("탑")) score -= 4;
        if (name.includes("Ten of Swords")) score -= 3;
        if (name.includes("Death") || name.includes("죽음")) score -= 2;
        if (name.includes("Moon") || name.includes("달")) score -= 1;
    });
    return score;
}

function getDecision(score) {
    const num = getNumerologyScore();
    if (score >= 4) {
        const trend   = "상승 흐름 우세 — 긍정 에너지 감지";
        const action  = num === 7 || num === 9 ? "분할 매수 (⚠️ 타이밍 지연 — 신중)" : "분할 매수 진입 고려";
        const timing  = "현재~단기 진입 적기";
        const risk    = "낮음 — 단, 감정적 추격매수 금지";
        return { label: "매수", trend, action, timing, risk };
    } else if (score >= 1) {
        const trend   = "방향성 불명확 — 관망 구간";
        const action  = num === 1 || num === 3 ? "소량 분할 진입 (🔥 수비학 기회 신호)" : "현금 보유 유지";
        const timing  = "돌파 확인 후 진입";
        const risk    = "중간 — 변동성 주의";
        return { label: "관망", trend, action, timing, risk };
    } else {
        const trend   = "하락 에너지 감지 — 리스크 구간";
        const action  = "진입 금지 / 보유 시 손절 기준 재검토";
        const timing  = "시장 안정 확인 전까지 대기";
        const risk    = "높음 — 붕괴 가능성 주의";
        return { label: "회피", trend, action, timing, risk };
    }
}

function mergeDecision(cardDecision, rsiSignal) {
    if (cardDecision === "회피") {
        return "회피"; // 🔥 카드가 무조건 우선

    if (cardDecision === "관망") {
        if (rsiSignal === "매수") return "관망 (신중)";

    if (cardDecision === "매수") {
        if (rsiSignal === "관망") return "분할 매수";
        return "매수";
    }
    return cardDecision;
}

//  텍스트 → HTML 변환
//  신탁 마커 정규화 → 카드섹션 렌더 → 제우스의 최종신탁 고정 조립
// ════════════════════════════════════
function renderText(text, cards, investData, isPaid = false) {
    // 1. 텍스트 정화: 본문 내 "과거:", "현재:", "미래:" 중복 삭제
    let cleanText = text
        .replace(/안녕하세요.*유저님\.?/g, '')
        .replace(/\[합산 과정:[^\]]*\]/g, '')
        .replace(/제우스의?\s*(운명|최종)신탁/g, '')
        .replace(/ZEUS\s*(DESTINY|FINAL)\s*ORACLE/g, '')
        // 본문 시작의 "과거/현재/미래" 카테고리명을 칼같이 도려냄
        .replace(/^(과거|현재|미래)\s*(\n|[:：]|\s)*/gm, '') 
        .trim();

    const splitIndex = cleanText.search(/[📈🧭⚡🛡️]/);
    if (splitIndex !== -1) cleanText = cleanText.substring(0, splitIndex).trim();

    // 2. 문단 분리
    let paragraphs = cleanText.split(/\n\s*\n/).map(p => p.trim()).filter(p => p.length > 5);
    const formatChunk = t => (t || '').trim()
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');

    let cardTexts = [paragraphs[0] || "", paragraphs[1] || "", paragraphs[2] || ""];
    let oracleContent = paragraphs.slice(3).join('\n\n').trim();
    const labels = ['과거', '현재', '미래'];

    // 3. 공개 영역 (과거/현재)
    const publicSections = cards.slice(0, 2).map((card, i) => `
        <div class="card-block" style="margin: 0 0 10px 0; padding-bottom: 10px; border-bottom: 1px solid rgba(212,175,55,0.15);">
            <h2 style="margin: 0 0 5px 0; color: var(--gold); font-size: 1rem;">${labels[i]}</h2>
            <img src="${BASE_URL}${card.file}" class="mini-card-float" onclick="expandCard(this)">
            <div class="card-text-wrap">
                <span style="display:block; margin-bottom:4px; font-weight:bold;">${card.name}</span>
                <div style="color: rgba(255,255,255,0.88); line-height: 1.6; font-size: 0.92rem;">${formatChunk(cardTexts[i])}</div>
            </div>
        </div>`).join('');

    // 4. 결제 상태에 따른 분기
    if (isPaid) {
        // 미래 카드 블록 (별도 — 최종신탁과 분리)
        const futureCardHTML = `
            <div class="card-block" style="margin: 0 0 10px 0; padding-bottom: 10px; border-bottom: 1px solid rgba(212,175,55,0.15);">
                <h2 style="margin: 0 0 5px 0; color: var(--gold); font-size: 1rem;">${labels[2]}</h2>
                <img src="${BASE_URL}${cards[2].file}" class="mini-card-float" onclick="expandCard(this)" onerror="this.style.display='none'">
                <div class="card-text-wrap">
                    <span style="display:block; margin-bottom:4px; font-weight:bold;">${cards[2].name}</span>
                    <div style="color: rgba(255,255,255,0.88); line-height: 1.6; font-size: 0.92rem;">${formatChunk(cardTexts[2])}</div>
                </div>
            </div>`;

        // 최종신탁 섹션 (미래 카드 블록과 완전히 분리된 독립 div)
        const oracleHTML = `
            <div class="final-reading" style="margin-top: 24px;">
                <div class="zenith-title-block" style="margin-bottom: 12px; border-bottom: 2px solid rgba(39,174,96,0.5); padding-bottom: 6px;">
                    <span class="zenith-title-main" style="color: #2ecc71; font-size: 1.2rem; font-weight: 900; display: block;">제우스의 최종신탁</span>
                    <div class="zenith-title-sub" style="color: rgba(46,204,113,0.85); font-size: 0.85rem; font-weight: 800; letter-spacing: 0.2em;">ZEUS FINAL ORACLE</div>
                </div>
                <div style="line-height: 1.8; color: rgba(255,255,255,0.95); font-size: 0.96rem; margin-bottom: 20px;">${formatChunk(oracleContent)}</div>
                ${investData ? (() => {
                    const ac = investData.action.includes("매수") ? "#2ecc71" : (investData.action.includes("회피") ? "#e74c3c" : "#f1c40f");
                    return `<div class="final-oracle" style="padding: 18px; background: rgba(212,175,55,0.1); border: 1px solid var(--gold); border-radius: 12px;">
                        <h3 style="color: var(--gold); margin: 0 0 10px 0; font-size: 1.1rem; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 8px;">📊 실전 투자 신탁</h3>
                        <p style="line-height: 1.6; color: #fff; white-space: pre-line; font-size: 0.94rem; margin-bottom: 15px;">${investData.finalOracle}</p>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.88rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px;">
                            <div>📈 추세: <strong style="color: var(--gold);">${investData.trend}</strong></div>
                            <div>🧭 행동: <strong style="color: ${ac};">${investData.action}</strong></div>
                            <div>⚡ 타이밍: <strong style="color: var(--gold);">${investData.timing}</strong></div>
                            <div>🛡️ 리스크: <strong style="color: var(--gold);">${investData.risk}</strong></div>
                        </div>
                    </div>`;
                })() : ''}
            </div>`;

        return publicSections + futureCardHTML + oracleHTML;
    } else {
        return publicSections + `
            <div class="lock-section" style="padding: 35px 20px; text-align: center; background: rgba(0,0,0,0.5); border: 1px dashed var(--gold); border-radius: 15px; margin: 20px 0;">
                <div style="font-size: 2.5rem; margin-bottom: 15px;">🔓</div>
                <h3 style="color: var(--gold); margin: 0 0 10px 0;">미래 신탁 전체 보기</h3>
                <p style="font-size: 0.9rem; color: #bbb; margin-bottom: 20px;">과거/현재를 넘어 당신의 미래를 확인하세요</p>
                <button onclick="showPayModal()" style="background: var(--gold); color: #000; border: none; padding: 12px 30px; border-radius: 6px; font-weight: bold; cursor: pointer;">지금 확인하기</button>
            </div>`;
    }
}

        }

        // 서버 서명 토큰 저장 (위조 불가 — 서버만 발급 가능)
        if (data.token) localStorage.setItem('oracleSessionToken', data.token);
        isPaidUser = true; // 결제 완료 플래그

    } catch(e) {
        // 데모 모드: 네트워크 오류여도 결제 완료로 처리
        console.warn('결제 확인 네트워크 오류(데모 모드 — 계속 진행):', e.message);
        isPaidUser = true;
    }

    closePayModal();

    // 결과 재조회
    const question = document.getElementById('seed-input')
        ? document.getElementById('seed-input').value
        : '';

    if (selectedCards && selectedCards.length > 0) {
        const contentEl = document.getElementById('oracle-content');
        if (contentEl) contentEl.innerHTML = '';
        const streamPromise = startStreamFetch(question || '재조회', selectedCards);
        renderStream(streamPromise, selectedCards);
    } else {
        location.reload();
    }
}
</script>
</body>
</html>
