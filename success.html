<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="version" content="V31_201.2_2026-05-09_PRODUCTION_HASH_BYPASS">
<title>결제 확인 중 · ZEUS</title>
<style>
  :root { --bg:#0e1117; --fg:#e6e6e6; --gold:#d4af37; --green:#9ed28a; }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:-apple-system,'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif}
  .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{max-width:420px;width:100%;background:#1a1f2b;border:1px solid #2a2f3b;border-radius:16px;padding:32px 24px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.4)}
  .title{font-size:20px;font-weight:700;color:var(--gold);margin-bottom:8px}
  .subtitle{font-size:14px;color:#aab1bd;margin-bottom:24px;line-height:1.55}
  .spinner{width:40px;height:40px;margin:0 auto 16px;border:3px solid #2a2f3b;border-top-color:var(--gold);border-radius:50%;animation:spin 0.9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ok{color:var(--green)}
  .err{color:#ff7b7b}
  .tiny{font-size:11px;color:#6a7280;margin-top:16px;font-family:Menlo,Monaco,Consolas,monospace}
  button{margin-top:16px;background:var(--gold);color:#0e1117;border:0;padding:12px 24px;border-radius:10px;font-weight:700;cursor:pointer;font-size:14px}
  button:hover{filter:brightness(1.08)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div id="spin" class="spinner"></div>
      <div id="title" class="title">결제를 확인하고 있습니다…</div>
      <div id="msg" class="subtitle">잠시만 기다려주세요. 결제 검증에는 보통 1~3초가 소요됩니다.</div>
      <div id="action"></div>
      <div id="diag" class="tiny"></div>
    </div>
  </div>

<script>
/* ════════════════════════════════════════════════════════════════════
 *   ZEUS Payment Success Handler  —  V201.2 PRODUCTION
 * ════════════════════════════════════════════════════════════════════
 *
 *   결정적 변경 (V199.1 → V201.2):
 *     기존: data.verifiedToken 있으면 #vt=... 해시 경로로 이동
 *           → V199.2 STAGE 1 → consume-token → 모바일에서 영구 멈춤
 *           → V200.7.6 ~ V200.8.8 미봉책 51번의 진원지
 *     신규: 단일 ?paid=ok 경로만 사용
 *           → STAGE 2 직접 진입 → 정상 점사창 표시
 *
 *   이 변경의 안전성:
 *     - Cloudflare Worker 캐시 프록시 도입으로 same-domain 보장됨
 *     - localStorage가 success.html과 index.html 사이 자동 공유
 *     - 따라서 #vt= 해시 안전망(cross-domain 격리 우회)이 더는 불필요
 *
 *   2026-05-09 모바일 실기 검증 완료
 * ════════════════════════════════════════════════════════════════════ */

(async () => {
  const WORKER_BASE = 'https://tarot-api.omegafund01.workers.dev';
  
  const $ = (id) => document.getElementById(id);
  const setTitle = (s, cls) => { $('title').textContent = s; if (cls) $('title').className = 'title ' + cls; };
  const setMsg   = (s) => { $('msg').textContent = s; };
  const setDiag  = (s) => { $('diag').textContent = s; };
  const stopSpin = () => { const sp = $('spin'); if (sp) sp.style.display = 'none'; };
  
  const params = new URLSearchParams(location.search);
  const paymentKey = params.get('paymentKey');
  const orderId    = params.get('orderId');
  const amount     = params.get('amount');
  
  // ─── 1. Toss redirect 파라미터 누락 방어 ─────────────────
  if (!paymentKey || !orderId || !amount) {
    stopSpin();
    setTitle('결제 정보 누락', 'err');
    setMsg('Toss로부터 받은 결제 정보가 불완전합니다. 다시 시도해주세요.');
    $('action').innerHTML = '<button onclick="location.href=\'./\'">홈으로</button>';
    setDiag('paymentKey/orderId/amount 중 하나 이상 누락');
    return;
  }
  
  setDiag('orderId=' + orderId.slice(0, 28) + '…');
  
  // ─── 2. Worker /verify-toss 호출 (10초 타임아웃) ─────────
  let data;
  try {
    const ctrl = new AbortController();
    const tt = setTimeout(() => ctrl.abort(), 10000);
    
    const res = await fetch(WORKER_BASE + '/verify-toss', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ paymentKey, orderId, amount }),
      signal: ctrl.signal
    });
    clearTimeout(tt);
    
    data = await res.json();
    
    if (!data.success) {
      stopSpin();
      setTitle('결제 검증 실패', 'err');
      setMsg(data.error || '결제 검증 중 오류가 발생했습니다.');
      $('action').innerHTML = '<button onclick="location.href=\'./fail.html\'">실패 안내로</button>';
      setDiag('reason: ' + JSON.stringify(data).slice(0, 200));
      return;
    }
    
  } catch(e) {
    stopSpin();
    setTitle('네트워크 오류', 'err');
    if (e.name === 'AbortError') {
      setMsg('검증 서버 응답이 지연되고 있습니다. 잠시 후 다시 시도해주세요.\n결제는 토스 서버에 정상 접수되었을 수 있으니, 동일 결제는 재시도하지 마세요.');
    } else {
      setMsg('검증 서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.');
    }
    $('action').innerHTML = '<button onclick="location.href=\'./\'">홈으로</button>';
    setDiag('error: ' + e.message);
    return;
  }
  
  // ─── 3. 검증 성공 → sessionStorage + localStorage 저장 ───
  
  // 3-A. sessionStorage (정상 케이스 — 같은 브라우저 컨텍스트)
  try {
    sessionStorage.setItem('verified_paid', 'true');
    sessionStorage.setItem('sajuPaidPlan', data.plan || 'saju_basic');
    if (data.token) {
      sessionStorage.setItem('paid_token', data.token);
    }
  } catch(_) {}
  
  // 3-B. localStorage (V194 60분 정책 호환 + 24시간 확장)
  try {
    if (data.token) {
      localStorage.setItem('paid_token', data.token);
      localStorage.setItem('oracleSessionToken', data.token);
    }
    if (data.expiresAt) {
      localStorage.setItem('sajuPaidExpiresAt', String(data.expiresAt));
      localStorage.setItem('sajuPaidPlan', data.plan || 'saju_basic');
    }
    if (data.isSajuPlan) {
      localStorage.setItem('sajuPaymentContext', 'true');
    }
  } catch(_) {}
  
  setTitle('결제 완료', 'ok');
  setMsg('잠시 후 결과 페이지로 이동합니다…');
  
  // ─── 4. ★ V201.2 핵심 ★ — 해시 경로 우회, ?paid=ok 단일 경로 ───
  //   V199.1 P1 핫픽스 보존: GitHub Pages subdirectory 호환
  //   → 절대 경로 '/index.html' 대신 success.html 위치 기준 동적 base
  const base = location.pathname.substring(0, location.pathname.lastIndexOf('/') + 1);
  const redirectUrl = base + 'index.html?paid=ok&plan=' + encodeURIComponent(data.plan || 'saju_basic');
  
  console.log('[V201.2] redirect →', redirectUrl);
  
  // 800ms 딜레이 (사용자가 "결제 완료" 메시지 인지할 시간)
  setTimeout(() => { location.replace(redirectUrl); }, 800);
  
})();
</script>
</body>
</html>
