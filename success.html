<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 완료 — ZEUS ORACLE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background:#0A0A14; color:#D4AF37; font-family:'Inter',sans-serif;
               display:flex; align-items:center; justify-content:center;
               min-height:100vh; margin:0; text-align:center; }
        .wrap { padding:32px 20px; }
        .icon { font-size:3rem; margin-bottom:16px; }
        h2 { font-size:1.2rem; font-weight:800; letter-spacing:0.1em;
             margin-bottom:8px; color:#F1C40F; }
        p  { font-size:0.85rem; color:rgba(255,255,255,0.6); margin-bottom:24px; }
        .spinner { width:32px; height:32px; border:3px solid rgba(212,175,55,0.2);
                   border-top-color:#D4AF37; border-radius:50%;
                   animation:spin 0.8s linear infinite; margin:0 auto 16px; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
<div class="wrap">
    <div class="spinner"></div>
    <div class="icon">⚡</div>
    <h2>결제 완료 — 봉인 해제 중</h2>
    <p>잠시 후 신탁 결과로 이동합니다…</p>
</div>
<script>
// [V23.7] Toss 결제 완료 → index.html?paid=ok&paymentKey=...로 리다이렉트
(function() {
    const params = new URLSearchParams(window.location.search);
    const paymentKey = params.get('paymentKey') || '';
    const orderId    = params.get('orderId')    || '';
    const amount     = params.get('amount')     || '';

    // Worker에 결제 검증 요청
    const WORKER_URL = 'https://tarot-api.omegafund01.workers.dev';

    fetch(WORKER_URL + '/confirm-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ paymentKey, orderId, amount })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success || data.ok) {
            // 결제 검증 성공 → 토큰 저장 후 결과 화면으로
            if (data.token || paymentKey) {
                localStorage.setItem('oracleSessionToken', data.token || 'PAID_' + Date.now());
            }
        }
    })
    .catch(() => {
        // 검증 실패해도 토큰은 저장 (결제 완료 플래그)
        localStorage.setItem('oracleSessionToken', 'PAID_' + Date.now());
    })
    .finally(() => {
        // 항상 결과 화면으로 이동 (paid=ok 파라미터 전달)
        const base = window.location.pathname.replace('/success.html', '') || '/';
        window.location.replace(base + '/index.html?paid=ok');
    });

    // 네트워크 지연 방어 — 3초 후 강제 이동
    setTimeout(() => {
        const base = window.location.pathname.replace('/success.html', '') || '/';
        window.location.replace(base + '/index.html?paid=ok');
    }, 3000);
})();
</script>
</body>
</html>
